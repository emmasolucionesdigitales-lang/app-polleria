/* ─── MERMAS / PÉRDIDAS DIARIAS ─── */
function SeccionMermas({uid,stockItems}){
  const [mermas,setMermas]=useState([]);
  const [prodId,setProdId]=useState('');
  const [kg,setKg]=useState('');
  const [motivo,setMotivo]=useState('goteo');
  const [nota,setNota]=useState('');
  const [descontar,setDescontar]=useState(true);
  const [guardando,setGuardando]=useState(false);
  const [toastMsg,setToastMsg]=useState('');
  const col=db.collection(`polleria/${uid}/mermas`);
  useEffect(()=>col.orderBy('createdAt','desc').onSnapshot(s=>setMermas(s.docs.map(d=>({id:d.id,...d.data()})))),[]);

  const MOTIVOS={
    goteo:{lbl:'💧 Goteo / agua',color:'var(--blue)'},
    grasa:{lbl:'🧈 Grasa / recorte',color:'var(--orange)'},
    decomiso:{lbl:'🗑️ Decomiso',color:'var(--red)'},
    otro:{lbl:'❓ Otro',color:'var(--txt2)'},
  };
  const prodSel=stockItems.find(i=>i.id===prodId)||null;
  const unidad=prodSel?(prodSel.unidad||'kg'):'kg';
  const costoUnit=prodSel?(Number(prodSel.precioCosto)||0):0;
  const mostrar=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};

  const anotar=async()=>{
    const cant=parseFloat(kg);
    if(!cant||cant<=0)return alert('Ingresá cuánto se perdió');
    setGuardando(true);
    try{
      await col.add({
        fecha:hoy(),
        productoId:prodSel?prodSel.id:'',
        productoNombre:prodSel?prodSel.nombre:'Genérico',
        kg:+cant.toFixed(3),
        unidad,
        motivo,
        costoUnit,
        nota:nota.trim(),
        descontado:!!(descontar&&prodSel),
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      if(descontar&&prodSel){
        const ref=db.collection(`polleria/${uid}/stock`).doc(prodSel.id);
        const actual=Number(prodSel.cantidad)||0;
        await ref.update({cantidad:Math.max(0,+(actual-cant).toFixed(3))});
      }
      setKg('');setNota('');
      mostrar(descontar&&prodSel?'✅ Merma anotada y descontada del stock':'✅ Merma anotada');
    }catch(e){alert('Error: '+e.message);}
    setGuardando(false);
  };
  const eliminar=async id=>{if(!confirm('¿Borrar este registro de merma?'))return;await col.doc(id).delete();};

  const hoyF=hoy();
  const mesF=hoy().slice(0,7);
  const mermasHoy=mermas.filter(m=>m.fecha===hoyF);
  const mermasMes=mermas.filter(m=>(m.fecha||'').slice(0,7)===mesF);
  const kgHoy=mermasHoy.reduce((s,m)=>s+(Number(m.kg)||0),0);
  const pesoHoy=mermasHoy.reduce((s,m)=>s+(Number(m.kg)||0)*(Number(m.costoUnit)||0),0);
  const kgMes=mermasMes.reduce((s,m)=>s+(Number(m.kg)||0),0);
  const pesoMes=mermasMes.reduce((s,m)=>s+(Number(m.kg)||0)*(Number(m.costoUnit)||0),0);
  const porFecha={};mermas.forEach(m=>{const f=m.fecha||'sin fecha';if(!porFecha[f])porFecha[f]=[];porFecha[f].push(m);});

  return(
    <div>
      <Toast msg={toastMsg}/>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <div style={{flex:1,background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--radius-lg)',padding:'10px 12px'}}>
          <div style={{fontSize:10,color:'var(--txt2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em'}}>Hoy</div>
          <div style={{fontSize:22,fontWeight:700,color:'var(--red)'}}>{+kgHoy.toFixed(2)} <span style={{fontSize:13,fontWeight:400}}>kg</span></div>
          {pesoHoy>0&&<div style={{fontSize:11,color:'var(--txt2)'}}>~{formatPeso(pesoHoy)} en costo</div>}
        </div>
        <div style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'10px 12px'}}>
          <div style={{fontSize:10,color:'var(--txt2)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.05em'}}>Este mes</div>
          <div style={{fontSize:22,fontWeight:700,color:'var(--txt)'}}>{+kgMes.toFixed(2)} <span style={{fontSize:13,fontWeight:400}}>kg</span></div>
          {pesoMes>0&&<div style={{fontSize:11,color:'var(--txt2)'}}>~{formatPeso(pesoMes)} en costo</div>}
        </div>
      </div>

      <div className="panel">
        <div className="ptitle">🥩 Anotar merma / pérdida</div>
        <label className="lbl" style={{marginTop:0}}>Producto <span style={{color:'var(--txt3)',fontWeight:400}}>(opcional)</span></label>
        <select value={prodId} onChange={e=>setProdId(e.target.value)} className="inp" style={{marginBottom:10}}>
          <option value="">— Genérico (sin ítem puntual) —</option>
          {stockItems.map(i=>(<option key={i.id} value={i.id}>{i.nombre} ({i.cantidad||0} {i.unidad})</option>))}
        </select>
        <label className="lbl">¿Cuánto se perdió? ({unidad})</label>
        <input type="number" step="0.001" min="0" value={kg} onChange={e=>setKg(e.target.value)} className="inp" placeholder="0.000" style={{fontWeight:700,fontSize:22,marginTop:4}}/>
        <label className="lbl">Motivo</label>
        <div className="chip-group" style={{marginBottom:10}}>
          {Object.entries(MOTIVOS).map(([k,v])=>(<button key={k} onClick={()=>setMotivo(k)} className={`chip${motivo===k?' activo':''}`}>{v.lbl}</button>))}
        </div>
        <label className="lbl">Nota <span style={{color:'var(--txt3)',fontWeight:400}}>(opcional)</span></label>
        <input value={nota} onChange={e=>setNota(e.target.value)} className="inp" placeholder="Ej: goteo de 3 cajones" style={{marginBottom:10}}/>
        {prodSel&&(
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--txt2)',marginBottom:12,cursor:'pointer'}}>
            <input type="checkbox" checked={descontar} onChange={e=>setDescontar(e.target.checked)} style={{width:18,height:18,accentColor:'var(--red)'}}/>
            <span>Descontar estos {unidad} del stock de <b style={{color:'var(--txt)'}}>{prodSel.nombre}</b></span>
          </label>
        )}
        <button onClick={anotar} disabled={guardando||!kg} className="btn-full" style={{background:'var(--red)'}}>
          {guardando?'Guardando...':'🥩 Anotar merma'}
        </button>
      </div>

      <div className="sec-title">📋 Historial de mermas</div>
      {mermas.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>🥩</div>No hay mermas registradas.<br/>Anotá las pérdidas del día para que no figuren como faltante.</div>}
      {Object.entries(porFecha).map(([fecha,arr])=>{
        const kgDia=arr.reduce((s,m)=>s+(Number(m.kg)||0),0);
        return(
          <div key={fecha}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'14px 0 6px'}}>
              <span style={{fontSize:12,fontWeight:700,color:'var(--txt2)'}}>{fecha===hoyF?'📅 Hoy':fecha}</span>
              <span style={{fontSize:12,color:'var(--red)',fontWeight:700}}>{+kgDia.toFixed(2)} kg</span>
            </div>
            {arr.map(m=>{
              const mo=MOTIVOS[m.motivo]||MOTIVOS.otro;
              return(
                <div key={m.id} className="card">
                  <div className="card-body">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div className="card-name">{m.productoNombre||'Genérico'} · {+Number(m.kg).toFixed(3)} {m.unidad||'kg'}</div>
                        <div style={{marginTop:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                          <span style={{fontSize:11,fontWeight:700,color:mo.color,background:'var(--bg2)',borderRadius:4,padding:'2px 7px'}}>{mo.lbl}</span>
                          {m.descontado&&<span style={{fontSize:10,color:'var(--blue)'}}>↓ descontado del stock</span>}
                          {Number(m.costoUnit)>0&&<span style={{fontSize:11,color:'var(--txt2)'}}>~{formatPeso(Number(m.kg)*Number(m.costoUnit))}</span>}
                        </div>
                        {m.nota&&<div className="card-sub" style={{marginTop:4}}>{m.nota}</div>}
                      </div>
                      <button onClick={()=>eliminar(m.id)} className="btn-ic" style={{color:'var(--red)',flexShrink:0}}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ─── #2 PROVEEDORES ─── */
function SeccionProveedores({uid}){
  const [provs,setProvs]=useState([]);
  const [editId,setEditId]=useState(null); // null=cerrado, ''=nuevo, 'id'=editando
  const [d,setD]=useState({nombre:'',telefono:'',producto:'',notas:''});
  const col=db.collection(`polleria/${uid}/proveedores`);
  useEffect(()=>col.orderBy('nombre','asc').onSnapshot(s=>setProvs(s.docs.map(x=>({id:x.id,...x.data()})))),[]);
  const abrirNuevo=()=>{setD({nombre:'',telefono:'',producto:'',notas:''});setEditId('');};
  const abrirEditar=p=>{setD({nombre:p.nombre||'',telefono:p.telefono||'',producto:p.producto||'',notas:p.notas||''});setEditId(p.id);};
  const cerrar=()=>setEditId(null);
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const guardar=async()=>{
    if(!d.nombre.trim())return alert('El nombre es obligatorio');
    if(editId)await col.doc(editId).update(d);
    else await col.add({...d,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    cerrar();
  };
  const eliminar=async id=>{if(!confirm('¿Eliminar proveedor?'))return;await col.doc(id).delete();if(editId===id)cerrar();};
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div className="sec-title" style={{margin:0}}>🚚 Proveedores mayoristas</div>
        {editId===null&&<button onClick={abrirNuevo} className="btn-pri" style={{fontSize:13,padding:'7px 14px'}}>+ Agregar</button>}
      </div>
      {editId!==null&&(
        <div className="panel">
          <div className="ptitle">{editId?'✏️ Editar proveedor':'🚚 Nuevo proveedor'}</div>
          <Campo label="Nombre *" value={d.nombre} onChange={v=>set('nombre',v)} placeholder="Ej: Avícola del Norte"/>
          <Campo label="📞 Teléfono" value={d.telefono} onChange={v=>set('telefono',v)} placeholder="381-123-4567" tipo="tel"/>
          <Campo label="🐔 Qué provee" value={d.producto} onChange={v=>set('producto',v)} placeholder="Ej: Pollo entero, menudencias..."/>
          <Campo label="📝 Notas" value={d.notas} onChange={v=>set('notas',v)} placeholder="Días de entrega, condiciones..."/>
          <div style={{display:'flex',gap:8,marginTop:14}}>
            <button onClick={guardar} className="btn-pri" style={{flex:1,padding:12}}>{editId?'✓ Guardar':'+ Agregar'}</button>
            <button onClick={cerrar} className="btn-sec" style={{padding:12}}>Cancelar</button>
          </div>
        </div>
      )}
      {provs.length===0&&editId===null&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>🚚</div>No hay proveedores cargados.<br/>Agregá tus proveedores para rastrear de quién vino cada cajón.</div>}
      {provs.map(p=>(
        <div key={p.id} className="card">
          <div className="card-body">
            <div className="card-name">{p.nombre}</div>
            {p.telefono&&<div className="card-sub">📞 {p.telefono}</div>}
            {p.producto&&<div className="card-sub">🐔 {p.producto}</div>}
            {p.notas&&<div className="card-sub" style={{marginTop:2}}>{p.notas}</div>}
            <div className="card-actions">
              <button onClick={()=>abrirEditar(p)} className="btn-ic">✏️ Editar</button>
              <button onClick={()=>eliminar(p.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── #5 LOTES (FIFO + vencimiento) ─── */
function SeccionLotes({uid}){
  const [lotes,setLotes]=useState([]);
  const [verAgotados,setVerAgotados]=useState(false);
  const [,setTick]=useState(0);
  const col=db.collection(`polleria/${uid}/lotes`);
  useEffect(()=>col.onSnapshot(s=>setLotes(s.docs.map(d=>({id:d.id,...d.data()})))),[]);
  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),60000);return()=>clearInterval(t);},[]);

  const agotar=async id=>{if(!confirm('¿Marcar este lote como agotado?'))return;await col.doc(id).update({kgRestante:0,agotado:true});};
  const eliminar=async id=>{if(!confirm('¿Eliminar este lote del registro?'))return;await col.doc(id).delete();};

  const horasDe=l=>{const ts=Number(l.ingresoTs)||0;if(!ts)return 0;return (Date.now()-ts)/3600000;};
  const estadoDe=l=>{const h=horasDe(l);const v=Number(l.vencimientoHoras)||72;if(h>=v)return{k:'vencido',ico:'🔴',txt:'VENCIDO',c:'var(--red)'};if(h>=v*0.66)return{k:'porvencer',ico:'🟡',txt:'Por vencer',c:'var(--orange)'};return{k:'fresco',ico:'🟢',txt:'Fresco',c:'var(--green)'};};
  const fmtHoras=h=>{const hh=Math.floor(h);if(hh<24)return `${hh}h`;const d=Math.floor(hh/24);return `${d}d ${hh%24}h`;};

  const activos=lotes.filter(l=>(Number(l.kgRestante)||0)>0.001&&!l.agotado);
  const agotados=lotes.filter(l=>(Number(l.kgRestante)||0)<=0.001||l.agotado);
  const ordenados=[...activos].sort((a,b)=>(Number(a.ingresoTs)||0)-(Number(b.ingresoTs)||0));
  const alerta=ordenados.filter(l=>estadoDe(l).k!=='fresco');

  return(
    <div>
      <div className="sec-title">📅 Lotes en cámara — FIFO</div>
      <div style={{fontSize:12,color:'var(--txt2)',marginBottom:10}}>Ordenados del más viejo al más nuevo: vendé primero los de arriba. 🟢 fresco · 🟡 por vencer · 🔴 vencido.</div>
      {alerta.length>0&&(
        <div style={{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:12}}>
          <b style={{color:'var(--red)',fontSize:13}}>⚠️ {alerta.length} lote{alerta.length>1?'s':''} para sacar ya: </b>
          <span style={{fontSize:13,color:'var(--txt2)'}}>{alerta.map(l=>`${l.productoNombre} (${fmtHoras(horasDe(l))})`).join(', ')}</span>
        </div>
      )}
      {ordenados.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>📅</div>No hay lotes activos.<br/>Se crean solos al cargar un cajón en 🐔 Cajones.</div>}
      {ordenados.map((l,idx)=>{
        const e=estadoDe(l);
        const pctRest=Number(l.kgInicial)>0?Math.round((Number(l.kgRestante)/Number(l.kgInicial))*100):0;
        return(
          <div key={l.id} className="card" style={{borderColor:e.c}}>
            <div className="card-body">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    {idx===0&&<span style={{fontSize:10,fontWeight:700,color:'var(--green)',background:'var(--green-bg)',borderRadius:4,padding:'1px 6px'}}>SACAR 1°</span>}
                    <span className="card-name">{l.productoNombre}</span>
                  </div>
                  <div className="card-sub" style={{marginTop:3}}>🚚 {l.proveedorNombre||'Sin proveedor'} · 📅 {formatFecha(l.fechaIngreso)} {l.horaIngreso||''}</div>
                  <div className="card-sub">⏱️ {fmtHoras(horasDe(l))} en cámara (vence {l.vencimientoHoras||72}h)</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <span style={{fontSize:11,fontWeight:700,color:e.c,background:'var(--bg2)',borderRadius:4,padding:'2px 7px',whiteSpace:'nowrap'}}>{e.ico} {e.txt}</span>
                  <div style={{fontWeight:700,fontSize:18,color:'var(--txt)',marginTop:6}}>{+Number(l.kgRestante).toFixed(2)} kg</div>
                  <div style={{fontSize:10,color:'var(--txt2)'}}>de {+Number(l.kgInicial).toFixed(2)} ({pctRest}%)</div>
                </div>
              </div>
              <div className="card-actions">
                <button onClick={()=>agotar(l.id)} className="btn-ic">✓ Marcar agotado</button>
                <button onClick={()=>eliminar(l.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
              </div>
            </div>
          </div>
        );
      })}
      {agotados.length>0&&(
        <div style={{marginTop:14}}>
          <button onClick={()=>setVerAgotados(v=>!v)} className="btn-sec" style={{width:'100%'}}>{verAgotados?'▲ Ocultar':'▼ Ver'} agotados ({agotados.length})</button>
          {verAgotados&&agotados.map(l=>(
            <div key={l.id} className="card" style={{opacity:0.6}}>
              <div className="card-body">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div><div className="card-name">{l.productoNombre}</div><div className="card-sub">🚚 {l.proveedorNombre} · 📅 {formatFecha(l.fechaIngreso)}</div></div>
                  <button onClick={()=>eliminar(l.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── #6 DESPOSTE EN VIVO ─── */
function SeccionDesposte({uid}){
  const [stockItems,setStockItems]=useState([]);
  const [kgDesp,setKgDesp]=useState('');
  const [modo,setModo]=useState('piezas');
  const [guardando,setGuardando]=useState(false);
  const [toastMsg,setToastMsg]=useState('');
  const stockCol=db.collection(`polleria/${uid}/stock`);
  useEffect(()=>stockCol.orderBy('nombre','asc').onSnapshot(s=>setStockItems(s.docs.map(d=>({id:d.id,...d.data()})))),[]);
  const mostrar=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};

  const entero=stockItems.find(i=>(i.nombre||'').toLowerCase().includes('entero'));
  const dispEntero=entero?Number(entero.cantidad)||0:0;
  const costoEntero=entero?Number(entero.precioCosto)||0:0;

  const CORTES={
    piezas:{label:'🍗 Trozado', piezas:[
      {n:'Pechugas',pct:0.25},{n:'Pata-muslo',pct:0.30},{n:'Alas',pct:0.18},{n:'Muslos',pct:0.14},{n:'Carcasas',pct:0.13},
    ]},
    filet:{label:'🥩 Filet', piezas:[
      {n:'Filet pechuga',pct:0.25},{n:'Milanesas',pct:0.22},{n:'Pata-muslo',pct:0.30},{n:'Carcasas caldo',pct:0.13},
    ]},
  };
  const M=CORTES[modo];
  const kg=parseFloat(kgDesp)||0;
  const cortesKg=M.piezas.map(p=>({...p,kg:+(kg*p.pct).toFixed(3)}));
  const totalCortes=cortesKg.reduce((s,p)=>s+p.kg,0);
  const mermaKg=+(kg-totalCortes).toFixed(3);

  const despostar=async()=>{
    if(!entero)return alert('No encontré stock de "Pollo entero". Cargá un cajón en modo 🐔 Entero primero.');
    if(kg<=0)return alert('Ingresá cuántos kg vas a despostar');
    if(kg>dispEntero)return alert(`Solo tenés ${dispEntero} kg de pollo entero`);
    setGuardando(true);
    try{
      await stockCol.doc(entero.id).update({cantidad:Math.max(0,+(dispEntero-kg).toFixed(3))});
      const prodCol=db.collection(`polleria/${uid}/productos`);
      for(const c of cortesKg){
        if(c.kg<=0)continue;
        const docId='pollo-'+c.n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s/]+/g,'-');
        const ref=stockCol.doc(docId);
        const snap=await ref.get();
        const actual=snap.exists?(Number(snap.data().cantidad)||0):0;
        const precioPrev=snap.exists?(Number(snap.data().precioVenta)||0):0;
        const precioVenta=precioPrev>0?precioPrev:(PRECIOS_MERCADO_POLLO[c.n]?.sug||Math.round(costoEntero*1.4));
        await ref.set({
          nombre:c.n,categoria:'Pollo',tipo:'cajon',
          cantidad:+(actual+c.kg).toFixed(3),
          unidad:'kg',precioCosto:costoEntero,precioVenta,stockMinimo:0,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        },{merge:true});
        await prodCol.doc(docId).set({nombre:c.n,categoria:'🐔 Pollo',unidad:'kg',precioCosto:costoEntero,precioVenta,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
      if(mermaKg>0.001){
        await db.collection(`polleria/${uid}/mermas`).add({
          fecha:hoy(),productoId:entero.id,productoNombre:'Pollo entero (desposte)',
          kg:mermaKg,unidad:'kg',motivo:'grasa',costoUnit:costoEntero,
          nota:`Recorte de despostar ${kg}kg`,descontado:true,
          createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      setKgDesp('');
      mostrar(`✅ Desposté ${kg}kg → ${cortesKg.length} cortes`);
    }catch(e){alert('Error: '+e.message);}
    setGuardando(false);
  };

  return(
    <div>
      <Toast msg={toastMsg}/>
      <div className="panel">
        <div className="ptitle">🔪 Despostar pollo entero → cortes</div>
        {entero?(
          <div className="suma-band" style={{marginBottom:10}}>
            <span style={{fontSize:13,color:'var(--txt2)'}}>Disponible: <b style={{color:'var(--txt)'}}>{entero.nombre}</b></span>
            <span style={{fontSize:18,fontWeight:700,color:'var(--txt)'}}>{dispEntero} kg</span>
          </div>
        ):(
          <div style={{background:'var(--orange-bg)',border:'1px solid var(--orange)',borderRadius:'var(--radius)',padding:'10px 12px',marginBottom:10,fontSize:13,color:'var(--orange)'}}>
            ⚠️ No hay stock de "Pollo entero". Cargá un cajón en 🧮 Cargar cajón (modo 🐔 Entero) primero.
          </div>
        )}
        <label className="lbl">¿Cuántos kg despostar?</label>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
          <input type="number" step="0.1" min="0" value={kgDesp} onChange={e=>setKgDesp(e.target.value)} className="inp" placeholder="0" style={{fontWeight:700,fontSize:22,flex:1}}/>
          {entero&&<button onClick={()=>setKgDesp(String(dispEntero))} className="btn-sec" style={{padding:'8px 12px',flexShrink:0}}>Todo</button>}
        </div>
        <label className="lbl">Tipo de corte</label>
        <div className="chip-group" style={{marginBottom:10}}>
          {Object.entries(CORTES).map(([k,v])=>(<button key={k} onClick={()=>setModo(k)} className={`chip${modo===k?' activo':''}`}>{v.label}</button>))}
        </div>
        {kg>0&&(
          <div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:'10px 12px',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--txt2)',marginBottom:6}}>Vas a obtener:</div>
            {cortesKg.map(c=>(
              <div key={c.n} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:13}}>
                <span style={{color:'var(--txt2)'}}>{c.n}</span>
                <b style={{color:'var(--txt)'}}>{c.kg} kg</b>
              </div>
            ))}
            {mermaKg>0.001&&<div style={{display:'flex',justifyContent:'space-between',padding:'3px 0',fontSize:13,borderTop:'1px solid var(--border)',marginTop:4,paddingTop:6}}>
              <span style={{color:'var(--red)'}}>🥩 Merma (recorte)</span><b style={{color:'var(--red)'}}>{mermaKg} kg</b>
            </div>}
          </div>
        )}
        <button onClick={despostar} disabled={guardando||!entero||kg<=0} className="btn-full" style={{background:'var(--orange)',opacity:(!entero||kg<=0)?0.4:1}}>
          {guardando?'⏳ Despostando...':'🔪 Despostar ahora'}
        </button>
        <div style={{fontSize:11,color:'var(--txt3)',marginTop:8,textAlign:'center'}}>Resta del pollo entero y suma a los cortes. La merma del recorte se registra sola.</div>
      </div>
    </div>
  );
}

/* Envoltorio: alterna entre cargar cajón y despostar */
/* ─── PARTE B: PRODUCCIÓN (carne limpia → milanesa/molida/albóndiga/kipe) ─── */
function SeccionProduccion({uid}){
  const PROD_DEFAULT={hueso:10,milanesa:20,molida:0,albondiga:15,kipe:25};
  const [cfg,setCfg]=useState(PROD_DEFAULT);
  const [editandoCfg,setEditandoCfg]=useState(false);
  const [guardandoCfg,setGuardandoCfg]=useState(false);
  const [cajones,setCajones]=useState(1);
  const [kgCajon,setKgCajon]=useState(20);
  const [precioCajon,setPrecioCajon]=useState('');
  const [rendimientoPct,setRendimientoPct]=useState(90);
  const [margenObj,setMargenObj]=useState(30);
  const [allocMila,setAllocMila]=useState(60);
  const [repMolida,setRepMolida]=useState(40);
  const [repAlbondiga,setRepAlbondiga]=useState(30);
  const [repKipe,setRepKipe]=useState(30);
  const [guardando,setGuardando]=useState(false);
  const [toastMsg,setToastMsg]=useState('');
  const cfgRef=db.collection(`polleria/${uid}/config`).doc('produccion');
  useEffect(()=>{cfgRef.get().then(s=>{if(s.exists)setCfg({...PROD_DEFAULT,...s.data()});}).catch(()=>{});},[]);
  const mostrar=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};

  const totKg=+(cajones*kgCajon).toFixed(2);
  const vendibleKg=+(totKg*rendimientoPct/100).toFixed(2);
  const carneLimpiaKg=+(vendibleKg*(1-(Number(cfg.hueso)||0)/100)).toFixed(2);
  const precioTotal=Number(precioCajon)*cajones||0;
  const costoCarneKg=carneLimpiaKg>0&&precioTotal>0?precioTotal/carneLimpiaKg:0;

  const carneMila=+(carneLimpiaKg*(Number(allocMila)||0)/100).toFixed(2);
  const carneMoler=+(carneLimpiaKg-carneMila).toFixed(2);
  const sumaRep=(Number(repMolida)||0)+(Number(repAlbondiga)||0)+(Number(repKipe)||0);
  const carneMolida=+(carneMoler*(Number(repMolida)||0)/100).toFixed(2);
  const carneAlbondiga=+(carneMoler*(Number(repAlbondiga)||0)/100).toFixed(2);
  const carneKipe=+(carneMoler*(Number(repKipe)||0)/100).toFixed(2);

  const calc=(nombre,carne,rinde)=>{
    const kgFinal=+(carne*(1+(Number(rinde)||0)/100)).toFixed(2);
    const costoKg=kgFinal>0?+(carne*costoCarneKg/kgFinal).toFixed(2):0;
    const precio=Math.round(costoKg*(1+(Number(margenObj)||0)/100));
    return {nombre,carne,rinde:Number(rinde)||0,kgFinal,costoKg,precio};
  };
  const productos=[
    calc('Milanesa de pollo',carneMila,cfg.milanesa),
    calc('Carne molida',carneMolida,cfg.molida),
    calc('Albóndigas',carneAlbondiga,cfg.albondiga),
    calc('Kipe de pollo',carneKipe,cfg.kipe),
  ].filter(p=>p.carne>0);

  const setCfgK=(k,v)=>setCfg(c=>({...c,[k]:v}));
  const guardarCfg=async()=>{
    setGuardandoCfg(true);
    try{
      await cfgRef.set({hueso:Number(cfg.hueso)||0,milanesa:Number(cfg.milanesa)||0,molida:Number(cfg.molida)||0,albondiga:Number(cfg.albondiga)||0,kipe:Number(cfg.kipe)||0},{merge:true});
      setEditandoCfg(false);mostrar('✅ Rindes guardados');
    }catch(e){alert('Error: '+e.message);}
    setGuardandoCfg(false);
  };

  const producir=async()=>{
    if(precioTotal<=0)return alert('Cargá el precio del cajón');
    if(carneLimpiaKg<=0)return alert('No hay carne para producir');
    setGuardando(true);
    try{
      const stockCol=db.collection(`polleria/${uid}/stock`);
      const prodCol=db.collection(`polleria/${uid}/productos`);
      for(const p of productos){
        if(p.kgFinal<=0)continue;
        const docId='prod-'+p.nombre.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s/]+/g,'-');
        const ref=stockCol.doc(docId);
        const snap=await ref.get();
        const actual=snap.exists?(Number(snap.data().cantidad)||0):0;
        await ref.set({nombre:p.nombre,categoria:'Preparados',tipo:'produccion',cantidad:+(actual+p.kgFinal*1.10).toFixed(2),unidad:'kg',precioCosto:p.costoKg,precioVenta:p.precio,stockMinimo:0,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
        await prodCol.doc(docId).set({nombre:p.nombre,categoria:'🍴 Preparados',unidad:'kg',precioCosto:p.costoKg,precioVenta:p.precio,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
      mostrar(`✅ ${productos.length} productos al stock`);
    }catch(e){alert('Error: '+e.message);}
    setGuardando(false);
  };

  const COL=(lbl,k)=>(
    <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
      <span style={{flex:1,fontSize:13,color:'var(--txt)'}}>{lbl}</span>
      <input type="number" min={0} value={cfg[k]} onChange={e=>setCfgK(k,e.target.value)} className="inp" style={{width:64,textAlign:'center',padding:'5px 4px',fontSize:13,fontWeight:700}}/>
      <span style={{fontSize:11,color:'var(--txt3)',width:14}}>%</span>
    </div>
  );

  return(
    <div>
      <Toast msg={toastMsg}/>
      <div className="panel">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div className="ptitle" style={{margin:0}}>🍴 Producción</div>
          <button onClick={()=>setEditandoCfg(v=>!v)} style={{fontSize:11,padding:'5px 10px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:editandoCfg?'var(--blue-bg)':'var(--bg2)',color:editandoCfg?'var(--blue)':'var(--txt2)',cursor:'pointer',fontWeight:600}}>⚙️ Rindes</button>
        </div>
        {editandoCfg&&(
          <div style={{background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:'var(--radius)',padding:'12px',marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginBottom:2}}>⚙️ Rindes de producción</div>
            <div style={{fontSize:11,color:'var(--txt2)',marginBottom:10}}>Hueso = lo que se saca al deshuesar. Los rindes suman peso (rebozado, pan, trigo).</div>
            {COL('🦴 Hueso a sacar','hueso')}
            {COL('🍤 Milanesa (rebozado)','milanesa')}
            {COL('🥩 Molida','molida')}
            {COL('🧆 Albóndiga (pan)','albondiga')}
            {COL('🥟 Kipe (trigo)','kipe')}
            <button onClick={guardarCfg} disabled={guardandoCfg} className="btn-pri" style={{width:'100%',padding:10,fontSize:13,marginTop:6}}>{guardandoCfg?'Guardando...':'💾 Guardar rindes'}</button>
          </div>
        )}
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>Cajones</label>
            <input type="number" min={1} value={cajones} onChange={e=>setCajones(Math.max(1,parseInt(e.target.value)||1))} className="inp" style={{fontWeight:700}}/>
          </div>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>Kg/cajón</label>
            <input type="number" min={1} value={kgCajon} onChange={e=>setKgCajon(Math.max(1,Number(e.target.value)||1))} className="inp" style={{fontWeight:700}}/>
          </div>
        </div>
        <label className="lbl">💸 Precio pagado por cajón ($)</label>
        <input type="number" min={0} value={precioCajon} onChange={e=>setPrecioCajon(e.target.value)} className="inp" placeholder="0" style={{fontWeight:700,fontSize:18}}/>
        <label className="lbl">Rendimiento del cajón: {rendimientoPct}%</label>
        <input type="range" min={50} max={98} value={rendimientoPct} onChange={e=>setRendimientoPct(Number(e.target.value))} style={{width:'100%'}}/>
        <div className="suma-band" style={{marginTop:8}}>
          <span style={{fontSize:13,color:'var(--txt2)'}}>Carne limpia disponible</span>
          <span style={{fontSize:20,fontWeight:700,color:'var(--txt)'}}>{carneLimpiaKg} kg</span>
        </div>
      </div>

      <div className="panel">
        <div className="ptitle">✂️ ¿Qué vas a producir?</div>
        <label className="lbl" style={{marginTop:0}}>De la carne limpia, ¿cuánto a milanesa?</label>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
          <input type="number" min={0} max={100} value={allocMila} onChange={e=>setAllocMila(Math.min(100,Math.max(0,Number(e.target.value))))} className="inp" style={{width:70,textAlign:'center',fontWeight:700}}/>
          <span style={{fontSize:12,color:'var(--txt3)'}}>%</span>
          <span style={{fontSize:12,color:'var(--txt2)',marginLeft:'auto'}}>🍤 {carneMila} kg a milanesa · 🥩 {carneMoler} kg a moler</span>
        </div>
        <label className="lbl">De lo que va a moler, repartí:</label>
        <div style={{display:'flex',gap:6,fontSize:10,color:'var(--txt3)',fontWeight:700,padding:'0 2px 4px'}}>
          <span style={{flex:1}}>PRODUCTO</span><span style={{width:54,textAlign:'center'}}>%</span><span style={{width:70,textAlign:'right'}}>carne</span>
        </div>
        {[['🥩 Molida',repMolida,setRepMolida,carneMolida],['🧆 Albóndiga',repAlbondiga,setRepAlbondiga,carneAlbondiga],['🥟 Kipe',repKipe,setRepKipe,carneKipe]].map(([lbl,val,setter,kg],i)=>(
          <div key={i} style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
            <span style={{flex:1,fontSize:13,color:'var(--txt)'}}>{lbl}</span>
            <input type="number" min={0} value={val} onChange={e=>setter(Math.max(0,Number(e.target.value)))} className="inp" style={{width:54,textAlign:'center',padding:'5px 4px',fontSize:13,fontWeight:700}}/>
            <span style={{width:70,textAlign:'right',fontSize:12,color:'var(--txt2)'}}>{kg} kg</span>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:sumaRep===100?'var(--green)':'var(--orange)',fontWeight:700,marginTop:2}}>
          <span>Suma</span><span>{sumaRep}% {sumaRep===100?'✓':'(debería dar 100)'}</span>
        </div>
      </div>

      <div className="panel">
        <div style={{background:'var(--green-bg)',border:'1px solid var(--green)',borderRadius:'var(--radius)',padding:'10px 12px',marginBottom:12}}>
          <label className="lbl" style={{marginTop:0,color:'var(--green)',fontWeight:700,fontSize:12}}>🎯 ¿Cuánto querés ganar?</label>
          <div style={{display:'flex',gap:6,alignItems:'center',marginTop:6}}>
            {[30,40,50].map(m=>(<button key={m} onClick={()=>setMargenObj(m)} className={`chip${margenObj===m?' activo':''}`} style={{flex:1}}>{m}%</button>))}
            <input type="number" min={0} value={margenObj} onChange={e=>setMargenObj(Math.max(0,Number(e.target.value)))} className="inp" style={{width:64,textAlign:'center',fontWeight:700,padding:'5px 6px'}}/>
          </div>
        </div>
        <div className="ptitle">🏷️ Te salen estos productos</div>
        {productos.length===0&&<div style={{fontSize:13,color:'var(--txt3)',padding:'10px 0'}}>Cargá cajones y precio para ver el resultado.</div>}
        {productos.map(p=>(
          <div key={p.nombre} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:500,color:'var(--txt)'}}>{p.nombre}</div>
              <div style={{fontSize:11,color:'var(--txt2)'}}>{p.kgFinal} kg · costo {formatPeso(p.costoKg)}/kg</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:16,fontWeight:700,color:'var(--green)'}}>{formatPeso(p.precio)}</div>
              <div style={{fontSize:10,color:'var(--txt3)'}}>por kg</div>
            </div>
          </div>
        ))}
        <button onClick={producir} disabled={guardando||precioTotal<=0} className="btn-full" style={{background:'var(--green)',marginTop:12,opacity:precioTotal<=0?0.4:1}}>
          {guardando?'⏳ Mandando...':'📦 Mandar todo al stock'}
        </button>
      </div>
    </div>
  );
}

function SeccionPollo({uid}){
  const [modo,setModo]=useState('cargar');
  return(
    <div>
      <div className="tab-bar" style={{marginBottom:12}}>
        <button onClick={()=>setModo('cargar')} className={`tab-btn${modo==='cargar'?' activo':''}`} style={{flex:1}}>🍗 Trozado</button>
        <button onClick={()=>setModo('produccion')} className={`tab-btn${modo==='produccion'?' activo':''}`} style={{flex:1}}>🍴 Producción</button>
      </div>
      {modo==='cargar'?<CalculadoraCajon uid={uid}/>:<SeccionProduccion uid={uid}/>}
    </div>
  );
}

/* ─── #7 RECETAS COMPUESTAS ─── */
function SeccionRecetas({uid}){
  const [recetas,setRecetas]=useState([]);
  const [stockItems,setStockItems]=useState([]);
  const [editId,setEditId]=useState(null);
  const [d,setD]=useState({nombre:'',rinde:1,unidadRinde:'unidad',precioVenta:'',ingredientes:[]});
  const [selIng,setSelIng]=useState('');
  const [tandas,setTandas]=useState({});
  const [toastMsg,setToastMsg]=useState('');
  const recCol=db.collection(`polleria/${uid}/recetas`);
  const stockCol=db.collection(`polleria/${uid}/stock`);
  useEffect(()=>{
    const u1=recCol.orderBy('nombre','asc').onSnapshot(s=>setRecetas(s.docs.map(x=>({id:x.id,...x.data()}))));
    const u2=stockCol.orderBy('nombre','asc').onSnapshot(s=>setStockItems(s.docs.map(x=>({id:x.id,...x.data()}))));
    return()=>{u1();u2();};
  },[]);
  const mostrar=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};
  const costoActual=ing=>{const st=stockItems.find(i=>(i.nombre||'').toLowerCase().trim()===(ing.nombre||'').toLowerCase().trim());return st&&Number(st.precioCosto)>0?Number(st.precioCosto):(Number(ing.costoUnit)||0);};
  const costoDe=r=>(r.ingredientes||[]).reduce((s,ing)=>s+(Number(ing.cantidad)||0)*costoActual(ing),0);

  const abrirNuevo=()=>{setD({nombre:'',rinde:1,unidadRinde:'unidad',precioVenta:'',ingredientes:[]});setEditId('');};
  const abrirEditar=r=>{setD({nombre:r.nombre||'',rinde:r.rinde||1,unidadRinde:r.unidadRinde||'unidad',precioVenta:r.precioVenta||'',ingredientes:(r.ingredientes||[]).map(i=>({...i}))});setEditId(r.id);};
  const cerrar=()=>{setEditId(null);setSelIng('');};
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const setIng=(idx,k,v)=>setD(p=>({...p,ingredientes:p.ingredientes.map((it,i)=>i===idx?{...it,[k]:v}:it)}));
  const quitarIng=idx=>setD(p=>({...p,ingredientes:p.ingredientes.filter((_,i)=>i!==idx)}));
  const agregarDesdeStock=()=>{const st=stockItems.find(i=>i.id===selIng);if(!st)return;setD(p=>({...p,ingredientes:[...p.ingredientes,{nombre:st.nombre,cantidad:1,unidad:st.unidad||'kg',costoUnit:Number(st.precioCosto)||0}]}));setSelIng('');};
  const agregarManual=()=>setD(p=>({...p,ingredientes:[...p.ingredientes,{nombre:'',cantidad:1,unidad:'kg',costoUnit:0}]}));

  const guardar=async()=>{
    if(!d.nombre.trim())return alert('Ponele un nombre a la receta');
    if(!d.ingredientes.length)return alert('Agregá al menos un ingrediente');
    const payload={nombre:d.nombre.trim(),rinde:Number(d.rinde)||1,unidadRinde:d.unidadRinde,precioVenta:Number(d.precioVenta)||0,ingredientes:d.ingredientes.map(i=>({nombre:(i.nombre||'').trim(),cantidad:Number(i.cantidad)||0,unidad:i.unidad||'kg',costoUnit:Number(i.costoUnit)||0}))};
    if(editId)await recCol.doc(editId).update(payload);
    else await recCol.add({...payload,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    cerrar();
  };
  const eliminar=async id=>{if(!confirm('¿Eliminar receta?'))return;await recCol.doc(id).delete();};

  const producir=async r=>{
    const n=Number(tandas[r.id])||1;
    if(n<=0)return;
    if(!confirm(`¿Producir ${n} tanda(s) de "${r.nombre}"? Se descontarán los ingredientes del stock.`))return;
    try{
      for(const ing of (r.ingredientes||[])){
        const st=stockItems.find(i=>(i.nombre||'').toLowerCase().trim()===(ing.nombre||'').toLowerCase().trim());
        if(st){const usar=(Number(ing.cantidad)||0)*n;await stockCol.doc(st.id).update({cantidad:Math.max(0,+(((Number(st.cantidad)||0)-usar)).toFixed(3))});}
      }
      const docId='receta-'+r.nombre.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s/]+/g,'-');
      const costoUnitTerm=(Number(r.rinde)>0)?+(costoDe(r)/Number(r.rinde)).toFixed(2):0;
      const ref=stockCol.doc(docId);
      const snap=await ref.get();
      const actual=snap.exists?(Number(snap.data().cantidad)||0):0;
      const totalRinde=actual+(Number(r.rinde)||1)*n;
      await ref.set({nombre:r.nombre,categoria:'Preparados',tipo:'receta',cantidad:+totalRinde.toFixed(3),unidad:r.unidadRinde||'unidad',precioCosto:costoUnitTerm,precioVenta:Number(r.precioVenta)||0,stockMinimo:0,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      await db.collection(`polleria/${uid}/productos`).doc(docId).set({nombre:r.nombre,categoria:'🍴 Preparados',unidad:r.unidadRinde||'unidad',precioCosto:costoUnitTerm,precioVenta:Number(r.precioVenta)||0,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      mostrar(`✅ Produjiste ${(Number(r.rinde)||1)*n} ${r.unidadRinde} de ${r.nombre}`);
    }catch(e){alert('Error: '+e.message);}
  };

  const UNI=['unidad','kg','g','docena','litro','bandeja'];
  const costoForm=d.ingredientes.reduce((s,ing)=>s+(Number(ing.cantidad)||0)*costoActual(ing),0);
  const costoUnitForm=Number(d.rinde)>0?costoForm/Number(d.rinde):0;
  const margenForm=costoUnitForm>0&&Number(d.precioVenta)>0?Math.round(((Number(d.precioVenta)-costoUnitForm)/costoUnitForm)*100):null;

  return(
    <div>
      <Toast msg={toastMsg}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div className="sec-title" style={{margin:0}}>👨‍🍳 Recetas / preparados</div>
        {editId===null&&<button onClick={abrirNuevo} className="btn-pri" style={{fontSize:13,padding:'7px 14px'}}>+ Nueva</button>}
      </div>

      {editId!==null&&(
        <div className="panel">
          <div className="ptitle">{editId?'✏️ Editar receta':'👨‍🍳 Nueva receta'}</div>
          <Campo label="Nombre del producto *" value={d.nombre} onChange={v=>set('nombre',v)} placeholder="Ej: Milanesas de pollo"/>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}><Campo label="Rinde (cuántas produce)" value={d.rinde} onChange={v=>set('rinde',v)} tipo="number" placeholder="10"/></div>
            <div style={{flex:1}}>
              <label className="lbl">Unidad</label>
              <select value={d.unidadRinde} onChange={e=>set('unidadRinde',e.target.value)} className="inp">{UNI.map(u=><option key={u} value={u}>{u}</option>)}</select>
            </div>
          </div>

          <label className="lbl">🧾 Ingredientes</label>
          {d.ingredientes.length===0&&<div style={{fontSize:12,color:'var(--txt3)',marginBottom:8}}>Agregá los ingredientes desde tu stock o manualmente.</div>}
          {d.ingredientes.map((ing,idx)=>{
            const cActual=costoActual(ing);
            const enStock=stockItems.some(i=>(i.nombre||'').toLowerCase().trim()===(ing.nombre||'').toLowerCase().trim());
            return(
              <div key={idx} style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:'8px 10px',marginBottom:6}}>
                <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
                  <input value={ing.nombre} onChange={e=>setIng(idx,'nombre',e.target.value)} className="inp" placeholder="Ingrediente" style={{flex:1,padding:'5px 8px',fontSize:13}}/>
                  <button onClick={()=>quitarIng(idx)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:16,flexShrink:0}}>✕</button>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <input type="number" step="0.001" value={ing.cantidad} onChange={e=>setIng(idx,'cantidad',e.target.value)} className="inp" placeholder="cant" style={{width:64,padding:'5px 6px',fontSize:13,textAlign:'center'}}/>
                  <select value={ing.unidad} onChange={e=>setIng(idx,'unidad',e.target.value)} className="inp" style={{width:78,padding:'5px 4px',fontSize:12}}>{UNI.map(u=><option key={u} value={u}>{u}</option>)}</select>
                  <span style={{fontSize:11,color:'var(--txt2)'}}>×</span>

                  <span style={{fontSize:12,fontWeight:700,color:'var(--txt)',whiteSpace:'nowrap'}}>{formatPeso((Number(ing.cantidad)||0)*cActual)}</span>
                </div>
                {enStock&&<div style={{fontSize:10,color:'var(--blue)',marginTop:3}}>↻ costo tomado del stock (se actualiza solo)</div>}
              </div>
            );

            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}><span style={{color:'var(--txt2)'}}>Costo total receta</span><b style={{color:'var(--txt)'}}>{formatPeso(costoForm)}</b></div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}><span style={{color:'var(--txt2)'}}>Costo por {d.unidadRinde}</span><b style={{color:'var(--orange)'}}>{formatPeso(costoUnitForm)}</b></div>
            {margenForm!==null&&<div style={{display:'flex',justifyContent:'space-between',fontSize:13}}><span style={{color:'var(--txt2)'}}>Ganancia por {d.unidadRinde}</span><b style={{color:margenForm>=0?'var(--green)':'var(--red)'}}>{margenForm}% ({formatPeso(Number(d.precioVenta)-costoUnitForm)})</b></div>}
          </div>

          <div style={{display:'flex',gap:8,marginTop:14}}>
            <button onClick={guardar} className="btn-pri" style={{flex:1,padding:12}}>{editId?'✓ Guardar':'+ Crear receta'}</button>
            <button onClick={cerrar} className="btn-sec" style={{padding:12}}>Cancelar</button>
          </div>
        </div>
      )}

      {recetas.length===0&&editId===null&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>👨‍🍳</div>No hay recetas.<br/>Creá tus preparados (milanesas, hamburguesas) para calcular su costo real.</div>}
      {recetas.map(r=>{
        const costo=costoDe(r);
        const costoUnit=Number(r.rinde)>0?costo/Number(r.rinde):0;
        const margen=costoUnit>0&&Number(r.precioVenta)>0?Math.round(((Number(r.precioVenta)-costoUnit)/costoUnit)*100):null;
        return(
          <div key={r.id} className="card">
            <div className="card-body">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div className="card-name">{r.nombre}</div>
                  <div className="card-sub">Rinde {r.rinde} {r.unidadRinde} · {(r.ingredientes||[]).length} ingredientes</div>
                  <div className="card-sub">Costo/u: <b style={{color:'var(--orange)'}}>{formatPeso(costoUnit)}</b> · Venta: {formatPeso(r.precioVenta)}</div>
                  {margen!==null&&<span className={margen>=30?'pill pill-green':margen>=10?'pill pill-orange':'pill pill-red'} style={{marginTop:4,display:'inline-block'}}>Ganancia: {margen}%</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center',marginTop:10}}>
                <span style={{fontSize:12,color:'var(--txt2)'}}>Tandas:</span>
                <input type="number" min={1} value={tandas[r.id]||1} onChange={e=>setTandas(t=>({...t,[r.id]:e.target.value}))} className="inp" style={{width:56,padding:'5px 6px',textAlign:'center',fontWeight:700}}/>
                <button onClick={()=>producir(r)} className="btn-pri" style={{flex:1,padding:'8px 6px',fontSize:13,background:'var(--green)'}}>👨‍🍳 Producir</button>
              </div>
              <div className="card-actions">
                <button onClick={()=>abrirEditar(r)} className="btn-ic">✏️ Editar</button>
                <button onClick={()=>eliminar(r.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PantallaStock({uid}){
  const [items,setItems]=useState([]);const [form,setForm]=useState(null);const [verduForm,setVerduForm]=useState(null);
  const [buscar,setBuscar]=useState('');const [sec,setSec]=useState('stock');
  const col=db.collection(`polleria/${uid}/stock`);
  useEffect(()=>col.orderBy('nombre','asc').onSnapshot(snap=>setItems(snap.docs.map(d=>({id:d.id,...d.data()})))),[]);
  const guardar=async d=>{const{id,...r}=d;if(id)await col.doc(id).update(r);else await col.add(r);setForm(null);};
  const guardarVerdu=async d=>{const{id,...r}=d;if(id)await col.doc(id).update(r);else await col.add({...r,tipo:'verduleria',categoria:'Verdulería'});setVerduForm(null);};
  const eliminar=async id=>{if(!confirm('¿Eliminar?'))return;await col.doc(id).delete();};
  const ajustar=async(id,delta)=>{const i=items.find(x=>x.id===id);if(!i)return;await col.doc(id).update({cantidad:Math.max(0,(Number(i.cantidad)||0)+delta)});};
  if(form!==null) return <FormStock inicial={form} onGuardar={guardar} onCancelar={()=>setForm(null)}/>;
  if(verduForm!==null) return <FormVerduleria inicial={verduForm} onGuardar={guardarVerdu} onCancelar={()=>setVerduForm(null)}/>;
  const bajos=items.filter(i=>Number(i.cantidad)<=Number(i.stockMinimo||0));
  const filtrados=items.filter(i=>i.nombre.toLowerCase().includes(buscar.toLowerCase()));
  const CAT_ICONS={'Pollo':'🐔','Congelados':'❄️','Verdulería':'🥦','General':'📦'};
  const porCat={};filtrados.forEach(i=>{const cat=i.categoria||'General';if(!porCat[cat])porCat[cat]=[];porCat[cat].push(i);});
  const headerAdd=sec==='stock'?()=>setForm({}):sec==='verduleria'?()=>setVerduForm({}):null;
  return(
    <div>
      <Header titulo="Stock / Inventario" onAdd={headerAdd}/>
      <div className="app-body">
        <div className="tab-bar" style={{overflowX:'auto'}}>
          {[{k:'stock',lbl:'📦 Inventario'},{k:'cajon',lbl:'🐔 Cajones'},{k:'congelados',lbl:'❄️ Congelados'},{k:'verduleria',lbl:'🥦 Verdulería'},{k:'precios',lbl:'💰 Precios'}].map(s=>(
            <button key={s.k} onClick={()=>setSec(s.k)} className={`tab-btn${sec===s.k?' activo':''}`} style={{flexShrink:0,whiteSpace:'nowrap'}}>{s.lbl}</button>
          ))}
        </div>
        {sec==='stock'&&<>
          {bajos.length>0&&<div style={{background:'var(--orange-bg)',border:'1px solid var(--orange)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:10}}><b style={{color:'var(--orange)',fontSize:13}}>⚠️ Stock bajo: </b><span style={{fontSize:13,color:'var(--txt2)'}}>{bajos.map(i=>i.nombre).join(', ')}</span></div>}
          <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar..." className="search" style={{marginBottom:12}}/>
          {filtrados.length===0&&items.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>📦</div>No hay stock<br/><button onClick={()=>setForm({})} className="btn-pri" style={{marginTop:16}}>+ Agregar</button></div>}
          {Object.entries(porCat).map(([cat,catItems])=>(
            <div key={cat}>
              <div className="sec-title">{CAT_ICONS[cat]||'📦'} {cat} ({catItems.length})</div>
              {catItems.map(item=>{
                const bajo=Number(item.cantidad)<=Number(item.stockMinimo||0);
                const ganPct=item.precioCosto>0&&item.precioVenta>0?Math.round(((item.precioVenta-item.precioCosto)/item.precioCosto)*100):null;
                return(
                  <div key={item.id} className="card" style={{borderColor:bajo?'var(--orange)':'var(--border)'}}>
                    <div className="card-body">
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <div className="card-name">{item.nombre}</div>
                          {item.precioCosto>0&&<div className="card-sub">Costo: {formatPeso(item.precioCosto)}/{item.unidad} · Venta: {formatPeso(item.precioVenta)}/{item.unidad}</div>}
                          {item.stockMinimo>0&&<div className="card-sub">Mínimo: {item.stockMinimo} {item.unidad}</div>}
                          {ganPct!==null&&<span className={ganPct>=30?'pill pill-green':ganPct>=10?'pill pill-orange':'pill pill-red'} style={{marginTop:4,display:'inline-block'}}>Ganancia: {ganPct}%</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <button onClick={()=>ajustar(item.id,-1)} style={{width:32,height:32,borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg)',cursor:'pointer',fontSize:18,color:'var(--txt)'}}>−</button>
                          <div style={{textAlign:'center',minWidth:56}}><div style={{fontWeight:700,fontSize:20,color:'var(--txt)'}}>{item.cantidad||0}</div><div style={{fontSize:10,color:'var(--txt2)'}}>{item.unidad}</div></div>
                          <button onClick={()=>ajustar(item.id,1)} style={{width:32,height:32,borderRadius:'var(--radius)',border:'none',background:'var(--txt)',color:'var(--bg)',cursor:'pointer',fontSize:18}}>+</button>
                        </div>
                      </div>
                      <div className="card-actions">
                        <button onClick={()=>item.tipo==='verduleria'?setVerduForm(item):setForm(item)} className="btn-ic">✏️ Editar</button>
                        <button onClick={()=>eliminar(item.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </>}
        {sec==='cajon'&&<SeccionPollo uid={uid}/>}
        {sec==='lotes'&&<SeccionLotes uid={uid}/>}
        {sec==='congelados'&&<CalculadoraCongelados uid={uid}/>}
        {sec==='verduleria'&&<SeccionVerduleria items={items.filter(i=>i.tipo==='verduleria')} onAgregar={()=>setVerduForm({})} onEditar={item=>setVerduForm(item)} onEliminar={eliminar} onAjustar={ajustar}/>}
        {sec==='mermas'&&<SeccionMermas uid={uid} stockItems={items}/>}
        {sec==='recetas'&&<SeccionRecetas uid={uid}/>}
        {sec==='proveedores'&&<SeccionProveedores uid={uid}/>}
        {sec==='precios'&&<PantallaPrecios uid={uid} sinHeader={true}/>}
      </div>
    </div>
  );
}

function FormStock({inicial,onGuardar,onCancelar}){
  const UNIDADES=['kg','g','unidades','litros','atados','bandejas','docenas'];
  const [d,setD]=useState({nombre:'',cantidad:0,unidad:'kg',stockMinimo:0,...inicial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const guardar=()=>{if(!d.nombre.trim())return alert('El nombre es obligatorio');onGuardar({...d,cantidad:Number(d.cantidad)||0,stockMinimo:Number(d.stockMinimo)||0});};
  return(
    <div>
      <Header titulo={d.id?'Editar Item':'Nuevo Item'} onBack={onCancelar}/>
      <div className="app-body">
        <Campo label="Nombre *" value={d.nombre} onChange={v=>set('nombre',v)} placeholder="Ej: Pollo entero"/>
        <label className="lbl">Unidad</label>
        <div className="chip-group">{UNIDADES.map(u=><button key={u} onClick={()=>set('unidad',u)} className={`chip${d.unidad===u?' activo':''}`}>{u}</button>)}</div>
        <Campo label={`Cantidad actual (${d.unidad})`} value={d.cantidad} onChange={v=>set('cantidad',v)} tipo="number" placeholder="0"/>
        <Campo label={`Stock mínimo (${d.unidad})`} value={d.stockMinimo} onChange={v=>set('stockMinimo',v)} tipo="number" placeholder="0"/>
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Agregar'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

}

      nombre:prodSel.nombre,cantidad:cant,unidad:prodSel.unidad||'kg',

function VentanaFlotanteEnvio({productos,clientes,uid,onCerrar,onAcomodar}){
  const [modoV,setModoV]=useState('inline');
  const [pos,setPos]=useState({x:Math.max(20,window.innerWidth-380),y:90});
  const [size,setSize]=useState({w:340,h:520});
  const [panelW,setPanelW]=useState(360);
  const accionRef=React.useRef(null); // {tipo:'mover'|'resize', ...}

  const startMove=e=>{
    if(modoV!=='flotante')return;
    const t=e.touches?e.touches[0]:e;
    accionRef.current={tipo:'mover',dx:t.clientX-pos.x,dy:t.clientY-pos.y};
  };
  const startResize=(e)=>{
    e.preventDefault();e.stopPropagation();
    const t=e.touches?e.touches[0]:e;
    accionRef.current={tipo:'resize',sx:t.clientX,sy:t.clientY,w:size.w,h:size.h,pw:panelW};
  };

  useEffect(()=>{
    const move=e=>{
      const a=accionRef.current;
      if(!a)return;
      if(e.cancelable)e.preventDefault();
      const t=e.touches?e.touches[0]:e;
      if(a.tipo==='mover'){
        setPos({
          x:Math.max(0,Math.min(window.innerWidth-120,t.clientX-a.dx)),
          y:Math.max(0,Math.min(window.innerHeight-60,t.clientY-a.dy))
        });
      }else if(a.tipo==='resize'){
        if(modoV==='panel'){
          setPanelW(Math.max(260,Math.min(window.innerWidth-100,a.pw-(t.clientX-a.sx))));
        }else{
          setSize({
            w:Math.max(260,Math.min(window.innerWidth-20,a.w+(t.clientX-a.sx))),
            h:Math.max(280,Math.min(window.innerHeight-20,a.h+(t.clientY-a.sy)))
          });
        }
      }
    };
    const up=()=>{accionRef.current=null;};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
    window.addEventListener('touchmove',move,{passive:false});
    window.addEventListener('touchend',up);
    return()=>{
      window.removeEventListener('mousemove',move);
      window.removeEventListener('mouseup',up);
      window.removeEventListener('touchmove',move);
      window.removeEventListener('touchend',up);
    };
  },[modoV]);

  let contStyle;
  if(modoV==='panel'){
    contStyle={position:'fixed',top:0,right:0,bottom:0,width:panelW,zIndex:700,boxShadow:'-4px 0 24px rgba(0,0,0,.2)',overflow:'hidden',borderRadius:0,background:'var(--bg)',display:'flex',flexDirection:'column'};
  }else if(modoV==='flotante'){
    contStyle={position:'fixed',left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex:700,boxShadow:'0 8px 32px rgba(0,0,0,.35)',overflow:'hidden',borderRadius:12,background:'var(--bg)',display:'flex',flexDirection:'column'};
  }else{
    contStyle={marginBottom:10,position:'relative'};
  }
  const radTop=modoV==='inline'?'10px 10px 0 0':modoV==='panel'?'0':'12px 12px 0 0';
  const radBot=modoV==='inline'?'0 0 10px 10px':modoV==='panel'?'0':'0 0 12px 12px';

  return(
    <div style={contStyle}>
      <div onMouseDown={startMove} onTouchStart={startMove}
        style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#128C7E',color:'#fff',padding:'7px 10px',flexShrink:0,borderRadius:radTop,cursor:modoV==='flotante'?'grab':'default',userSelect:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:14}}>{modoV==='flotante'?'✋':'📱'}</span>
          <div style={{fontWeight:700,fontSize:12}}>{modoV==='flotante'?'Mové · esquina ↘ agranda':'Cargar envío'}</div>
        </div>
        <div style={{display:'flex',gap:3,alignItems:'center'}}>
          <button onClick={()=>setModoV('inline')}   title="Ancho completo"  style={{background:modoV==='inline'?'rgba(255,255,255,.4)':'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontSize:12}}>▭</button>
          <button onClick={()=>setModoV('panel')}    title="Panel derecha"    style={{background:modoV==='panel'?'rgba(255,255,255,.4)':'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontSize:12}}>⬛</button>
          <button onClick={()=>setModoV('flotante')} title="Ventana flotante" style={{background:modoV==='flotante'?'rgba(255,255,255,.4)':'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontSize:12}}>⧉</button>
          {onAcomodar&&<button onClick={onAcomodar} title="Acomodar ventanas" style={{background:'rgba(255,255,255,.12)',border:'none',color:'#fff',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontSize:11}}>🪟</button>}
          <button onClick={onCerrar} title="Salir" style={{background:'rgba(255,255,255,.2)',border:'none',color:'#fff',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontSize:11,fontWeight:700}}>✕</button>
        </div>
      </div>
      <div style={{border:'2px solid #128C7E',borderTop:'none',borderRadius:radBot,overflowY:'auto',flex:(modoV==='flotante'||modoV==='panel')?1:'none',background:'var(--bg)'}}>
        <FormEnvioRapido productos={productos} clientes={clientes} uid={uid}/>
      </div>
      {modoV==='flotante'&&(
        <div onMouseDown={startResize} onTouchStart={startResize}
          style={{position:'absolute',right:0,bottom:0,width:26,height:26,cursor:'nwse-resize',zIndex:20,touchAction:'none',
            background:'linear-gradient(135deg,transparent 45%,#0d7a6c 45%,#0d7a6c 100%)',borderRadius:'0 0 12px 0'}}>
          <span style={{position:'absolute',right:3,bottom:1,color:'#fff',fontSize:11,lineHeight:1}}>↘</span>
        </div>
      )}
      {modoV==='panel'&&(
        <div onMouseDown={startResize} onTouchStart={startResize}
          style={{position:'absolute',left:0,top:0,bottom:0,width:10,cursor:'ew-resize',zIndex:20,touchAction:'none',background:'rgba(18,140,126,.35)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{color:'#0d7a6c',fontSize:14,fontWeight:700}}>⋮</span>
        </div>
      )}
    </div>
  );
}

        {(modoEnvios
          ?pedidos.filter(p=>(p.tipo==='delivery'||p.tipo==='envio')&&p.fecha===hoyF&&p.estado!=='cancelado')

        <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:801,background:'var(--bg)',borderRadius:'20px 20px 0 0',maxHeight:'90vh',overflowY:'auto',paddingBottom:80,boxShadow:'0 -4px 30px rgba(0,0,0,.2)'}}>

      </>}
    </div>
  );
}

function FormPedido({inicial,clientes,productos,onGuardar,onCancelar,esSheet}){
  const [d,setD]=useState({clienteNombre:'',clienteId:'',tipo:'mostrador',direccion:'',horaEntrega:'',telefono:'',horaCreacion:'',notas:'',pagado:false,formaPago:'efectivo',items:[],total:0,...inicial});
  const [prodId,setProdId]=useState('');const [cant,setCant]=useState('');
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const agregarItem=()=>{
    if(!prodId||!cant) return alert('Elegí un producto y cantidad');
    const prod=productos.find(p=>p.id===prodId);if(!prod)return;
    const item={_id:Date.now(),nombre:prod.nombre,unidad:prod.unidad||'kg',cantidad:Number(cant),precio:prod.precioVenta||0,subtotal:(prod.precioVenta||0)*Number(cant)};
    const items=[...d.items,item];
    setD(p=>({...p,items,total:items.reduce((s,i)=>s+i.subtotal,0)}));
    setProdId('');setCant('');
  };
  const quitarItem=id=>{const items=d.items.filter(i=>i._id!==id);setD(p=>({...p,items,total:items.reduce((s,i)=>s+i.subtotal,0)}));};
  const selCliente=id=>{const c=clientes.find(c=>c.id===id);if(c)setD(p=>({...p,clienteId:id,clienteNombre:c.nombre,direccion:c.direccion||p.direccion,telefono:c.telefono||p.telefono}));else setD(p=>({...p,clienteId:'',clienteNombre:''}));};
  const guardar=()=>{if(!d.clienteNombre.trim())return alert('Ingresá el nombre del cliente');onGuardar(d);};
  return(
    <div>
      {!esSheet&&<Header titulo={d.id?'Editar Pedido':'Nuevo Pedido'} onBack={onCancelar}/>}
      {esSheet&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 14px 12px',borderBottom:'1px solid var(--border)',marginBottom:4}}>
          <div style={{fontWeight:700,fontSize:16,color:'var(--txt)'}}>{d.id?'✏️ Editar pedido':'🛵 Nuevo pedido'}</div>
          <button onClick={onCancelar} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--txt2)',lineHeight:1,padding:'0 2px'}}>✕</button>
        </div>
      )}
      <div className={esSheet?'':'app-body'} style={esSheet?{padding:'8px 14px 0'}:{}}>
        <label className="lbl">Cliente</label>
        <select value={d.clienteId} onChange={e=>selCliente(e.target.value)} className="inp" style={{marginBottom:6}}>
          <option value="">— Elegí un cliente o escribí abajo —</option>
          {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
        </select>
        <Campo label="O escribí el nombre" value={d.clienteNombre} onChange={v=>{const c=clientes.find(cl=>(cl.nombre||'').toLowerCase().trim()===v.toLowerCase().trim());setD(p=>({...p,clienteNombre:v,...(c?{clienteId:c.id,telefono:c.telefono||p.telefono,direccion:c.direccion||p.direccion}:{})}));}} placeholder="Nombre del cliente *" list="fp-clientes"/>
        <datalist id="fp-clientes">{clientes.map(c=><option key={c.id} value={c.nombre}/>)}</datalist>
        <label className="lbl">Tipo</label>
        <div className="chip-group">
          {[{k:'mostrador',lbl:'🏪 Mostrador'},{k:'delivery',lbl:'🚴 Delivery'}].map(t=><button key={t.k} onClick={()=>set('tipo',t.k)} className={`chip${d.tipo===t.k?' activo':''}`}>{t.lbl}</button>)}
        </div>
        {d.tipo==='delivery'&&<Campo label="Dirección" value={d.direccion} onChange={v=>set('direccion',v)} placeholder="Calle y número"/>}
        {d.tipo==='delivery'&&<Campo label="📞 Teléfono" value={d.telefono} onChange={v=>set('telefono',v)} placeholder="381-123-4567" tipo="tel"/>}
        <Campo label="Hora de entrega" value={d.horaEntrega} onChange={v=>set('horaEntrega',v)} tipo="time"/>
        <div className="panel" style={{marginTop:12}}>
          <div className="ptitle">Agregar producto</div>
          <select value={prodId} onChange={e=>setProdId(e.target.value)} className="inp">
            <option value="">— Elegí —</option>
            {productos.map(p=><option key={p.id} value={p.id}>{p.nombre} — {formatPeso(p.precioVenta||0)}/{p.unidad||'kg'}</option>)}
          </select>
          <Campo label="Cantidad" value={cant} onChange={setCant} tipo="number" placeholder="0"/>
          <button onClick={agregarItem} className="btn-full" style={{marginTop:8}}>+ Agregar</button>
        </div>
        {d.items.length>0&&<>
          <div className="sec-title">Productos del pedido</div>
          {d.items.map(i=>(
            <div key={i._id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--bg)',borderRadius:'var(--radius)',marginBottom:6,border:'1px solid var(--border)'}}>
              <div><div style={{fontWeight:600,fontSize:14,color:'var(--txt)'}}>{i.nombre}</div><div style={{fontSize:12,color:'var(--txt2)'}}>{i.cantidad} {i.unidad} · {formatPeso(i.subtotal)}</div></div>
              <button onClick={()=>quitarItem(i._id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'var(--red)'}}>✕</button>
            </div>
          ))}
          <div className="suma-band"><span style={{fontWeight:700}}>Total</span><span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(d.total)}</span></div>
        </>}
        <label className="lbl">Forma de pago</label>
        <div className="chip-group">
          {[{k:'efectivo',lbl:'💵 Efectivo'},{k:'transferencia',lbl:'📲 Transferencia'},{k:'fiado',lbl:'📒 Fiado'},{k:'tarjeta',lbl:'💳 Tarjeta'}].map(fp=><button key={fp.k} onClick={()=>set('formaPago',fp.k)} className={`chip${d.formaPago===fp.k?' activo':''}`}>{fp.lbl}</button>)}
        </div>
        <label className="lbl" style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={d.pagado} onChange={e=>set('pagado',e.target.checked)} style={{width:18,height:18}}/> ✅ Ya pagó
        </label>
        <Campo label="Notas (opcional)" value={d.notas} onChange={v=>set('notas',v)} placeholder="Ej: sin menudos, al horno..." rows={2}/>
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Crear pedido'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

/* ─── BALANCE POR PERÍODO + INFORME POR MAIL (pedidos 4 y 5) ─── */
function SeccionBalance({uid}){
  const [periodo,setPeriodo]=useState('hoy');
  const [pedidos,setPedidos]=useState([]);
  const [cargando,setCargando]=useState(true);
  const hoyStr=hoy();
  const anioStr=hoyStr.slice(0,4);
  useEffect(()=>{
    const desde=anioStr+'-01-01';
    const u=db.collection(`polleria/${uid}/pedidos`).where('fecha','>=',desde)
      .onSnapshot(s=>{setPedidos(s.docs.map(d=>({id:d.id,...d.data()})));setCargando(false);},()=>setCargando(false));
    return()=>u();
  },[]);

  const semanaDesde=(()=>{const d=new Date();d.setDate(d.getDate()-6);return d.toISOString().split('T')[0];})();
  const enPeriodo=p=>{
    const f=p.fecha||'';
    if(periodo==='hoy')return f===hoyStr;
    if(periodo==='semana')return f>=semanaDesde;
    if(periodo==='mes')return f.slice(0,7)===hoyStr.slice(0,7);
    return f.slice(0,4)===anioStr;
  };
  const ventas=pedidos.filter(enPeriodo);
  const totalVendido=ventas.reduce((s,p)=>s+(Number(p.total)||0),0);
  const cant=ventas.length;
  const ticket=cant>0?totalVendido/cant:0;
  const pagos={};
  ventas.forEach(p=>{const k=p.formaPago||'otro';pagos[k]=(pagos[k]||0)+(Number(p.total)||0);});
  const prodMap={};
  ventas.forEach(p=>(p.items||[]).forEach(it=>{const k=it.nombre||'?';if(!prodMap[k])prodMap[k]={kg:0,monto:0};prodMap[k].kg+=Number(it.cantidad)||0;prodMap[k].monto+=Number(it.subtotal)||0;}));
  const top=Object.entries(prodMap).map(([n,v])=>({n,...v})).sort((a,b)=>b.monto-a.monto).slice(0,6);

  const periodoLabel={hoy:'de hoy',semana:'de la semana',mes:'del mes','año':'del año'}[periodo];
  const pagoLabel={efectivo:'💵 Efectivo',transferencia:'📲 Transferencia',fiado:'📒 Fiado',tarjeta:'💳 Tarjeta',otro:'Otro'};
  const pagoPlain={efectivo:'Efectivo',transferencia:'Transferencia',fiado:'Fiado',tarjeta:'Tarjeta',otro:'Otro'};

  const enviarMail=()=>{
    const L=[];
    L.push(`INFORME ${periodoLabel.toUpperCase()} - ${getNombreLocal()}`);
    L.push(`Generado: ${hoyStr}`);
    L.push('--------------------------------');
    L.push(`Total vendido: ${formatPeso(totalVendido)}`);
    L.push(`Cantidad de ventas: ${cant}`);
    L.push(`Ticket promedio: ${formatPeso(ticket)}`);
    L.push('');
    L.push('POR FORMA DE PAGO:');
    Object.entries(pagos).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>L.push(`  - ${pagoPlain[k]||k}: ${formatPeso(v)}`));
    L.push('');
    L.push('PRODUCTOS MAS VENDIDOS:');
    top.forEach((t,i)=>L.push(`  ${i+1}. ${t.n}: ${formatPeso(t.monto)}`));
    const asunto=`Informe ${periodoLabel} - ${getNombreLocal()}`;
    window.location.href=`mailto:?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(L.join('\n'))}`;
  };

  return(
    <div>
      <div className="tab-bar" style={{marginBottom:12}}>
        {[['hoy','Hoy'],['semana','Semana'],['mes','Mes'],['año','Año']].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriodo(k)} className={`tab-btn${periodo===k?' activo':''}`} style={{flex:1}}>{l}</button>
        ))}
      </div>
      {cargando?<div className="empty">Cargando…</div>:(
      <React.Fragment>
        <div className="panel">
          <div style={{textAlign:'center',padding:'6px 0'}}>
            <div style={{fontSize:12,color:'var(--txt2)',marginBottom:4}}>Total vendido {periodoLabel}</div>
            <div style={{fontSize:34,fontWeight:800,color:'var(--green)'}}>{formatPeso(totalVendido)}</div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:10}}>
            <div style={{flex:1,textAlign:'center',background:'var(--bg2)',borderRadius:'var(--radius)',padding:'10px'}}>
              <div style={{fontSize:20,fontWeight:700,color:'var(--txt)'}}>{cant}</div>
              <div style={{fontSize:11,color:'var(--txt2)'}}>ventas</div>
            </div>
            <div style={{flex:1,textAlign:'center',background:'var(--bg2)',borderRadius:'var(--radius)',padding:'10px'}}>
              <div style={{fontSize:20,fontWeight:700,color:'var(--txt)'}}>{formatPeso(ticket)}</div>
              <div style={{fontSize:11,color:'var(--txt2)'}}>ticket prom.</div>
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="ptitle">💳 Por forma de pago</div>
          {Object.keys(pagos).length===0&&<div style={{fontSize:13,color:'var(--txt3)'}}>Sin ventas en este período.</div>}
          {Object.entries(pagos).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:14,color:'var(--txt)'}}>{pagoLabel[k]||k}</span>
              <span style={{fontSize:14,fontWeight:700,color:'var(--txt)'}}>{formatPeso(v)}</span>
            </div>
          ))}
        </div>

        <div className="panel">
          <div className="ptitle">🏆 Más vendidos</div>
          {top.length===0&&<div style={{fontSize:13,color:'var(--txt3)'}}>Sin datos.</div>}
          {top.map((t,i)=>(
            <div key={t.n} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:14,color:'var(--txt)'}}>{i+1}. {t.n}</span>
              <span style={{fontSize:13,color:'var(--txt2)'}}>{formatPeso(t.monto)}</span>
            </div>
          ))}
        </div>

        <button onClick={enviarMail} className="btn-full" style={{background:'var(--blue)',marginTop:4}}>📧 Enviar informe {periodoLabel} por mail</button>
      </React.Fragment>
      )}
    </div>
  );
}

function PantallaCaja({uid}){
  const [sec,setSec]=useState('caja');const [pedidos,setPedidos]=useState([]);const [movimientos,setMov]=useState([]);const [formMov,setFormMov]=useState(null);const [fechaCaja,setFechaCaja]=useState(hoy());
  const colMov=db.collection(`polleria/${uid}/movimientos`);
  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/pedidos`).where('fecha','==',fechaCaja).onSnapshot(s=>setPedidos(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=colMov.where('fecha','==',fechaCaja).onSnapshot(s=>setMov(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ta=a.createdAt&&a.createdAt.seconds?a.createdAt.seconds:0;const tb=b.createdAt&&b.createdAt.seconds?b.createdAt.seconds:0;return ta-tb;})));
    return()=>{u1();u2();};
  },[fechaCaja]);
  const guardarMov=async d=>{const{id,...r}=d;const ts=firebase.firestore.FieldValue.serverTimestamp();if(id)await colMov.doc(id).update(r);else await colMov.add({...r,fecha:fechaCaja,createdAt:ts});setFormMov(null);};
  const eliminarMov=async id=>{if(!confirm('¿Eliminar?'))return;await colMov.doc(id).delete();};
  if(formMov!==null) return <FormMovimiento inicial={formMov} onGuardar={guardarMov} onCancelar={()=>setFormMov(null)}/>;
  const pagados=pedidos.filter(p=>p.pagado&&p.estado!=='cancelado');
  const vEfec=pagados.filter(p=>p.formaPago==='efectivo').reduce((s,p)=>s+(p.total||0),0);
  const vTransf=pagados.filter(p=>p.formaPago==='transferencia').reduce((s,p)=>s+(p.total||0),0);
  const vTarj=pagados.filter(p=>p.formaPago==='tarjeta').reduce((s,p)=>s+(p.total||0),0);
  const vFiado=pedidos.filter(p=>p.formaPago==='fiado'&&p.estado!=='cancelado').reduce((s,p)=>s+(p.total||0),0);
  const totalVentas=vEfec+vTransf+vTarj;
  const ingrExt=movimientos.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+(Number(m.monto)||0),0);
  const egresoExt=movimientos.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+(Number(m.monto)||0),0);
  const cajaFinal=vEfec+ingrExt-egresoExt;
  const enviarResumenEmail=()=>{
    if(!window.enviarResumenDiario_poll_licencia){alert('Email no disponible');return;}
    const gastosDet=movimientos.filter(m=>m.tipo==='egreso').map(m=>({label:m.descripcion||m.concepto||'Gasto',monto:-(Number(m.monto)||0),color:'#e05c5c'}));
    window.enviarResumenDiario_poll_licencia({
      fecha: fechaCaja,
      totalIngresos: totalVentas,
      ganancia: cajaFinal,
      detalle:[
        {label:'💵 Efectivo',monto:vEfec,color:'#16a34a'},
        {label:'📲 Transferencia',monto:vTransf,color:'#2563eb'},
        {label:'💳 Tarjeta',monto:vTarj,color:'#9333ea'},
        vFiado>0&&{label:'📒 Fiado (pendiente)',monto:vFiado,color:'#f59e0b'},
        ingrExt>0&&{label:'➕ Ingresos extra',monto:ingrExt,color:'#16a34a'},
        egresoExt>0&&{label:'➖ Egresos extra',monto:-egresoExt,color:'#e05c5c'},
        ...gastosDet
      ].filter(Boolean)
    }).then(ok=>alert(ok?'✅ Resumen enviado por email':'❌ No se pudo enviar'));
  };
  return(
    <div>
      <Header titulo="Caja del Día"/>
      <div className="app-body">
        <div className="tab-bar">
          {[{k:'caja',lbl:'💵 Caja'},{k:'transferencias',lbl:'📲 Transf.'},{k:'arqueo',lbl:'🔒 Arqueo'},{k:'balance',lbl:'📊 Balance'}].map(s=>(
            <button key={s.k} onClick={()=>setSec(s.k)} className={`tab-btn${sec===s.k?' activo':''}`}>{s.lbl}</button>
          ))}
        </div>
        {sec!=='balance'&&(
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <label className="lbl" style={{margin:0,flexShrink:0}}>Fecha:</label>
          <input type="date" value={fechaCaja} onChange={e=>setFechaCaja(e.target.value)} className="inp" style={{flex:1}}/>
        </div>
        )}
        {sec==='balance'&&<SeccionBalance uid={uid}/>}
        {sec==='caja'&&<>
          <div className="panel">
            <div className="ptitle">Ventas del día</div>
            {[{lbl:'💵 Efectivo',val:vEfec},{lbl:'📲 Transferencia',val:vTransf},{lbl:'💳 Tarjeta',val:vTarj},{lbl:'📒 Fiado (pendiente)',val:vFiado}].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:'var(--txt)'}}>{formatPeso(r.val)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4}}>
              <span style={{fontWeight:700,color:'var(--txt)'}}>Total cobrado</span>
              <span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(totalVentas)}</span>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="sec-title" style={{margin:0}}>Otros movimientos</div>
            <button onClick={()=>setFormMov({})} className="btn-pri" style={{fontSize:12,padding:'6px 12px'}}>+ Agregar</button>
          </div>
          {movimientos.map(m=>(
            <div key={m.id} className="card">
              <div className="card-body" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontWeight:600,fontSize:14,color:'var(--txt)'}}>{m.descripcion||'—'}</div><div className="card-sub">{m.tipo==='ingreso'?'Ingreso extra':'Egreso / Gasto'}</div></div>

/* ── Desbloqueo biométrico (huella/cara) — WebAuthn, local al dispositivo ── */
async function bioDisponible(){try{return !!(window.PublicKeyCredential&&await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());}catch(e){return false;}}
function bioRegistrada(){try{return !!localStorage.getItem('poll_bio_cred');}catch(e){return false;}}
function bioDesactivar(){try{localStorage.removeItem('poll_bio_cred');}catch(e){}}
async function bioRegistrar(){
  try{
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const userId=crypto.getRandomValues(new Uint8Array(16));
    const cred=await navigator.credentials.create({publicKey:{
      challenge,
      rp:{name:'Mi Pollería'},
      user:{id:userId,name:'pollero',displayName:'Pollero'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
      timeout:60000,attestation:'none'
    }});
    if(!cred)return false;
    const rawId=btoa(String.fromCharCode.apply(null,new Uint8Array(cred.rawId)));
    localStorage.setItem('poll_bio_cred',rawId);
    return true;
  }catch(e){return false;}
}
async function bioAutenticar(){
  try{
    const stored=localStorage.getItem('poll_bio_cred');
    if(!stored)return false;
    const rawId=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const assertion=await navigator.credentials.get({publicKey:{
      challenge,
      allowCredentials:[{type:'public-key',id:rawId}],
      userVerification:'required',timeout:60000
    }});
    return !!assertion;
  }catch(e){return false;}
}
