// Guarda/actualiza un cliente automáticamente (usado al hacer envíos)
async function autoRegistrarCliente(uid,{nombre,telefono,direccion}){
  if(!nombre||!nombre.trim()||nombre.trim().toLowerCase()==='venta directa')return;
  try{
    const col=db.collection(`polleria/${uid}/clientes`);
    const snap=await col.get();
    const telLimpio=(telefono||'').replace(/\D/g,'');
    const existe=snap.docs.find(dd=>{
      const c=dd.data();
      const mismoNombre=(c.nombre||'').trim().toLowerCase()===nombre.trim().toLowerCase();
      const mismoTel=telLimpio.length>=6&&(c.telefono||'').replace(/\D/g,'')===telLimpio;
      return mismoNombre||mismoTel;
    });
    if(existe){
      const c=existe.data();const upd={};
      if(telefono&&!c.telefono)upd.telefono=telefono;
      if(direccion&&!c.direccion)upd.direccion=direccion;
      if(Object.keys(upd).length)await col.doc(existe.id).update(upd);
    }else{
      await col.add({nombre:nombre.trim(),apellido:'',telefono:telefono||'',direccion:direccion||'',saldoFiado:0,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
  }catch(e){}
}

      <Header titulo="Clientes"/>
      <div className="app-body">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div className="sec-title" style={{margin:0}}>👥 Mis clientes <span style={{color:'var(--txt2)',fontWeight:400,fontSize:13}}>({clientes.length})</span></div>
          {editId===null&&<button onClick={abrirNuevo} className="btn-pri" style={{fontSize:13,padding:'7px 14px'}}>+ Agregar</button>}
        </div>
        {totalFiado>0&&editId===null&&(
          <div className="panel" style={{marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,fontWeight:600,color:'var(--red)'}}>📒 Fiado total pendiente</span>
              <span style={{fontSize:18,fontWeight:800,color:'var(--red)'}}>{formatPeso(totalFiado)}</span>
            </div>
          </div>
        )}
        {editId!==null&&(
          <div className="panel">
            <div className="ptitle">{editId?'✏️ Editar cliente':'👤 Nuevo cliente'}</div>
            <Campo label="Nombre *" value={d.nombre} onChange={v=>set('nombre',v)} placeholder="Ej: Juan"/>
            <Campo label="Apellido" value={d.apellido} onChange={v=>set('apellido',v)} placeholder="Ej: Pérez"/>
            <Campo label="📞 Teléfono" value={d.telefono} onChange={v=>set('telefono',v)} placeholder="381-123-4567" tipo="tel"/>
            <Campo label="📍 Dirección" value={d.direccion} onChange={v=>set('direccion',v)} placeholder="Calle, número, barrio"/>
            <div style={{display:'flex',gap:8,marginTop:14}}>
              <button onClick={guardar} className="btn-pri" style={{flex:1,padding:12}}>{editId?'✓ Guardar':'+ Agregar'}</button>
              <button onClick={cerrar} className="btn-sec" style={{padding:12}}>Cancelar</button>
            </div>
          </div>
        )}
        {clientes.length>0&&editId===null&&<input value={busca} onChange={e=>setBusca(e.target.value)} className="inp" placeholder="🔍 Buscar cliente..." style={{marginBottom:10}}/>}
        {clientes.length===0&&editId===null&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>👥</div>No hay clientes cargados.<br/>Agregalos a mano, o se guardan solos cuando hacés un envío.</div>}
        {lista.map(c=>(
          <div key={c.id} className="card">
            <div className="card-body">
              <div className="card-name">{c.nombre} {c.apellido||''}</div>
              {c.telefono&&<div className="card-sub">📞 {c.telefono}</div>}
              {c.direccion&&<div className="card-sub">📍 {c.direccion}</div>}
              {Number(c.saldoFiado)>0&&<div className="card-sub" style={{color:'var(--red)',fontWeight:700,marginTop:2}}>📒 Debe: {formatPeso(c.saldoFiado)}</div>}
              <div className="card-actions">
                <button onClick={()=>abrirEditar(c)} className="btn-ic">✏️ Editar</button>
                <button onClick={()=>eliminar(c.id,c.saldoFiado)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const uid=getLicenciaPoll()?.deviceId||'default';
  const [tab,setTab]=useState('catalogo');
  const [modo,setModoState]=useState(getModo);
  useEffect(()=>{
    aplicarTema(getTema());
  },[]);
  const pantallas={
    catalogo:<PantallaCatalogo uid={uid}/>,
    pedidos: <PantallaPedidos  uid={uid}/>,
    clientes:<PantallaClientes uid={uid}/>,
    precios: <PantallaPrecios  uid={uid}/>,
    stock:   <PantallaStock    uid={uid}/>,
    caja:    <PantallaCaja     uid={uid}/>,
    config:  <PantallaConfig   onModoChange={m=>{setModoState(m);}}/>,
  };
  const contenido=pantallas[tab]||pantallas.catalogo;
  /* ── MODO PC: sidebar izquierdo ── */
  if(modo==='pc') return(
    <div style={{display:'flex',maxWidth:1280,margin:'0 auto',minHeight:'100vh',background:'var(--bg3)'}}>
      <NavSidebar activo={tab} onChange={setTab}/>
      <div style={{flex:1,minWidth:0,overflowX:'hidden'}}>
        {contenido}
      </div>
      {tab!=='pedidos'&&<BotoneraFlotante uid={uid} abajo={20}/>}
    </div>
  );
  /* ── MODO CELULAR: nav abajo ── */
  return(
    <div style={{paddingBottom:72}}>
      {contenido}
      <NavBar activo={tab} onChange={setTab}/>
      {tab!=='pedidos'&&<BotoneraFlotante uid={uid} abajo={76}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWrapper/>);
</script>

  <script>
  // ── SERVICE WORKER (PWA offline · estrategia NETWORK-FIRST) ──────────
  // Network-first: siempre busca primero la versión más nueva en internet,
  // y solo usa el caché cuando estás sin conexión. Esto evita el problema
  // anterior de quedar pegado con una versión vieja en GitHub Pages.
  // IMPORTANTE: requiere subir el archivo sw.js junto a index.html.
  // Si no subís sw.js, la app igual funciona (no se cachea, nada más).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(err){
        console.warn('Service Worker no registrado (¿falta subir sw.js?):', err && err.message);
      });
    });
  }
  </script>
</body>
</html>
