<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* Variables base (fallback si no hay tema) */
:root{
  --radius:8px;--radius-lg:14px;
  --bg:#fff;--bg2:#f5f5f4;--bg3:#fafaf9;
  --txt:#1c1917;--txt2:#78716c;--txt3:#a8a29e;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;
  --orange:#854F0B;--orange-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --shadow:0 2px 8px rgba(0,0,0,.08);
}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);}
#root{max-width:900px;margin:0 auto;min-height:100vh;background:var(--bg3);}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#16213e 0%,#0f3460 100%);border-bottom:2px solid #e94560;padding:8px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;position:sticky;top:0;z-index:40;min-height:58px;gap:6px;}
.header-left{display:flex;align-items:center;gap:8px;justify-content:flex-start;}
.header-center{text-align:center;}
.header-nombre{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.01em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}
.header-screen{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:.06em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.header-datetime{text-align:right;}
.header-hora{font-size:13px;font-weight:800;color:#e94560;font-variant-numeric:tabular-nums;line-height:1.3;white-space:nowrap;}
.header-fecha{font-size:13px;font-weight:800;color:rgba(255,255,255,.85);line-height:1.3;white-space:nowrap;}
.header-title{font-size:15px;font-weight:700;color:#fff;}
.header-sub{font-size:11px;color:rgba(255,255,255,.4);}
.btn-dark{display:none;}
.btn-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:14px;font-weight:700;}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:900px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:9px 4px 7px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;color:var(--txt2);}
.nav-btn.activo .nav-label{color:var(--txt);font-weight:700;}

/* ── BOTONES ── */
.btn-pri{background:var(--txt);color:var(--bg);border:none;border-radius:var(--radius);padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-sec{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-size:14px;cursor:pointer;color:var(--txt2);}
.btn-full{width:100%;padding:13px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;border:none;background:var(--txt);color:var(--bg);}
.btn-full:disabled{opacity:.3;cursor:not-allowed;}
.btn-ic{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--txt2);}

/* ── LAYOUT ── */
.app-body{padding:.85rem 1rem 80px;}
.search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--bg);color:var(--txt);font-family:inherit;display:block;}
.search:focus{outline:none;border-color:var(--border2);}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin:.9rem 0 .5rem;}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:10px;}
.ptitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);margin-bottom:8px;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px;}
.card-body{padding:12px 14px;}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;}
.card-name{font-size:15px;font-weight:700;color:var(--txt);}
.card-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.pill{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;white-space:nowrap;}
.pill-green{background:var(--green-bg);color:var(--green);}
.pill-orange{background:var(--orange-bg);color:var(--orange);}
.pill-red{background:var(--red-bg);color:var(--red);}
.pill-blue{background:var(--blue-bg);color:var(--blue);}
.pill-gray{background:var(--bg2);color:var(--txt2);}
.tab-bar{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:3px;margin-bottom:12px;}
.tab-btn{flex:1;padding:7px 4px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);}
.tab-btn.activo{background:var(--bg);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.chip{padding:6px 12px;border-radius:99px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;background:var(--bg);color:var(--txt2);}
.chip.activo{background:var(--txt);color:var(--bg);border-color:var(--txt);}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--txt2);font-size:14px;line-height:1.7;}
.suma-band{background:var(--bg2);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}

/* ── MODAL OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:600px){.overlay{align-items:center;}}
.modal{background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:1.25rem;}
@media(min-width:600px){.modal{border-radius:var(--radius-lg);max-height:85vh;}}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 16px;}
@media(min-width:600px){.modal-drag{display:none;}}

/* ══════════════════════════════
   CATÁLOGO  (nuevo)
══════════════════════════════ */
.catalogo-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.catalogo-search{flex:1;}
.catalogo-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media(min-width:480px){.catalogo-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:700px){.catalogo-grid{grid-template-columns:repeat(4,1fr);}}

.prod-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  cursor:pointer;
  transition:transform .12s,box-shadow .12s;
  box-shadow:var(--shadow);
}
.prod-card:active,.prod-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12);}
.prod-card-foto{
  width:100%;
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:56px;
  position:relative;
  overflow:hidden;
}
@media(min-width:600px){.prod-card-foto{height:140px;}}
.prod-card-foto img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.prod-card-info{padding:10px 10px 12px;}
.prod-card-nombre{font-size:13px;font-weight:700;color:var(--txt);line-height:1.3;margin-bottom:2px;}
.prod-card-unidad{font-size:11px;color:var(--txt2);}
.prod-card-precio{font-size:17px;font-weight:700;color:var(--txt);margin-top:4px;}
.prod-card-btn{
  width:100%;margin-top:8px;padding:7px;border:none;border-radius:var(--radius);
  font-size:13px;font-weight:700;cursor:pointer;
  background:var(--txt);color:var(--bg);
}

/* MODAL VENTA RAPIDA */
.venta-prod-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.venta-prod-foto{width:64px;height:64px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;flex-shrink:0;}
.venta-prod-foto img{width:100%;height:100%;object-fit:cover;}
.venta-metodos{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px;}
.btn-metodo{padding:8px 4px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);color:var(--txt2);text-align:center;}
.btn-metodo.activo{background:var(--txt);color:var(--bg);border-color:var(--txt);}
.qty-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.qty-btn{width:44px;height:44px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:22px;font-weight:700;color:var(--txt);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-input{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius);font-size:22px;font-weight:700;text-align:center;background:var(--bg);color:var(--txt);font-family:inherit;}
.qty-input:focus{outline:none;border-color:var(--border2);}
.total-grande{font-size:32px;font-weight:700;color:var(--txt);text-align:center;margin:10px 0 16px;}

/* FOTO UPLOAD */
.foto-upload-area{border:2px dashed var(--border);border-radius:var(--radius);height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg2);position:relative;overflow:hidden;gap:6px;}
.foto-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.foto-upload-area p{font-size:12px;color:var(--txt2);text-align:center;padding:0 8px;z-index:1;}
.foto-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.foto-upload-area span{font-size:28px;z-index:1;}

/* FORMUARLOS */
.inp{display:block;width:100%;padding:9px 11px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--txt);fontSize:15px;outline:none;font-family:inherit;font-size:15px;}
.inp:focus{border-color:var(--border2);}
.lbl{font-size:12px;color:var(--txt2);font-weight:600;display:block;margin-bottom:4px;margin-top:12px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:4px;}

/* ── POS HEADER ── */
.pos-header{
  background:linear-gradient(135deg,#16213e,#0f3460);
  padding:10px 18px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid #e94560;min-height:60px;position:sticky;top:0;z-index:40;
}
.pos-nombre{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.02em;line-height:1.1;}
.pos-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.pos-reloj{font-size:26px;font-weight:900;color:#e94560;font-variant-numeric:tabular-nums;letter-spacing:-.02em;text-align:right;}
.pos-fecha{font-size:11px;color:rgba(255,255,255,.5);text-align:right;margin-top:2px;}
.pos-btns{display:flex;align-items:center;gap:8px;}
.pos-btn-tema{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;color:#fff;}

/* ── FOTO REAL DE PRODUCTO ── */
.prod-foto-real{
  width:100%;height:110px;
  background-repeat:no-repeat;
  background-color:#f5ede8;
}
.prod-foto-verdura{background-color:#f0fdf4;}

/* ── HOVER STATES (solo PC con mouse) ── */
@media(hover:hover){
  .btn-pri:hover{opacity:.82;}
  .btn-sec:hover{border-color:var(--border2);color:var(--txt);}
  .btn-full:not(:disabled):hover{opacity:.86;}
  .btn-ic:hover{background:var(--bg2);color:var(--txt);}
  .chip:hover:not(.activo){border-color:var(--border2);color:var(--txt);}
  .nav-btn:hover .nav-label{color:var(--txt);}
  .prod-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.13);}
  .tab-btn:hover:not(.activo){background:rgba(0,0,0,.05);color:var(--txt);}
}

/* ── LAYOUT PC (pantalla grande) ── */
@media(min-width:640px){
  .app-body{padding:1.25rem 1.5rem 90px;}
  .panel{padding:16px 20px;}
  .card-body{padding:14px 18px;}
}

/* ── TAB BAR: ocultar scrollbar pero mantener scroll ── */
.tab-bar{scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.tab-bar::-webkit-scrollbar{display:none;}

/* ── TOAST FLOTANTE ── */
.toast-float{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:var(--txt);color:var(--bg);
  padding:10px 22px;border-radius:99px;
  font-size:14px;font-weight:700;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  z-index:300;pointer-events:none;
  white-space:nowrap;
  animation:toastIn .18s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── CALCULADORA: inputs en pantallas muy chicas (< 360px) ── */
.calc-row-3{display:flex;gap:10px;margin-bottom:12px;}
@media(max-width:359px){
  .calc-row-3{flex-wrap:wrap;}
  .calc-row-3>div{flex:0 0 calc(50% - 5px);}
  .calc-row-3>div:last-child{flex:0 0 100%;}
}

/* ── SUMA-BAND en PC: más espacio ── */
@media(min-width:640px){.suma-band{padding:12px 18px;}}

/* ── INPUTS: touch target mínimo 44px en móvil ── */
@media(max-width:639px){
  .inp{padding:11px 11px;min-height:44px;}
  .btn-full{padding:15px;}
  .btn-ic{padding:8px 14px;min-height:38px;}
}

/* ── SELECTOR DE TEMA ── */
.tema-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px;}
.tema-btn{border:2px solid transparent;border-radius:var(--radius-lg);padding:0;cursor:pointer;overflow:hidden;aspect-ratio:1;transition:border-color .15s,transform .1s;}
.tema-btn.activo{border-color:var(--txt);}
.tema-swatch{width:100%;height:100%;display:flex;flex-direction:column;}
.tema-swatch-top{flex:1;}
.tema-swatch-bot{height:32%;}
@media(hover:hover){.tema-btn:hover{transform:scale(1.06);}}

/* ══════════════════════════════
   CARRITO / PANTALLA DIVIDIDA
══════════════════════════════ */
.split-layout{display:flex;min-height:calc(100vh - 52px);}
.split-left{flex:1;padding:.85rem 1rem 80px;overflow-y:auto;min-width:0;}
.split-right{width:360px;flex-shrink:0;background:var(--bg);border-left:1px solid var(--border);padding:14px 14px 14px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;display:flex;flex-direction:column;}
@media(max-width:699px){.split-right{display:none;}.split-left{padding:.85rem 1rem 80px;}}
@media(min-width:700px){.split-left{padding:1rem 1.25rem 1rem;}#root{max-width:1100px;}}

/* Items del carrito */
.carrito-titulo{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:8px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.carrito-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.carrito-item-name{flex:1;font-size:13px;font-weight:600;color:var(--txt);line-height:1.3;}
.carrito-item-sub{font-size:11px;color:var(--txt2);}
.carrito-qty{display:flex;align-items:center;gap:3px;flex-shrink:0;}
.carrito-qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:15px;font-weight:700;color:var(--txt);display:flex;align-items:center;justify-content:center;}
.carrito-qty-val{min-width:30px;text-align:center;font-size:13px;font-weight:700;color:var(--txt);}
.carrito-item-precio{font-size:12px;font-weight:700;color:var(--txt);min-width:64px;text-align:right;flex-shrink:0;}

/* Badge cantidad en tarjeta de producto */
.prod-badge{position:absolute;top:6px;right:6px;background:var(--green);color:#fff;border-radius:99px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 5px;}

/* Botón flotante carrito (solo móvil) */
.carrito-fab{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;border:none;border-radius:99px;padding:12px 22px;font-weight:700;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.28);z-index:200;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;}
@media(min-width:700px){.carrito-fab{display:none!important;}}

/* Formas de pago en carrito: 3 cols en móvil, 5 en fila en PC */
.pago-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
@media(min-width:700px){.pago-grid{grid-template-columns:repeat(5,1fr);}}

/* ══════════════════════════════
   IMPRESIÓN / COMPROBANTE
══════════════════════════════ */
.comp-preview{background:var(--bg2);border-radius:var(--radius);padding:16px;font-family:monospace;font-size:13px;margin-bottom:14px;max-height:55vh;overflow-y:auto;}
@media print{
  body *{visibility:hidden;}
  .comp-print,.comp-print *{visibility:visible;}
  .comp-print{position:fixed;top:0;left:0;width:100%;padding:20px;font-family:monospace;font-size:13px;color:#000;}
  .comp-print-titulo{text-align:center;font-size:18px;font-weight:bold;border-bottom:2px dashed #000;padding-bottom:8px;margin-bottom:10px;}
  .comp-print-fila{display:flex;justify-content:space-between;padding:2px 0;}
  .comp-print-total{font-size:17px;font-weight:bold;border-top:2px solid #000;margin-top:8px;padding-top:8px;}
  .comp-print-footer{text-align:center;margin-top:16px;font-size:10px;border-top:1px dashed #000;padding-top:8px;}
}

/* ══════════════════════════════
   EMMA LOGO / BRANDING EN HEADER
══════════════════════════════ */
.emma-logo-header{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px 4px 6px;
  border-radius:var(--radius);
  background:var(--green-bg);
  border:1px solid var(--green);
  flex-shrink:0;
}
.emma-logo-icon{
  width:26px;height:26px;border-radius:6px;
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.emma-logo-texto{display:flex;flex-direction:column;line-height:1.1;}
.emma-logo-nombre{font-size:10px;font-weight:800;color:var(--green);letter-spacing:.02em;text-transform:uppercase;}
.emma-logo-sub{font-size:8px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase;}
@media(max-width:400px){.emma-logo-texto{display:none;}.emma-logo-header{padding:4px 6px;}}

/* Login pantalla */
.emma-login-logo{
  width:72px;height:72px;border-radius:20px;
  background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;margin:0 auto 12px;
  box-shadow:0 8px 24px rgba(59,109,17,.3);
}
.emma-login-nombre{font-size:20px;font-weight:800;color:var(--green);letter-spacing:.02em;}
.emma-login-sub{font-size:12px;color:var(--txt2);font-weight:500;margin-bottom:6px;}
/* ═══════════ ESTILOS VISUALES (SKINS) ═══════════ */

html[data-skin="acero"]{--radius:5px!important;--radius-lg:7px!important;}
html[data-skin="oro"]{--radius:12px!important;--radius-lg:16px!important;}
html[data-skin="cromo"]{--radius:14px!important;--radius-lg:20px!important;}

/* ════════ ACERO INDUSTRIAL: lista horizontal ════════ */
html[data-skin="acero"] .header{
  background:linear-gradient(180deg,#3a3d42,#1c1e21)!important;
  border-bottom:3px solid #000!important;
}
html[data-skin="acero"] .catalogo-grid{
  display:flex!important;flex-direction:column!important;gap:8px!important;
}
html[data-skin="acero"] .prod-card{
  display:flex!important;flex-direction:row!important;align-items:center!important;
  background:linear-gradient(180deg,var(--bg2),var(--bg))!important;
  border:1px solid rgba(0,0,0,.4)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 5px rgba(0,0,0,.3)!important;
  padding:8px 10px!important;gap:12px!important;
}
html[data-skin="acero"] .prod-card-foto{
  width:48px!important;height:48px!important;flex-shrink:0!important;font-size:26px!important;
  border-radius:6px!important;background:rgba(0,0,0,.2)!important;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.5)!important;
}
html[data-skin="acero"] .prod-card-info{
  flex:1!important;padding:0!important;display:grid!important;
  grid-template-columns:1fr auto auto!important;align-items:center!important;gap:10px!important;
}
html[data-skin="acero"] .prod-card-nombre{grid-column:1!important;margin:0!important;font-size:14px!important;}
html[data-skin="acero"] .prod-card-unidad{
  grid-column:1!important;grid-row:2!important;
  font-family:'Courier New',monospace!important;text-transform:uppercase!important;font-size:9px!important;letter-spacing:1px!important;
}
html[data-skin="acero"] .prod-card-precio{
  grid-column:2!important;grid-row:1/3!important;
  font-family:'Courier New',monospace!important;font-size:18px!important;color:#2ecc71!important;margin:0!important;
}
html[data-skin="acero"] .prod-card-btn{
  grid-column:3!important;grid-row:1/3!important;
  width:38px!important;height:38px!important;margin:0!important;padding:0!important;
  border-radius:6px!important;font-size:0!important;
  background:linear-gradient(180deg,#c0392b,#8b0000)!important;color:#fff!important;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.3)!important;border:1px solid #000!important;
}
html[data-skin="acero"] .prod-card-btn::after{content:'+'!important;font-size:22px!important;}

/* ════════ ORO & CARBÓN: grilla premium dorada ════════ */
html[data-skin="oro"] .header{
  background:linear-gradient(135deg,#1a1a1d,#2a2419)!important;
  border-bottom:2px solid #d4af37!important;
}
html[data-skin="oro"] .prod-card{
  background:linear-gradient(145deg,#1c1c20,#131316)!important;
  border:1px solid rgba(212,175,55,.3)!important;
  box-shadow:0 4px 16px rgba(0,0,0,.3)!important;position:relative!important;
}
html[data-skin="oro"] .prod-card::before{
  content:''!important;position:absolute!important;top:0!important;left:0!important;right:0!important;height:2px!important;z-index:5!important;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.7),transparent)!important;
}
html[data-skin="oro"] .prod-card-foto{
  background:radial-gradient(circle at center,rgba(212,175,55,.1),transparent)!important;
}
html[data-skin="oro"] .prod-card-nombre{color:#e8e8e8!important;}
html[data-skin="oro"] .prod-card-unidad{color:#8a7d50!important;}
html[data-skin="oro"] .prod-card-precio{
  background:linear-gradient(135deg,#f5d77e,#d4af37)!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;background-clip:text!important;
  font-weight:800!important;
}
html[data-skin="oro"] .prod-card-btn{
  background:linear-gradient(135deg,#d4af37,#b8860b)!important;color:#1a1a1d!important;
  box-shadow:0 2px 10px rgba(212,175,55,.4)!important;
}
html[data-skin="oro"] .chip.activo{
  background:linear-gradient(135deg,#d4af37,#b8860b)!important;color:#1a1a1d!important;border-color:transparent!important;
}

/* ════════ CROMO LÍQUIDO: tarjetas grandes apiladas ════════ */
html[data-skin="cromo"] .header{
  background:linear-gradient(180deg,#fafbfc,#dfe3e8)!important;
  border-bottom:1px solid #b0b6bd!important;
}
html[data-skin="cromo"] .header *{color:#2c3138!important;}
html[data-skin="cromo"] .catalogo-grid{
  display:flex!important;flex-direction:column!important;gap:12px!important;
}
html[data-skin="cromo"] .prod-card{
  display:flex!important;flex-direction:row!important;align-items:center!important;
  border:1px solid rgba(128,128,128,.22)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 5px 16px rgba(0,0,0,.1)!important;
  padding:12px!important;gap:14px!important;
}
html[data-skin="cromo"] .prod-card-foto{
  width:70px!important;height:70px!important;flex-shrink:0!important;font-size:36px!important;
  border-radius:14px!important;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.6),0 2px 4px rgba(0,0,0,.1)!important;
}
html[data-skin="cromo"] .prod-card-info{
  flex:1!important;padding:0!important;display:grid!important;
  grid-template-columns:1fr auto!important;align-items:center!important;gap:4px 12px!important;
}
html[data-skin="cromo"] .prod-card-nombre{grid-column:1!important;grid-row:1!important;margin:0!important;font-size:15px!important;}
html[data-skin="cromo"] .prod-card-unidad{grid-column:1!important;grid-row:2!important;}
html[data-skin="cromo"] .prod-card-precio{grid-column:1!important;grid-row:3!important;font-size:20px!important;font-weight:800!important;margin:0!important;}
html[data-skin="cromo"] .prod-card-btn{
  grid-column:2!important;grid-row:1/4!important;
  width:46px!important;height:46px!important;margin:0!important;padding:0!important;
  border-radius:13px!important;font-size:0!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 2px 6px rgba(0,0,0,.2)!important;
}
html[data-skin="cromo"] .prod-card-btn::after{content:'+'!important;font-size:24px!important;}

</style>
</head>
<body>
<div id="root"></div>

function getRealFoto(foto){
  if(!foto||!foto.startsWith('preset:')) return null;
  const id=foto.slice(7);
  const f=FOTOS_REALES[id];
  if(!f) return null;
  const uri=f.uri==='pollo'?FOTO_POLLO:FOTO_VERDURA;
  return {uri,sz:f.sz,bx:f.bx,by:f.by,esVerdura:f.uri==='verdura'};
}
function getFotoProducto(preset){
  if(!preset||!preset.startsWith('preset:')) return null;
  const id=preset.slice(7);
  const uri=FOTOS_PRODUCTOS[id];
  if(!uri) return null;
  return {tipo:'foto',uri};
}

function renderFotoProducto(foto, catStyle, sizeEm=2.4){

}

/* ─── #4 DESCUENTO DE STOCK AL VENDER + #5 CONSUMO FIFO DE LOTES ─── */
// Resta del inventario lo que se vendió. Si el producto no está en stock, lo ignora (no rompe la venta).
async function descontarStockVenta(uid, items){
  try{
    const stockCol=db.collection(`polleria/${uid}/stock`);
    const snap=await stockCol.get();
    const porNombre={};
    snap.docs.forEach(d=>{const data=d.data();porNombre[(data.nombre||'').toLowerCase().trim()]={id:d.id,cantidad:Number(data.cantidad)||0};});
    for(const it of (items||[])){
      const cant=Number(it.cantidad)||0;
      if(cant<=0)continue;
      const key=(it.nombre||'').toLowerCase().trim();
      const st=porNombre[key];
      if(st){
        const nueva=Math.max(0,+(st.cantidad-cant).toFixed(3));
        await stockCol.doc(st.id).update({cantidad:nueva});
        porNombre[key].cantidad=nueva;
      }
    }
  }catch(e){console.warn('descontarStockVenta:',e.message);}
}
// FIFO: descuenta lo vendido de los lotes más antiguos de ese producto (si existen lotes).
async function consumirLotesFIFO(uid, nombre, cant){
  try{
    if(!cant||cant<=0||!nombre)return;
    const lotesCol=db.collection(`polleria/${uid}/lotes`);
    const snap=await lotesCol.where('productoNombre','==',nombre).get();
    const lotes=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(l=>(Number(l.kgRestante)||0)>0)
      .sort((a,b)=>String(a.fechaIngreso||'').localeCompare(String(b.fechaIngreso||'')));
    let restante=cant;
    for(const l of lotes){
      if(restante<=0)break;
      const disp=Number(l.kgRestante)||0;
      const usar=Math.min(disp,restante);
      const nuevo=+(disp-usar).toFixed(3);
      await lotesCol.doc(l.id).update({kgRestante:nuevo,agotado:nuevo<=0.001});
      restante-=usar;
    }
  }catch(e){console.warn('consumirLotesFIFO:',e.message);}
}

/* Comprimir imagen antes de guardar */
const comprimirImagen = (file, maxPx=300, quality=0.75) => new Promise(res => {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h && w>maxPx){ h=h*maxPx/w; w=maxPx; }
      else if(h>maxPx){ w=w*maxPx/h; h=maxPx; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      res(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

function getLicenciaPoll(){try{return JSON.parse(localStorage.getItem('poll_licencia')||'null');}catch{return null;}}
function _uidPoll(){try{return (JSON.parse(localStorage.getItem('poll_licencia')||'null')||{}).deviceId||'default';}catch{return 'default';}}
function _limpiarTS(o){
  if(o&&typeof o==='object'){
    if(typeof o.toDate==='function'){try{return o.toDate().toISOString();}catch{return null;}}
    if(Array.isArray(o))return o.map(_limpiarTS);
    const r={};for(const k in o)r[k]=_limpiarTS(o[k]);return r;
  }
  return o;
}
async function exportarRespaldoPoll(){
  try{
    const uid=_uidPoll();
    const cols=['productos','stock','clientes','pedidos','movimientos','config','mermas','proveedores','lotes','recetas'];
    const data={};
    for(const c of cols){
      const snap=await db.collection('polleria/'+uid+'/'+c).get();
      data[c]=snap.docs.map(d=>_limpiarTS(Object.assign({_id:d.id},d.data())));
    }
    const local={};['polleria-nombre','polleria-tema','polleria-modo','pl_escala'].forEach(k=>{const v=localStorage.getItem(k);if(v!=null)local[k]=v;});
    const payload={app:'Gestion Polleria',fecha:new Date().toISOString(),uid,data,local};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='respaldo-polleria-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){alert('No se pudo exportar: '+(e&&e.message||e));}
}
async function restaurarRespaldoPoll(file){
  let obj;
  try{obj=JSON.parse(await file.text());}catch(e){alert('El archivo no es un .json válido.');return;}
  const data=(obj&&obj.data)?obj.data:null;
  if(!data){alert('El archivo no es un respaldo de Polleria válido.');return;}
  const cols=['productos','stock','clientes','pedidos','movimientos','config','mermas','proveedores','lotes','recetas'];
  const total=cols.reduce((a,c)=>a+((data[c]||[]).length),0);
  if(!confirm('Esto va a SUBIR a la nube '+total+' registros del respaldo (reemplaza los que tengan el mismo código). ¿Continuar?'))return;
  try{
    const uid=_uidPoll();
    for(const c of cols){
      const arr=data[c]||[];
      for(let i=0;i<arr.length;i+=400){
        const batch=db.batch();
        arr.slice(i,i+400).forEach(item=>{
          const rest=Object.assign({},item);delete rest._id;
          const ref=item._id?db.collection('polleria/'+uid+'/'+c).doc(item._id):db.collection('polleria/'+uid+'/'+c).doc();
          batch.set(ref,rest);
        });
        await batch.commit();
      }
    }
    if(obj.local){Object.keys(obj.local).forEach(k=>localStorage.setItem(k,obj.local[k]));}
    alert('✅ Respaldo restaurado en la nube. La app se va a recargar.');
    location.reload();
  }catch(e){alert('Error al restaurar: '+(e&&e.message||e));}
}

      <datalist id="carrito-clientes">{(clientes||[]).map(c=><option key={c.id} value={c.nombre}/>)}</datalist>
      {esConDatos&&<><Campo label="📞 Teléfono" value={telefono} onChange={setTelefono} placeholder="381-123-4567" tipo="tel"/><Campo label={pago==='transferencia'?'🏦 CBU / Alias':'💳 Titular y últimos 4 dígitos'} value={datosPago} onChange={setDatosPago} placeholder={pago==='transferencia'?'CBU o alias':'Ej: Juan García - 4521'}/></>}
      <div style={{margin:'10px 0',padding:'10px 12px',borderRadius:'var(--radius)',border:`2px solid ${esEnvio?'#e94560':'var(--border)'}`,background:esEnvio?'rgba(233,69,96,.06)':'var(--bg2)'}}>
        <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}><input type="checkbox" checked={esEnvio} onChange={e=>setEsEnvio(e.target.checked)} style={{width:18,height:18,accentColor:'#e94560',cursor:'pointer'}}/><div><div style={{fontSize:13,fontWeight:700,color:'var(--txt)'}}>🛵 Envío a domicilio</div><div style={{fontSize:11,color:'var(--txt2)'}}>Se registra como pedido pendiente</div></div></label>
        {esEnvio&&<><Campo label="📍 Dirección *" value={direccion} onChange={setDireccion} placeholder="Calle, número, piso..."/>{!telefono&&<Campo label="📞 Teléfono *" value={telefono} onChange={setTelefono} placeholder="381-123-4567" tipo="tel"/>}</>}
      </div>
      <div style={{background:'var(--green-bg)',borderRadius:'var(--radius)',padding:'10px 14px',margin:'10px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:700,fontSize:13,color:'var(--green)'}}>TOTAL</span><span style={{fontWeight:700,fontSize:26,color:'var(--green)'}}>{formatPeso(total)}</span></div>
      <button onClick={confirmar} disabled={cargando} className="btn-full" style={{background:esEnvio?'#e94560':'var(--green)'}}>{cargando?'⏳ Procesando...':(esEnvio?'🛵 Confirmar envío':'✅ Confirmar venta')}</button>
    </div>
  </div>);
}

const esPorPeso=u=>['kg','litro','litros'].includes(u||'kg');

function ModalPeso({prod,cantActual,onAgregar,onCerrar}){
  const [val,setVal]=useState(cantActual>0?String(cantActual):'');
  const [leyendo,setLeyendo]=useState(false);
  const num=parseFloat(val)||0;
  const total=num*(prod.precioVenta||0);
  const confirmar=()=>{if(num>0){onAgregar(num);onCerrar();}};
  const leerBalanza=async()=>{
    if(!('serial' in navigator)){alert('⚖️ La lectura automática necesita Chrome o Edge en una computadora. En el celular, ingresá el peso a mano.');return;}
    setLeyendo(true);
    let port,reader;
    try{
      port=await navigator.serial.requestPort();
      await port.open({baudRate:9600});
      reader=port.readable.getReader();
      const dec=new TextDecoder();
      let buffer='',encontrado=null;const t0=Date.now();
      while(Date.now()-t0<4000){
        const r=await reader.read();
        if(r.done)break;
        buffer+=dec.decode(r.value,{stream:true});
        const m=buffer.match(/-?\d+[.,]?\d*/g);
        if(m&&m.length){const n=parseFloat(m[m.length-1].replace(',','.'));if(!isNaN(n)&&n>0){encontrado=n;break;}}
      }
      if(encontrado!=null)setVal(String(encontrado));
      else alert('No pude leer un peso. Revisá que la balanza esté encendida y enviando datos, o ingresalo a mano.');
    }catch(e){
      if(!(e&&e.name==='NotFoundError'))alert('Error con la balanza: '+(e.message||e)+'. Probá ingresar el peso a mano.');
    }finally{
      try{if(reader)reader.releaseLock();}catch(_){}
      try{if(port)await port.close();}catch(_){}
      setLeyendo(false);
    }
  };
  return(<div className="overlay" onClick={onCerrar}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-drag"/><div style={{fontWeight:700,fontSize:16,color:'var(--txt)',marginBottom:2}}>{prod.nombre}</div><div style={{fontSize:13,color:'var(--txt2)',marginBottom:14}}>{formatPeso(prod.precioVenta||0)} / {prod.unidad||'kg'}</div><label className="lbl">Ingresá el peso ({prod.unidad||'kg'})</label><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><input type="number" step="0.001" min="0" autoFocus value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&confirmar()} className="inp" style={{flex:1,fontSize:28,textAlign:'center',fontWeight:700,padding:'10px'}} placeholder="0.000"/><span style={{fontSize:16,fontWeight:700,color:'var(--txt2)',minWidth:28}}>{prod.unidad||'kg'}</span></div><button onClick={leerBalanza} disabled={leyendo} className="btn-sec" style={{width:'100%',marginBottom:12,fontSize:13,padding:10}}>{leyendo?'⏳ Leyendo balanza...':'⚖️ Leer de balanza (Chrome PC)'}</button><div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>{[0.25,0.5,1,1.5,2,3,5].map(v=>(<button key={v} onClick={()=>setVal(String(v))} style={{flex:'1 0 auto',minWidth:40,padding:'7px 4px',borderRadius:'var(--radius)',border:`1px solid ${parseFloat(val)===v?'var(--green)':'var(--border)'}`,background:parseFloat(val)===v?'var(--green-bg)':'var(--bg2)',color:parseFloat(val)===v?'var(--green)':'var(--txt)',fontSize:13,fontWeight:700,cursor:'pointer'}}>{v}</button>))}</div>{num>0&&(<div style={{background:'var(--green-bg)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:13,color:'var(--green)',fontWeight:600}}>Total</span><span style={{fontSize:22,fontWeight:700,color:'var(--green)'}}>{formatPeso(total)}</span></div>)}<button onClick={confirmar} disabled={num<=0} className="btn-full" style={{background:'var(--green)',opacity:num<=0?0.4:1}}>{cantActual>0?'🔄 Actualizar en carrito':'🛒 Agregar al carrito'}</button></div></div>);
}

function normProdNombre(s){return (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/s$/,'');}
function PantallaCatalogo({uid}){
  const [productos,setProductos]=useState([]);
  const [stockItems,setStockItems]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [buscar,setBuscar]=useState('');
  const [catFiltro,setCatFiltro]=useState('Todos');
  const [carrito,setCarrito]=useState([]);
  const [carritoMovil,setCarritoMovil]=useState(false);
  const [modalPeso,setModalPeso]=useState(null);
  const [comprobante,setComprobante]=useState(null);
  const [toast,setToast]=useState('');

  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/productos`).orderBy('nombre','asc')
      .onSnapshot(s=>setProductos(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=db.collection(`polleria/${uid}/stock`).orderBy('nombre','asc')
      .onSnapshot(s=>setStockItems(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=db.collection(`polleria/${uid}/clientes`).orderBy('nombre','asc')
      .onSnapshot(s=>setClientes(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();u3();};
  },[]);

  // Normalización de nombres de categoría (para mostrarlas con emoji)
  const catMap={'Pollo':'🐔 Pollo','Congelados':'❄️ Congelados',
    'Verdulería':'🥦 Verdulería','Verduleria':'🥦 Verdulería',
    'Huevos y Lácteos':'🥚 Huevos y Lácteos','Huevos':'🥚 Huevos y Lácteos'};
  // Catálogo vinculado al stock: solo aparece lo que hay cargado y con precio.
  // Aplica igual a pollo, congelados y verdulería. Si limpiás el stock, desaparece de Vender.
  const todosProductos=React.useMemo(()=>{
    const norm=p=>({...p, categoria:catMap[p.categoria]||p.categoria||'📦 Otros'});
    return stockItems
      .filter(s=>(Number(s.precioVenta)||0)>0 && (Number(s.cantidad)||0)>0)
      .map(norm)
      .sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||(a.nombre||'').localeCompare(b.nombre||''));
  },[stockItems]);

  const mostrarToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2200);};

  // Tocar tarjeta: si es por peso abre modal; si es por unidad agrega directo
  const handleTarjeta=prod=>{
    if(esPorPeso(prod.unidad)){
      const enC=carrito.find(i=>i.prod.id===prod.id);
      setModalPeso({prod,cantActual:enC?enC.cantidad:0});
    } else {
      setCarrito(prev=>{
        const ex=prev.find(i=>i.prod.id===prod.id);
        if(ex) return prev.map(i=>i.prod.id===prod.id?{...i,cantidad:i.cantidad+1}:i);
        return[...prev,{prod,cantidad:1}];
      });
    }
  };

  // Recibe peso desde el modal
  const confirmarPeso=(prodId,peso)=>{
    setCarrito(prev=>{
      const ex=prev.find(i=>i.prod.id===prodId);
      if(ex) return prev.map(i=>i.prod.id===prodId?{...i,cantidad:peso}:i);
      const prod=todosProductos.find(p=>p.id===prodId);
      return[...prev,{prod,cantidad:peso}];
    });
  };

  // Cambia cantidad en carrito (para unidades con +/-)
  const cambiarCantidad=(prodId,delta)=>{
    setCarrito(prev=>prev.map(i=>i.prod.id===prodId?{...i,cantidad:Math.max(0,+(i.cantidad+delta).toFixed(3))}:i).filter(i=>i.cantidad>0));
  };

  // Setea cantidad exacta (para el input de peso en el carrito)
  const setCantidadDirecta=(prodId,val)=>{
    setCarrito(prev=>prev.map(i=>i.prod.id===prodId?{...i,cantidad:+parseFloat(val).toFixed(3)}:i).filter(i=>i.cantidad>0));
  };

  const limpiarCarrito=()=>{if(carrito.length&&confirm('¿Limpiar el carrito?'))setCarrito([]);};

  const onVentaConfirmada=data=>{
    setCarrito([]);
    setComprobante(data);
    setCarritoMovil(false);
    mostrarToast('✅ Venta registrada');
  };

  const totalCarrito=carrito.reduce((s,i)=>s+(i.prod.precioVenta||0)*i.cantidad,0);
  const CATS=['Todos',...new Set(todosProductos.map(p=>p.categoria||'Otro'))];
  const filtrados=todosProductos.filter(p=>{
    const okB=p.nombre.toLowerCase().includes(buscar.toLowerCase());
    const okC=catFiltro==='Todos'||(p.categoria||'Otro')===catFiltro;
    return okB&&okC;
  });

  const carritoPanel=<CarritoPanel
    carrito={carrito}
    onCambiarCantidad={cambiarCantidad}
    onSetCantidad={setCantidadDirecta}
    onEditarPeso={prod=>{const enC=carrito.find(i=>i.prod.id===prod.id);setModalPeso({prod,cantActual:enC?enC.cantidad:0});}}
    onLimpiar={limpiarCarrito}
    uid={uid} clientes={clientes}
    onVentaConfirmada={onVentaConfirmada}/>;

  return(
    <div>
      <Header titulo="Catálogo / Vender" subtitulo="Punto de venta"/>
      <div className="split-layout">
        {/* IZQUIERDA – catálogo */}
        <div className="split-left">
          <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar producto..." className="search" style={{marginBottom:10}}/>
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:8,scrollbarWidth:'none'}}>
            {CATS.map(c=>(
              <button key={c} onClick={()=>setCatFiltro(c)} className={`chip${catFiltro===c?' activo':''}`} style={{flexShrink:0}}>
                {c==='Todos'?'🐔 Todos':c}
              </button>
            ))}
          </div>
          {filtrados.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>🛒</div>No hay productos.<br/>Agregá productos en <b>Stock → Precios</b> o en los calculadores de cajones y congelados.</div>}
          <div className="catalogo-grid">
            {filtrados.map(p=>{
              const cs=catStyle(p.categoria||(p.tipo==='verduleria'?'Verdulería':p.tipo==='congelados'?'Congelados':p.tipo==='cajon'?'🐔 Pollo':undefined));
              const enC=carrito.find(i=>i.prod.id===p.id);
              const esPeso=esPorPeso(p.unidad);
              const fotoData=renderFotoProducto(p.foto,cs,2.2);
              const fotoReal=getProductFoto(p);
              return(
                <div key={p.id} className="prod-card" onClick={()=>handleTarjeta(p)}>
                  <div className="prod-card-foto" style={{background:fotoReal?.tipo==='svg'?'#fef3e8':fotoReal?.esVerdura?'#f0fdf4':fotoReal?'#fef3e8':fotoData.bg,padding:0,overflow:'hidden'}}>
                    {fotoReal?.tipo==='foto'?(
                      <img src={fotoReal.uri} alt={p.nombre} style={{width:'100%',height:'100%',objectFit:'contain',padding:'6px'}}/>
                    ):fotoReal?.tipo==='svg'||fotoReal?.tipo==='crop'?(
                      <div style={{width:'100%',height:'100%',backgroundImage:`url(${fotoReal.uri})`,backgroundSize:fotoReal.sz||'contain',backgroundPosition:`${fotoReal.bx||'50%'} ${fotoReal.by||'50%'}`,backgroundRepeat:'no-repeat'}}/>
                    ):fotoReal?.tipo==='sprite'?(
                      <div className="prod-foto-real" style={{backgroundImage:`url(${fotoReal.uri})`,backgroundSize:fotoReal.sz,backgroundPosition:`${fotoReal.bx} ${fotoReal.by}`,width:'100%',height:'100%'}}/>
                    ):fotoData.content}
                    {enC&&<div className="prod-badge">{enC.cantidad}{esPeso?p.unidad||'kg':''}</div>}
                  </div>
                  <div className="prod-card-info">
                    <div className="prod-card-nombre">{p.nombre}</div>
                    <div className="prod-card-unidad">por {p.unidad||'kg'}</div>
                    <div style={{fontSize:11,color:'var(--green)',fontWeight:600,margin:'1px 0 2px'}}>📦 {(Number(p.cantidad)||0)} {p.unidad||'kg'} en stock</div>
                    <div className="prod-card-precio">{formatPeso(p.precioVenta||0)}</div>
                    <button className="prod-card-btn" style={{background:enC?'var(--green)':'var(--txt)'}}>
                      {enC?(esPeso?`⚖️ ${enC.cantidad} ${p.unidad||'kg'}`:`🛒 ${enC.cantidad} unid.`):(esPeso?'⚖️ Ingresar peso':'+ Agregar')}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* DERECHA – carrito solo en PC */}
        <div className="split-right">
          {carritoPanel}
        </div>
      </div>

      {/* Botón flotante carrito (solo móvil) */}
      {carrito.length>0&&(
        <button onClick={()=>setCarritoMovil(true)} className="carrito-fab">
          🛒 {carrito.length} prod. · {formatPeso(totalCarrito)}
        </button>
      )}

      {/* Carrito como bottom sheet en móvil */}
      {carritoMovil&&(
        <div className="overlay" onClick={()=>setCarritoMovil(false)}>
          <div className="modal" style={{height:'88vh',display:'flex',flexDirection:'column',padding:'1rem'}} onClick={e=>e.stopPropagation()}>
            <div className="modal-drag"/>
            {carritoPanel}
          </div>
        </div>
      )}

      {/* Modal de ingreso de peso */}
      {modalPeso&&(
        <ModalPeso
          prod={modalPeso.prod}
          cantActual={modalPeso.cantActual}
          onAgregar={peso=>confirmarPeso(modalPeso.prod.id,peso)}
          onCerrar={()=>setModalPeso(null)}
        />
      )}

      {comprobante&&<Comprobante data={comprobante} onCerrar={()=>setComprobante(null)}/>}
      <Toast msg={toast}/>
    </div>
  );
}

/* ══════════════════════════════════════
   PRECIOS  (todos los productos + imágenes)
══════════════════════════════════════ */
function PantallaPrecios({uid, sinHeader=false}){
  const [productos,setProductos]=useState([]);
  const [stockItems,setStockItems]=useState([]);
  const [form,setForm]=useState(null);
  const [buscar,setBuscar]=useState('');
  const CATS=['🐔 Pollo','❄️ Congelados','🥦 Verdulería','🥚 Huevos y Lácteos','🥩 Carne','🍋 Frutas','🧀 Fiambres','🛒 Almacén','Otro'];

  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/productos`).orderBy('nombre','asc')
      .onSnapshot(s=>setProductos(s.docs.map(d=>({id:d.id,...d.data(),_col:'productos'}))));
    const u2=db.collection(`polleria/${uid}/stock`).orderBy('nombre','asc')
      .onSnapshot(s=>setStockItems(s.docs.map(d=>({id:d.id,...d.data(),_col:'stock'}))));
    return()=>{u1();u2();};
  },[]);

  const guardar=async d=>{
    const{id,_col,_src,...r}=d;
    // Siempre guardar en productos para que quede en el catálogo
    const col=db.collection(`polleria/${uid}/productos`);
    const data={...r,precioCosto:Number(r.precioCosto)||0,precioVenta:Number(r.precioVenta)||0};
    if(id&&_col==='productos') await col.doc(id).update(data);
    else if(id&&_col==='stock'){
      // Crear/actualizar en productos usando el mismo id
      await col.doc(id).set({
        nombre:r.nombre,categoria:r.categoria||'❄️ Congelados',
        unidad:r.unidad||'kg',precioCosto:data.precioCosto,
        precioVenta:data.precioVenta,foto:r.foto||'',
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      },{merge:true});
      // También actualizar el precio en stock
      await db.collection(`polleria/${uid}/stock`).doc(id)
        .update({precioVenta:data.precioVenta,precioCosto:data.precioCosto});
    } else {
      await col.add(data);
    }
    setForm(null);
  };

  const eliminar=async p=>{
    if(!confirm('¿Eliminar producto?'))return;
    if(p._col==='productos') await db.collection(`polleria/${uid}/productos`).doc(p.id).delete();
    else if(p._col==='stock') await db.collection(`polleria/${uid}/stock`).doc(p.id).delete();
  };

  // Combinar sin duplicar
  const catMap={'Pollo':'🐔 Pollo','Congelados':'❄️ Congelados',
    'Verdulería':'🥦 Verdulería','Verduleria':'🥦 Verdulería',
    'Huevos y Lácteos':'🥚 Huevos y Lácteos','Huevos':'🥚 Huevos y Lácteos'};
  const todosProductos=React.useMemo(()=>{
    const nombresEnProd=new Set(productos.map(p=>(p.nombre||'').toLowerCase().trim()));
    const stockVisibles=stockItems.filter(s=>
      (s.precioVenta||0)>0 && !nombresEnProd.has((s.nombre||'').toLowerCase().trim())
    );
    const norm=p=>({...p,categoria:catMap[p.categoria]||p.categoria||'📦 Otros'});
    return [...productos.map(norm),...stockVisibles.map(norm)]
      .sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||(a.nombre||'').localeCompare(b.nombre||''));
  },[productos,stockItems]);

  if(form!==null) return <FormProducto inicial={form} onGuardar={guardar} onCancelar={()=>setForm(null)} categorias={CATS}/>;

  const filtrados=todosProductos.filter(p=>
    p.nombre.toLowerCase().includes(buscar.toLowerCase())||
    (p.categoria||'').toLowerCase().includes(buscar.toLowerCase())
  );
  const porCat={};
  filtrados.forEach(p=>{const c=p.categoria||'Otro';if(!porCat[c])porCat[c]=[];porCat[c].push(p);});

  return(
    <div>
      {!sinHeader&&<Header titulo="Lista de Precios" onAdd={()=>setForm({})} onLogout={()=>auth.signOut()}/>}
      <div className="app-body">
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar producto..." className="search" style={{flex:1}}/>
          <button onClick={()=>setForm({})} className="btn-pri" style={{padding:'0 16px',fontSize:20,flexShrink:0}}>+</button>
        </div>

        {todosProductos.length===0 &&
          <div className="empty">
            <div style={{fontSize:48,marginBottom:12}}>📋</div>
            No hay productos<br/>
            <button onClick={()=>setForm({})} className="btn-pri" style={{marginTop:16}}>+ Agregar</button>
          </div>
        }

        {Object.entries(porCat).map(([cat,prods])=>(
          <div key={cat} style={{marginBottom:16}}>
            <div className="sec-title">{cat} <span style={{fontWeight:400}}>({prods.length})</span></div>
            {prods.map(p=>{
              const m=p.precioCosto>0?Math.round(((Number(p.precioVenta)-Number(p.precioCosto))/Number(p.precioCosto))*100):null;
              const cs=catStyle(p.categoria||(p.tipo==='verduleria'?'Verdulería':p.tipo==='congelados'?'Congelados':p.tipo==='cajon'?'🐔 Pollo':undefined));
              const fotoReal=getProductFoto(p);
              return(
                <div key={p.id} className="card">
                  <div className="card-body">
                    <div className="card-head">
                      {/* Imagen del producto */}
                      <div style={{width:56,height:56,borderRadius:10,background:fotoReal?.esVerdura?'#f0fdf4':'#fef3e8',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0,marginRight:10}}>
                        {fotoReal?.tipo==='foto'?(
                          <img src={fotoReal.uri} alt="" style={{width:'100%',height:'100%',objectFit:'contain',padding:2}}/>
                        ):fotoReal?.tipo==='sprite'||fotoReal?.tipo==='crop'?(
                          <div style={{width:'100%',height:'100%',backgroundImage:`url(${fotoReal.uri})`,backgroundSize:fotoReal.sz,backgroundPosition:`${fotoReal.bx} ${fotoReal.by}`,backgroundRepeat:'no-repeat'}}/>
                        ):p.foto?(
                          <img src={p.foto} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                        ):(
                          <span style={{fontSize:26}}>{cs.emoji}</span>
                        )}
                      </div>
                      <div style={{flex:1}}>
                        <div className="card-name">{p.nombre}</div>
                        <div className="card-sub">por {p.unidad||'kg'} {p._col==='stock'&&<span style={{color:'var(--blue)',fontSize:10}}> · stock</span>}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>
                        {p.precioCosto>0&&<div style={{fontSize:11,color:'var(--txt2)',textDecoration:'line-through'}}>{formatPeso(p.precioCosto)}</div>}
                        <div style={{fontWeight:700,fontSize:20,color:'var(--txt)'}}>{formatPeso(p.precioVenta||0)}</div>
                        {m!==null&&<span className={m>=30?'pill pill-green':m>=10?'pill pill-orange':'pill pill-red'}>{m}%</span>}
                      </div>
                    </div>
                    <div className="card-actions">
                      <button onClick={()=>setForm({...p})} className="btn-ic">✏️ Editar precio</button>
                      <button onClick={()=>eliminar(p)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

      return{...p,categoria:cat,unidad:nuevaUnidad};

  const [mostrarGaleria,setMostrarGaleria]=useState(false);

            {fotoActual.content}

          <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>

        {/* ── Galería de presets ── */}

          <div style={{background:'var(--bg2)',borderRadius:'var(--radius-lg)',padding:12,marginBottom:14}}>
            {/* Tabs de categoría */}
            <div style={{display:'flex',gap:4,marginBottom:10,overflowX:'auto',scrollbarWidth:'none'}}>
              {GALERIA_GRUPOS.map((g,i)=>(
                <button key={i} onClick={()=>setTabGaleria(i)}

                    background:tabGaleria===i?'var(--green)':'var(--bg)',

            </div>
            {/* Grid de imágenes */}

                return(
                  <button key={id} onClick={()=>{set('foto',`preset:${id}`);setMostrarGaleria(false);}}

          {categorias.map(c=><button key={c} onClick={()=>setCategoria(c)} className={`chip${d.categoria===c?' activo':''}`}>{c}</button>)}
        </div>

        <label className="lbl">Unidad de venta</label>

          {UNIDADES.map(u=><button key={u} onClick={()=>set('unidad',u)} className={`chip${d.unidad===u?' activo':''}`}>{u}</button>)}
        </div>

        <Campo label="Descripción (opcional)" value={d.descripcion} onChange={v=>set('descripcion',v)} placeholder="Ej: fresco, de granja" rows={2}/>
        <Campo label="💸 Precio de costo ($)" value={d.precioCosto} onChange={v=>set('precioCosto',v)} tipo="number" placeholder="0"/>
        <Campo label="💰 Precio de venta ($)" value={d.precioVenta} onChange={v=>set('precioVenta',v)} tipo="number" placeholder="0"/>

        {Number(d.precioCosto)>0&&Number(d.precioVenta)>0&&(
          <div style={{background:m>=0?'var(--green-bg)':'var(--red-bg)',border:`1px solid ${m>=0?'var(--green)':'var(--red)'}`,borderRadius:'var(--radius)',padding:'10px 14px',marginTop:4,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:13,color:'var(--txt2)'}}>Ganancia:</span>
            <span style={{fontWeight:700,color:m>=0?'var(--green)':'var(--red)',fontSize:15}}>{m}% — {formatPeso(Number(d.precioVenta)-Number(d.precioCosto))}</span>
          </div>
        )}
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Agregar'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

const PRECIOS_MERCADO_POLLO={
  'Pollo entero':   {min:4100,max:4800,sug:4500},
  'Pechugas':       {min:10300,max:12800,sug:11500},
  'Pata-muslo':     {min:4100,max:4800,sug:4500},
  'Alas':           {min:3200,max:3900,sug:3550},
  'Muslos':         {min:4100,max:4800,sug:4500},
  'Carcasas':       {min:1800,max:2200,sug:2000},
  'Filet pechuga':  {min:10300,max:12800,sug:11500},
  'Milanesas':      {min:8000,max:10000,sug:9000},
  'Carcasas caldo': {min:1800,max:2200,sug:2000},
};

const CORTES_DEFAULT=[
  {n:'Pechuga',         pct:40, precioRef:4000},
  {n:'Pata-muslo',      pct:30, precioRef:3000},
  {n:'Alas',            pct:20, precioRef:2000},
  {n:'Carcasa+menudos', pct:10, precioRef:1000},
];

function CalculadoraCajon({uid}){
  const [cajones,setCajones]=useState(1);
  const [kgCajon,setKgCajon]=useState(20);
  const [nPollos,setNPollos]=useState('');
  const [modo,setModo]=useState('completo');
  const [precioCajon,setPrecioCajon]=useState('');
  const [preciosVenta,setPreciosVenta]=useState({});
  const [guardando,setGuardando]=useState(false);
  const [toastMsg,setToastMsg]=useState('');
  const [rendimientoPct,setRendimientoPct]=useState(90);
  const [margenObj,setMargenObj]=useState(30);
  // Config editable (precargada): cortes del trozado + precio del pollo entero
  const [cortesCfg,setCortesCfg]=useState(CORTES_DEFAULT);
  const [precioEntero,setPrecioEntero]=useState(4400);
  const [editandoCfg,setEditandoCfg]=useState(false);
  const [guardandoCfg,setGuardandoCfg]=useState(false);
  const cfgRef=db.collection(`polleria/${uid}/config`).doc('cajon');
  useEffect(()=>{
    cfgRef.get().then(snap=>{
      if(snap.exists){const d=snap.data();
        if(Array.isArray(d.cortes)&&d.cortes.length)setCortesCfg(d.cortes);
        if(d.precioEntero)setPrecioEntero(d.precioEntero);
        if(d.rendimientoPct)setRendimientoPct(d.rendimientoPct);
      }
    }).catch(()=>{});
  },[]);

  const totKg=+(cajones*kgCajon).toFixed(2);
  const rendimientoKg=+(totKg*rendimientoPct/100).toFixed(2);
  const tot=parseInt(nPollos)||0;
  const kgPromedio=tot>0?+(rendimientoKg/tot).toFixed(2):null;
  const precioTotalPagado=Number(precioCajon)*cajones||0;
  const costoPorKg=rendimientoKg>0&&precioTotalPagado>0?precioTotalPagado/rendimientoKg:0;

  const MODOS={
    completo:{label:'🐔 Entero', piezas:[
      {n:'Pollo entero', kgEst:rendimientoKg, precioRef:Number(precioEntero)||0},
    ]},
    piezas:{label:'🍗 Trozado', piezas:cortesCfg.map(c=>({
      n:c.n,
      kgEst:+(rendimientoKg*(Number(c.pct)||0)/100).toFixed(2),
      precioRef:Number(c.precioRef)||0,
    }))},
  };
  const M=MODOS[modo];
  const conRef=tot>0;

  // ── COSTEO POR VALOR ──────────────────────────────────────────────
  // Cada corte vale distinto (la carcasa NO es el filet). Repartimos el costo
  // del cajón según el valor de cada corte, no por kilo parejo. Los valores
  // de referencia (porcentajes y precios) los edita el usuario y quedan guardados.
  const refValor=n=>{const p=M.piezas.find(x=>x.n===n);return p?(Number(p.precioRef)||0):0;};
  const valorTotalCajon=M.piezas.reduce((s,p)=>s+p.kgEst*refValor(p.n),0);
  const costoKgCorte=n=>(precioTotalPagado>0&&valorTotalCajon>0)?(precioTotalPagado*refValor(n)/valorTotalCajon):0;
  const precioAuto=n=>Math.round(costoKgCorte(n)*(1+(Number(margenObj)||0)/100)); // precio = costo + margen
  const getPv=n=>preciosVenta[n]!==undefined?Number(preciosVenta[n]):precioAuto(n); // editado a mano, o automático
  const setPv=(n,v)=>setPreciosVenta(p=>({...p,[n]:v}));
  const volverAutomatico=()=>{setPreciosVenta({});mostrarToast('↺ Precios automáticos restablecidos');};

  // Editar y guardar la configuración de cortes
  const setCorte=(idx,k,v)=>setCortesCfg(cs=>cs.map((c,i)=>i===idx?{...c,[k]:v}:c));
  const sumaPct=cortesCfg.reduce((s,c)=>s+(Number(c.pct)||0),0);
  const guardarCfg=async()=>{
    setGuardandoCfg(true);
    try{
      await cfgRef.set({
        cortes:cortesCfg.map(c=>({n:c.n,pct:Number(c.pct)||0,precioRef:Number(c.precioRef)||0})),
        precioEntero:Number(precioEntero)||0,
        rendimientoPct:Number(rendimientoPct)||90,
      },{merge:true});
      setEditandoCfg(false);
      mostrarToast('✅ Configuración guardada');
    }catch(e){alert('Error: '+e.message);}
    setGuardandoCfg(false);
  };

  // Cálculos financieros
  const ingresoPieza=p=>+(p.kgEst*getPv(p.n)).toFixed(2);
  const totalIngreso=M.piezas.reduce((s,p)=>s+ingresoPieza(p),0);
  const gananciaTotal=totalIngreso-precioTotalPagado;
  const gananciaPct=precioTotalPagado>0?+((gananciaTotal/precioTotalPagado)*100).toFixed(1):0;

  // Badge comparación con mercado
  const badgeMercado=(n,pv)=>{
    const r=PRECIOS_MERCADO_POLLO[n]; if(!r||!pv) return null;
    if(pv<r.min) return <span style={{fontSize:10,background:'var(--orange-bg)',color:'var(--orange)',borderRadius:4,padding:'1px 5px',marginLeft:5,fontWeight:700}}>↓ bajo mercado</span>;
    if(pv>r.max) return <span style={{fontSize:10,background:'var(--blue-bg)',color:'var(--blue)',borderRadius:4,padding:'1px 5px',marginLeft:5,fontWeight:700}}>↑ premium</span>;
    return <span style={{fontSize:10,background:'var(--green-bg)',color:'var(--green)',borderRadius:4,padding:'1px 5px',marginLeft:5,fontWeight:700}}>✓ en mercado</span>;
  };

  const mostrarToast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};

  const agregarAlStock=async()=>{
    if(!precioCajon||Number(precioCajon)<=0)return alert('Ingresá el precio pagado por cajón');
    setGuardando(true);
    try{
      const stockCol=db.collection(`polleria/${uid}/stock`);
      const prodCol=db.collection(`polleria/${uid}/productos`);
      for(const p of M.piezas){
        const docId='pollo-'+p.n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s/]+/g,'-');
        const pVenta=getPv(p.n);
        const pCosto=+costoKgCorte(p.n).toFixed(2);
        const stockRef=stockCol.doc(docId);
        const snap=await stockRef.get();
        const cantActual=snap.exists?(Number(snap.data().cantidad)||0):0;
        await stockRef.set({
          nombre:p.n,categoria:'Pollo',tipo:'cajon',
          cantidad:+(cantActual+p.kgEst*1.10).toFixed(2),
          unidad:'kg',
          precioCosto:pCosto,
          precioVenta:+pVenta.toFixed(2),
          stockMinimo:0,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });
        await prodCol.doc(docId).set({
          nombre:p.n,categoria:'🐔 Pollo',
          unidad:'kg',
          precioCosto:pCosto,
          precioVenta:+pVenta.toFixed(2),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        },{merge:true});
      }
      mostrarToast(`✅ ${M.piezas.length} cortes publicados al catálogo`);
    }catch(e){alert('Error: '+e.message);}
    setGuardando(false);
  };

  return(
    <div>
      {/* ── Panel básico ── */}
      <div className="panel">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div className="ptitle" style={{margin:0}}>🧮 Calculadora de Cajón</div>
          <button onClick={()=>setEditandoCfg(v=>!v)} style={{fontSize:11,padding:'5px 10px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:editandoCfg?'var(--blue-bg)':'var(--bg2)',color:editandoCfg?'var(--blue)':'var(--txt2)',cursor:'pointer',fontWeight:600}}>⚙️ Cortes</button>
        </div>
        {editandoCfg&&(
          <div style={{background:'var(--blue-bg)',border:'1px solid var(--blue)',borderRadius:'var(--radius)',padding:'12px',marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginBottom:2}}>⚙️ Cortes y precios de referencia</div>
            <div style={{fontSize:11,color:'var(--txt2)',marginBottom:10}}>Ajustá cuánto rinde cada corte (%) y su valor ($/kg). Esto define cómo se reparte el costo.</div>
            <div style={{display:'flex',gap:6,fontSize:10,color:'var(--txt3)',fontWeight:700,padding:'0 2px 4px'}}>
              <span style={{flex:1}}>CORTE</span><span style={{width:54,textAlign:'center'}}>%</span><span style={{width:78,textAlign:'center'}}>$/kg</span>
            </div>
            {cortesCfg.map((c,idx)=>(
              <div key={idx} style={{display:'flex',gap:6,alignItems:'center',marginBottom:6}}>
                <span style={{flex:1,fontSize:13,color:'var(--txt)',fontWeight:500}}>{c.n}</span>
                <input type="number" min={0} value={c.pct} onChange={e=>setCorte(idx,'pct',e.target.value)} className="inp" style={{width:54,textAlign:'center',padding:'5px 4px',fontSize:13,fontWeight:700}}/>
                <input type="number" min={0} step={100} value={c.precioRef} onChange={e=>setCorte(idx,'precioRef',e.target.value)} className="inp" style={{width:78,textAlign:'center',padding:'5px 4px',fontSize:13}}/>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:sumaPct===100?'var(--green)':'var(--orange)',fontWeight:700,margin:'2px 2px 10px'}}>
              <span>Suma de %</span><span>{sumaPct}% {sumaPct===100?'✓':'(debería dar 100)'}</span>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:10}}>
              <span style={{flex:1,fontSize:13,color:'var(--txt)',fontWeight:500}}>🐔 Pollo entero</span>
              <span style={{width:54,textAlign:'center',fontSize:11,color:'var(--txt3)'}}>—</span>
              <input type="number" min={0} step={100} value={precioEntero} onChange={e=>setPrecioEntero(e.target.value)} className="inp" style={{width:78,textAlign:'center',padding:'5px 4px',fontSize:13}}/>
            </div>
            <button onClick={guardarCfg} disabled={guardandoCfg} className="btn-pri" style={{width:'100%',padding:10,fontSize:13}}>{guardandoCfg?'Guardando...':'💾 Guardar configuración'}</button>
          </div>
        )}
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>Cajones</label>
            <input type="number" min={1} value={cajones}
              onChange={e=>setCajones(Math.max(1,Number(e.target.value)))}
              className="inp" style={{textAlign:'center',fontWeight:700,fontSize:24,marginTop:4}}/>
          </div>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>Kg por cajón</label>
            <input type="number" min={1} step={0.5} value={kgCajon}
              onChange={e=>setKgCajon(Math.max(1,Number(e.target.value)))}
              className="inp" style={{textAlign:'center',fontWeight:700,fontSize:24,marginTop:4}}/>
          </div>
        </div>
        <div className="suma-band" style={{marginBottom:6}}>
          <span style={{fontSize:13,color:'var(--txt2)'}}>
            {cajones} cajón{cajones>1?'es':''} × {kgCajon} kg brutos
          </span>
          <span style={{fontSize:20,fontWeight:700,color:'var(--txt)'}}>= {totKg} kg</span>
        </div>
        <div style={{background:'var(--orange-bg)',border:'1px solid var(--orange)',borderRadius:'var(--radius)',padding:'10px 12px',marginBottom:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <label className="lbl" style={{marginTop:0,color:'var(--orange)',fontWeight:700,fontSize:12}}>🐔 Rendimiento del cajón</label>
            <span style={{fontSize:12,color:'var(--txt2)'}}>Bruto {totKg}kg → <b style={{color:'var(--orange)'}}>{rendimientoKg} kg</b> vendibles</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <input type="range" min={50} max={95} step={1} value={rendimientoPct} onChange={e=>setRendimientoPct(Number(e.target.value))} style={{flex:1,accentColor:'var(--orange)'}}/>
            <input type="number" min={50} max={95} value={rendimientoPct} onChange={e=>setRendimientoPct(Math.min(95,Math.max(50,Number(e.target.value))))} className="inp" style={{width:60,textAlign:'center',fontWeight:700,padding:'4px 6px'}}/>
            <span style={{fontSize:13,color:'var(--txt2)',flexShrink:0}}>%</span>
          </div>
          <div style={{fontSize:11,color:'var(--txt3)',marginTop:4}}>Típico: 65–75% (descuenta sangre, merma y grasa)</div>
        </div>
        <div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:'10px 12px',marginBottom:12}}>
          <label className="lbl" style={{marginTop:0,fontSize:11}}>
            Nº de pollos <span style={{color:'var(--txt3)',fontWeight:400}}>(opcional · para ver piezas estimadas)</span>
          </label>
          <div style={{display:'flex',alignItems:'center',gap:10,marginTop:6}}>
            <input type="number" min={1} max={30} value={nPollos}
              onChange={e=>setNPollos(e.target.value)}

function CalculadoraCongelados({uid}){
  const [nombre,setNombre]=useState('');
  const [cajas,setCajas]=useState(1);const [kgCaja,setKgCaja]=useState(5);
  const [precioCaja,setPrecioCaja]=useState('');const [porcGanancia,setPorcGanancia]=useState(30);
  const [guardando,setGuardando]=useState(false);const [toastMsg,setToastMsg]=useState('');
  const totKg=cajas*kgCaja;
  const precioTotalPagado=Number(precioCaja)*cajas||0;
  const costoPorKg=totKg>0&&precioTotalPagado>0?precioTotalPagado/totKg:0;
  const precioVentaKg=costoPorKg>0?costoPorKg*(1+porcGanancia/100):0;
  const gananciaTotal=(precioVentaKg-costoPorKg)*totKg;
  const mostrarToast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};
  const agregarAlStock=async()=>{
    if(!nombre.trim())return alert('Ingresá el nombre del producto');
    if(!precioCaja||Number(precioCaja)<=0)return alert('Ingresá el precio pagado por caja');
    setGuardando(true);
    try{
      const nombreLimpio=nombre.trim();
      const docId='cong-'+nombreLimpio.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s/]+/g,'-');
      // Guardar en stock
      const stockRef=db.collection(`polleria/${uid}/stock`).doc(docId);
      const snap=await stockRef.get();
      const cantActual=snap.exists?(Number(snap.data().cantidad)||0):0;
      await stockRef.set({
        nombre:nombreLimpio,categoria:'Congelados',tipo:'congelado',
        cantidad:+(cantActual+totKg).toFixed(2),unidad:'kg',cajas,kgPorCaja:kgCaja,
        precioCaja:Number(precioCaja),precioCosto:+costoPorKg.toFixed(2),
        precioVenta:+precioVentaKg.toFixed(2),porcGanancia:Number(porcGanancia),
        stockMinimo:0,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      // Guardar también en productos (para que aparezca en el catálogo de ventas)
      await db.collection(`polleria/${uid}/productos`).doc(docId).set({
        nombre:nombreLimpio,categoria:'❄️ Congelados',unidad:'kg',
        precioCosto:+costoPorKg.toFixed(2),precioVenta:+precioVentaKg.toFixed(2),
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      },{merge:true});
      mostrarToast('✅ Congelado agregado al inventario y catálogo');
      setNombre('');setPrecioCaja('');
    }catch(e){alert('Error al guardar: '+e.message);}
    setGuardando(false);
  };
  return(
    <div>
      <div className="panel">
        <div className="ptitle">❄️ Calculadora de Congelados</div>
        <Campo label="Nombre del producto *" value={nombre} onChange={setNombre} placeholder="Ej: Medallones, Nuggets, Hamburguesas..."/>
        <div style={{display:'flex',gap:10,marginBottom:4}}>
          {[{lbl:'Cajas',v:cajas,set:v=>setCajas(Math.max(1,v))},{lbl:'Kg por caja',v:kgCaja,set:v=>setKgCaja(Math.max(0.5,v)),step:0.5}].map(f=>(
            <div key={f.lbl} style={{flex:1}}>
              <label className="lbl">{f.lbl}</label>
              <input type="number" step={f.step||1} value={f.v} onChange={e=>f.set(Number(e.target.value))} className="inp" style={{textAlign:'center',fontWeight:700,fontSize:18}}/>
            </div>
          ))}
        </div>
        <div className="suma-band">
          <span style={{fontSize:13,color:'var(--txt2)'}}>Total kg: <b style={{color:'var(--txt)'}}>{totKg.toFixed(1)}</b></span>
          <span style={{fontSize:13,color:'var(--txt2)'}}>Cajas: <b style={{color:'var(--txt)'}}>{cajas}</b></span>
        </div>
      </div>
      <div className="panel">
        <div className="ptitle">💰 Precio y Ganancia</div>
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>Precio pagado por caja ($)</label>
            <input type="number" value={precioCaja} onChange={e=>setPrecioCaja(e.target.value)} className="inp" placeholder="0" style={{fontWeight:700,fontSize:18}}/>
          </div>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>% Ganancia</label>
            <input type="number" value={porcGanancia} onChange={e=>setPorcGanancia(Number(e.target.value))} className="inp" style={{fontWeight:700,fontSize:18}} min={0}/>
          </div>
        </div>
        {costoPorKg>0&&(
          <div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:12,marginBottom:12}}>
            {[
              {lbl:'💸 Total pagado',val:formatPeso(precioTotalPagado),c:'var(--red)'},
              {lbl:'📦 Costo por kg',val:formatPeso(costoPorKg),c:'var(--txt)'},
              {lbl:'🏷️ Precio de venta / kg',val:formatPeso(precioVentaKg),c:'var(--blue)'},
              {lbl:`✨ Ganancia (${porcGanancia}%)`,val:formatPeso(gananciaTotal),c:'var(--green)'},
            ].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:r.c}}>{r.val}</span>
              </div>
            ))}
          </div>
        )}
        <button onClick={agregarAlStock} disabled={guardando||!precioCaja||Number(precioCaja)<=0||!nombre.trim()} className="btn-full"
          style={{background:'var(--blue)',opacity:(!precioCaja||Number(precioCaja)<=0||!nombre.trim())?0.4:1}}>
          {guardando?'⏳ Guardando...':'✅ Agregar al Inventario'}
        </button>
      </div>
      <Toast msg={toastMsg}/>
    </div>
  );
}

                  {item.stockMinimo>0&&<div className="card-sub">Mínimo: {item.stockMinimo} {item.unidad}</div>}
                  {ganPct!==null&&<span className={ganPct>=30?'pill pill-green':ganPct>=10?'pill pill-orange':'pill pill-red'} style={{marginTop:4,display:'inline-block'}}>Ganancia: {ganPct}%</span>}

        );
      })}

  );

        <Campo label="💰 Precio de venta ($)" value={d.precioVenta} onChange={v=>set('precioVenta',v)} tipo="number" placeholder="0"/>

            <span style={{fontWeight:700,color:ganPct>=0?'var(--green)':'var(--red)',fontSize:15}}>{ganPct}% — {formatPeso(Number(d.precioVenta)-Number(d.precioCosto))}</span>

        </div>

  );
