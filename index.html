<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* Variables base (fallback si no hay tema) */
:root{
  --radius:8px;--radius-lg:14px;
  --bg:#fff;--bg2:#f5f5f4;--bg3:#fafaf9;
  --txt:#1c1917;--txt2:#78716c;--txt3:#a8a29e;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.25);
  --green:#3B6D11;--green-bg:#EAF3DE;
  --orange:#854F0B;--orange-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --shadow:0 2px 8px rgba(0,0,0,.08);
}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);}
#root{max-width:900px;margin:0 auto;min-height:100vh;background:var(--bg3);}

/* ── HEADER ── */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.header-left{display:flex;align-items:center;gap:8px;}
.header-title{font-size:16px;font-weight:700;color:var(--txt);}
.header-sub{font-size:11px;color:var(--txt2);}
.header-right{display:flex;align-items:center;gap:6px;}
.btn-dark{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;font-size:16px;cursor:pointer;}
.btn-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt);padding:0 4px;line-height:1;}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:900px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:9px 4px 7px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;color:var(--txt2);}
.nav-btn.activo .nav-label{color:var(--txt);font-weight:700;}

/* ── BOTONES ── */
.btn-pri{background:var(--txt);color:var(--bg);border:none;border-radius:var(--radius);padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-sec{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-size:14px;cursor:pointer;color:var(--txt2);}
.btn-full{width:100%;padding:13px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;border:none;background:var(--txt);color:var(--bg);}
.btn-full:disabled{opacity:.3;cursor:not-allowed;}
.btn-ic{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--txt2);}

/* ── LAYOUT ── */
.app-body{padding:.85rem 1rem 80px;}
.search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--bg);color:var(--txt);font-family:inherit;display:block;}
.search:focus{outline:none;border-color:var(--border2);}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin:.9rem 0 .5rem;}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:10px;}
.ptitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);margin-bottom:8px;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px;}
.card-body{padding:12px 14px;}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;}
.card-name{font-size:15px;font-weight:700;color:var(--txt);}
.card-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.pill{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;white-space:nowrap;}
.pill-green{background:var(--green-bg);color:var(--green);}
.pill-orange{background:var(--orange-bg);color:var(--orange);}

.modal{background:var(--bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:1.25rem;}

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w=img.width, h=img.height;
      if(w>h && w>maxPx){ h=h*maxPx/w; w=maxPx; }
      else if(h>maxPx){ w=w*maxPx/h; h=maxPx; }
      canvas.width=w; canvas.height=h;

});

/* Igual que kiosco: setProperty directo en el root */
function aplicarTema(temaId) {
  const tema = TEMAS[temaId]; if(!tema) return;
  const root = document.documentElement;
  Object.entries(tema.vars).forEach(([k,v])=>{ if(k==="body-bg") document.body.style.background=v; else root.style.setProperty(k,v); });
  localStorage.setItem('polleria-tema', JSON.stringify(temaId));
}
function getTema() { try { return JSON.parse(localStorage.getItem('polleria-tema')||'"claro-clasico"'); } catch { return 'claro-clasico'; } }
/* IIFE igual que kiosco: aplica el tema ANTES de que React renderice */
(()=>{ try { aplicarTema(getTema()); } catch{} })();

/* ─── SELECTOR DE TEMA (UI idéntica al kiosco) ─── */
function SelectorTema({onCerrar}){
  const [temaActual,setTemaActual]=useState(getTema);
  const [modoVista,setModoVista]=useState(()=>TEMAS[getTema()]?.modo||'claro');
  const [guardado,setGuardado]=useState(false);
  const aplicar=id=>{
    setTemaActual(id); aplicarTema(id);
    setGuardado(true); setTimeout(()=>setGuardado(false),2000);
  };
  const temasFiltrados=Object.entries(TEMAS).filter(([,t])=>t.modo===modoVista);
  return(
    <div className="overlay" onClick={onCerrar}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-drag"/>
        <div style={{fontSize:15,fontWeight:700,color:'var(--txt)',marginBottom:12}}>🎨 Paleta de colores</div>
        {/* Tabs oscuro / claro */}
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[['oscuro','🌙 Oscuro'],['claro','☀️ Claro']].map(([m,l])=>(
            <button key={m} style={{flex:1,padding:'8px',fontSize:13,fontWeight:600,borderRadius:'var(--radius)',cursor:'pointer',
              background:modoVista===m?'var(--green)':'var(--bg2)',
              color:modoVista===m?'#fff':'var(--txt2)',
              border:`1px solid ${modoVista===m?'transparent':'var(--border)'}`}}
              onClick={()=>setModoVista(m)}>{l}</button>
          ))}
        </div>
        {/* Grilla 2 columnas con emoji + nombre + swatches */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          {temasFiltrados.map(([id,tema])=>(
            <button key={id} onClick={()=>aplicar(id)} style={{
              padding:'12px 8px',borderRadius:'var(--radius-lg)',cursor:'pointer',textAlign:'center',
              border:`2px solid ${temaActual===id?'var(--green)':'var(--border)'}`,

                  <div key={i} style={{width:13,height:13,borderRadius:'50%',background:c,border:'1px solid rgba(128,128,128,0.25)'}}/>
                ))}
              </div>
              {temaActual===id&&<div style={{fontSize:10,color:'var(--green)',marginTop:5,fontWeight:700}}>✓ Activo</div>}

          ))}
        </div>

        <button onClick={onCerrar} className="btn-full">Cerrar</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   MODAL VENTA RÁPIDA
══════════════════════════════════════ */
function ModalVentaRapida({producto, clientes, uid, onCerrar}){
  const [cant,setCant]=useState('1');
  const [pago,setPago]=useState('efectivo');
  const [clienteId,setClienteId]=useState('');
  const [cargando,setCargando]=useState(false);
  const cs = catStyle(producto.categoria);
  const precio = Number(producto.precioVenta)||0;
  const cantidad = parseFloat(cant)||0;
  const total = precio * cantidad;

  const ajustarCant = delta => {
    const paso = ['kg','litro','litros'].includes(producto.unidad||'') ? 0.5 : 1;
    setCant(v => Math.max(0, (parseFloat(v)||0)+delta*paso).toString());
  };

  const confirmar = async () => {
    if(!cantidad||cantidad<=0) return alert('Ingresá una cantidad válida');
    setCargando(true);
    try {
      const cliente = clientes.find(c=>c.id===clienteId);
      const ts = firebase.firestore.FieldValue.serverTimestamp();
      // Guardar como venta directa en pedidos
      await db.collection(`polleria/${uid}/pedidos`).add({
        clienteNombre: cliente ? cliente.nombre : 'Venta directa',
        clienteId: clienteId||'',
        tipo:'mostrador',
        estado:'entregado',
        pagado: pago !== 'fiado',
        formaPago: pago,
        items:[{
          _id: Date.now(),
          nombre: producto.nombre,
          unidad: producto.unidad||'kg',
          cantidad,
          precio,
          subtotal: total,
        }],
        total,
        fecha: hoy(),
        createdAt: ts,
      });
      // Si es fiado, actualizar saldo del cliente
      if(pago==='fiado' && clienteId){
        const ref = db.collection(`polleria/${uid}/clientes`).doc(clienteId);
        const snap = await ref.get();
        if(snap.exists){
          await ref.update({ saldoFiado: (Number(snap.data().saldoFiado)||0)+total });
        }
      }
      onCerrar(true);
    } catch(e){ alert('Error al guardar: '+e.message); }
    setCargando(false);
  };

  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onCerrar(false)}>
      <div className="modal">
        <div className="modal-drag"/>
        {/* Cabecera producto */}
        <div className="venta-prod-header">
          <div className="venta-prod-foto" style={{background:cs.bg}}>
            {producto.foto
              ? <img src={producto.foto} alt={producto.nombre}/>
              : <span>{cs.emoji}</span>
            }
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:17,color:'var(--txt)'}}>{producto.nombre}</div>
            <div style={{fontSize:13,color:'var(--txt2)'}}>{formatPeso(precio)} / {producto.unidad||'kg'}</div>
            {producto.descripcion && <div style={{fontSize:12,color:'var(--txt3)',marginTop:2}}>{producto.descripcion}</div>}
          </div>
        </div>

        {/* Cantidad */}
        <label className="lbl">Cantidad ({producto.unidad||'kg'})</label>
        <div className="qty-row">
          <button className="qty-btn" onClick={()=>ajustarCant(-1)}>−</button>
          <input
            type="number"
            value={cant}
            onChange={e=>setCant(e.target.value)}
            className="qty-input"
            step={['kg','litro','litros'].includes(producto.unidad||'')?'0.5':'1'}
            min="0"
          />
          <button className="qty-btn" onClick={()=>ajustarCant(1)}>+</button>
        </div>

        {/* Total */}
        <div className="total-grande">{formatPeso(total)}</div>

        {/* Forma de pago */}
        <label className="lbl">Forma de pago</label>
        <div className="venta-metodos">
          {[{k:'efectivo',lbl:'💵 Efectivo'},{k:'transferencia',lbl:'📲 Transf.'},{k:'fiado',lbl:'📒 Fiado'},{k:'tarjeta',lbl:'💳 Tarjeta'}].map(m=>(
            <button key={m.k} onClick={()=>setPago(m.k)} className={`btn-metodo${pago===m.k?' activo':''}`}>{m.lbl}</button>
          ))}
        </div>

        {/* Cliente (opcional, requerido si es fiado) */}
        <label className="lbl">Cliente {pago==='fiado'?'*':'(opcional)'}</label>
        <select value={clienteId} onChange={e=>setClienteId(e.target.value)} className="inp" style={{marginBottom:16}}>
          <option value="">— Sin cliente / Venta directa —</option>
          {clientes.map(c=>(
            <option key={c.id} value={c.id}>
              {c.nombre}{Number(c.saldoFiado)>0?` (fiado: ${formatPeso(c.saldoFiado)})`:''}
            </option>
          ))}
        </select>

        <button
          onClick={confirmar}
          disabled={cargando||!cantidad}
          className="btn-full"
          style={{background:'var(--green)',marginBottom:8}}
        >
          {cargando ? 'Guardando...' : `✓ Confirmar venta — ${formatPeso(total)}`}
        </button>
        <button onClick={()=>onCerrar(false)} className="btn-full" style={{background:'none',border:'1px solid var(--border)',color:'var(--txt2)',padding:10,fontSize:14}}>Cancelar</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   CARRITO PANEL (componente compartido)
══════════════════════════════════════ */
function CarritoPanel({carrito,onCambiarCantidad,onSetCantidad,onEditarPeso,onLimpiar,uid,clientes,onVentaConfirmada}){
  const [pago,setPago]=useState('efectivo');
  const [clienteNombre,setClienteNombre]=useState('');
  const [telefono,setTelefono]=useState('');
  const [datosPago,setDatosPago]=useState('');
  const [cargando,setCargando]=useState(false);
  const total=carrito.reduce((s,i)=>s+(i.prod.precioVenta||0)*i.cantidad,0);
  const esConDatos=pago==='transferencia'||pago==='debito'||pago==='credito';
  const confirmar=async()=>{
    if(!carrito.length)return;
    setCargando(true);
    try{
      const items=carrito.map(i=>({
        _id:Date.now()+Math.random(),
        nombre:i.prod.nombre,unidad:i.prod.unidad||'kg',
        cantidad:i.cantidad,precio:i.prod.precioVenta||0,
        subtotal:(i.prod.precioVenta||0)*i.cantidad,
      }));
      const pedidoData={
        clienteNombre:clienteNombre||'Venta directa',clienteId:'',
        tipo:'mostrador',estado:'entregado',pagado:pago!=='fiado',
        formaPago:pago,items,total,fecha:hoy(),
        telefono:telefono||'',datosTarjeta:datosPago||'',
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      };
      const ref=await db.collection(`polleria/${uid}/pedidos`).add(pedidoData);
      onVentaConfirmada({...pedidoData,id:ref.id,items});
      setClienteNombre('');setTelefono('');setDatosPago('');setPago('efectivo');
    }catch(e){alert('Error: '+e.message);}
    setCargando(false);
  };
  if(!carrito.length) return(
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--txt2)',gap:10,padding:20}}>
      <div style={{fontSize:52}}>🛒</div>
      <div style={{fontSize:15,fontWeight:700}}>Carrito vacío</div>
      <div style={{fontSize:13,textAlign:'center',lineHeight:1.5}}>Tocá un producto del catálogo para agregarlo al carrito</div>
    </div>
  );
  return(
    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden',gap:0}}>
      {/* Lista de items */}
      <div className="carrito-titulo">
        <span>🛒 Carrito <span style={{color:'var(--txt2)',fontWeight:400}}>({carrito.length} prod.)</span></span>
        <button onClick={onLimpiar} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:12,fontWeight:600}}>🗑️ Limpiar</button>
      </div>
      <div style={{flex:1,overflowY:'auto',marginBottom:8}}>
        {carrito.map(item=>{
          const esPeso=esPorPeso(item.prod.unidad);
          return(
            <div key={item.prod.id} className="carrito-item">
              <div style={{flex:1,minWidth:0}}>
                <div className="carrito-item-name">{item.prod.nombre}</div>
                <div className="carrito-item-sub">{formatPeso(item.prod.precioVenta||0)} / {item.prod.unidad||'kg'}</div>
              </div>
              {/* Peso: input editable con botón para abrir modal */}
              {esPeso?(
                <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                  <input type="number" step="0.001" min="0"
                    value={item.cantidad}
                    onChange={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))onSetCantidad(item.prod.id,v);}}
                    style={{width:68,textAlign:'center',padding:'4px 6px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg2)',color:'var(--txt)',fontSize:15,fontWeight:700,outline:'none'}}
                  />
                  <span style={{fontSize:11,color:'var(--txt2)',flexShrink:0}}>{item.prod.unidad||'kg'}</span>
                  <button onClick={()=>onEditarPeso&&onEditarPeso(item.prod)}
                    style={{width:26,height:26,borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg2)',cursor:'pointer',fontSize:13,color:'var(--txt2)',flexShrink:0}}
                    title="Cambiar peso">⚖️</button>
                </div>
              ):(
                /* Unidades: +/- */
                <div className="carrito-qty">
                  <button onClick={()=>onCambiarCantidad(item.prod.id,-1)} className="carrito-qty-btn">−</button>
                  <span className="carrito-qty-val">{item.cantidad}</span>
                  <button onClick={()=>onCambiarCantidad(item.prod.id,1)} className="carrito-qty-btn">+</button>
                </div>
              )}
              <div className="carrito-item-precio">{formatPeso((item.prod.precioVenta||0)*item.cantidad)}</div>
            </div>
          );
        })}
      </div>
      {/* Pago, datos, total y confirmar */}
      <div style={{borderTop:'2px solid var(--border)',paddingTop:10,flexShrink:0}}>
        <label className="lbl" style={{marginTop:0}}>Forma de pago</label>
        <div className="pago-grid">
          {[{k:'efectivo',lbl:'💵 Efectivo'},{k:'transferencia',lbl:'📲 Transfer.'},{k:'debito',lbl:'💳 Débito'},{k:'credito',lbl:'💳 Crédito'},{k:'fiado',lbl:'📒 Fiado'}].map(m=>(
            <button key={m.k} onClick={()=>{setPago(m.k);setDatosPago('');}} className={`btn-metodo${pago===m.k?' activo':''}`} style={{fontSize:11,padding:'7px 4px'}}>{m.lbl}</button>
          ))}
        </div>
        <Campo label="Cliente (opcional)" value={clienteNombre} onChange={setClienteNombre} placeholder="Nombre del cliente..."/>
        {esConDatos&&<>
          <Campo label="📞 Teléfono de contacto" value={telefono} onChange={setTelefono} placeholder="Ej: 381-123-4567" tipo="tel"/>
          <Campo
            label={pago==='transferencia'?'🏦 CBU / Alias':'💳 Titular y últimos 4 dígitos'}
            value={datosPago} onChange={setDatosPago}
            placeholder={pago==='transferencia'?'CBU o alias de transferencia':'Ej: Juan García - 4521'}
          />
        </>}
        <div style={{background:'var(--green-bg)',borderRadius:'var(--radius)',padding:'10px 14px',margin:'10px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:13,color:'var(--green)'}}>TOTAL</span>
          <span style={{fontWeight:700,fontSize:26,color:'var(--green)'}}>{formatPeso(total)}</span>
        </div>
        <button onClick={confirmar} disabled={cargando} className="btn-full" style={{background:'var(--green)'}}>
          {cargando?'⏳ Procesando...':'✅ Confirmar venta'}
        </button>
      </div>
    </div>
  );
}

const esPorPeso=u=>['kg','litro','litros'].includes(u||'kg');

/* ── Modal ingreso de peso para productos por kg/litro ── */
function ModalPeso({prod,cantActual,onAgregar,onCerrar}){
  const [val,setVal]=useState(cantActual>0?String(cantActual):'');
  const num=parseFloat(val)||0;
  const total=num*(prod.precioVenta||0);
  const confirmar=()=>{if(num>0){onAgregar(num);onCerrar();}};
  return(
    <div className="overlay" onClick={onCerrar}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-drag"/>
        <div style={{fontWeight:700,fontSize:16,color:'var(--txt)',marginBottom:2}}>{prod.nombre}</div>
        <div style={{fontSize:13,color:'var(--txt2)',marginBottom:14}}>{formatPeso(prod.precioVenta||0)} / {prod.unidad||'kg'}</div>
        <label className="lbl">Ingresá el peso ({prod.unidad||'kg'})</label>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <input type="number" step="0.001" min="0" autoFocus
            value={val} onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&confirmar()}
            className="inp" style={{flex:1,fontSize:28,textAlign:'center',fontWeight:700,padding:'10px'}}
            placeholder="0.000"/>
          <span style={{fontSize:16,fontWeight:700,color:'var(--txt2)',minWidth:28}}>{prod.unidad||'kg'}</span>
        </div>
        {/* Pesos rápidos */}
        <div style={{display:'flex',gap:5,marginBottom:14,flexWrap:'wrap'}}>
          {[0.25,0.5,1,1.5,2,3,5].map(v=>(
            <button key={v} onClick={()=>setVal(String(v))}
              style={{flex:'1 0 auto',minWidth:40,padding:'7px 4px',borderRadius:'var(--radius)',
                border:`1px solid ${parseFloat(val)===v?'var(--green)':'var(--border)'}`,
                background:parseFloat(val)===v?'var(--green-bg)':'var(--bg2)',
                color:parseFloat(val)===v?'var(--green)':'var(--txt)',
                fontSize:13,fontWeight:700,cursor:'pointer'}}>
              {v}
            </button>
          ))}
        </div>
        {num>0&&(
          <div style={{background:'var(--green-bg)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,color:'var(--green)',fontWeight:600}}>Total</span>
            <span style={{fontSize:22,fontWeight:700,color:'var(--green)'}}>{formatPeso(total)}</span>
          </div>
        )}
        <button onClick={confirmar} disabled={num<=0} className="btn-full"
          style={{background:'var(--green)',opacity:num<=0?0.4:1}}>
          {cantActual>0?'🔄 Actualizar en carrito':'🛒 Agregar al carrito'}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PANTALLA CATÁLOGO / VENDER  (nueva)
══════════════════════════════════════ */
function PantallaCatalogo({uid}){
  const [productos,setProductos]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [buscar,setBuscar]=useState('');
  const [catFiltro,setCatFiltro]=useState('Todos');
  const [carrito,setCarrito]=useState([]);
  const [carritoMovil,setCarritoMovil]=useState(false);
  const [modalPeso,setModalPeso]=useState(null); // producto seleccionado para ingresar peso
  const [comprobante,setComprobante]=useState(null);
  const [toast,setToast]=useState('');

  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/productos`).orderBy('nombre','asc').onSnapshot(s=>setProductos(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=db.collection(`polleria/${uid}/clientes`).orderBy('nombre','asc').onSnapshot(s=>setClientes(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();};
  },[]);

  const mostrarToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2200);};

  // Tocar tarjeta: si es por peso abre modal; si es por unidad agrega directo
  const handleTarjeta=prod=>{
    if(esPorPeso(prod.unidad)){
      const enC=carrito.find(i=>i.prod.id===prod.id);
      setModalPeso({prod,cantActual:enC?enC.cantidad:0});
    } else {
      setCarrito(prev=>{
        const ex=prev.find(i=>i.prod.id===prod.id);
        if(ex) return prev.map(i=>i.prod.id===prod.id?{...i,cantidad:i.cantidad+1}:i);
        return[...prev,{prod,cantidad:1}];
      });
    }
  };

  // Recibe peso desde el modal
  const confirmarPeso=(prodId,peso)=>{
    setCarrito(prev=>{
      const ex=prev.find(i=>i.prod.id===prodId);
      if(ex) return prev.map(i=>i.prod.id===prodId?{...i,cantidad:peso}:i);
      const prod=productos.find(p=>p.id===prodId);
      return[...prev,{prod,cantidad:peso}];
    });
  };

  // Cambia cantidad en carrito (para unidades con +/-)
  const cambiarCantidad=(prodId,delta)=>{
    setCarrito(prev=>prev.map(i=>i.prod.id===prodId?{...i,cantidad:Math.max(0,+(i.cantidad+delta).toFixed(3))}:i).filter(i=>i.cantidad>0));
  };

  // Setea cantidad exacta (para el input de peso en el carrito)
  const setCantidadDirecta=(prodId,val)=>{
    setCarrito(prev=>prev.map(i=>i.prod.id===prodId?{...i,cantidad:+parseFloat(val).toFixed(3)}:i).filter(i=>i.cantidad>0));
  };

  const limpiarCarrito=()=>{if(carrito.length&&confirm('¿Limpiar el carrito?'))setCarrito([]);};

  const onVentaConfirmada=data=>{
    setComprobante(data);
    setCarritoMovil(false);
    mostrarToast('✅ Venta registrada');
  };

  const totalCarrito=carrito.reduce((s,i)=>s+(i.prod.precioVenta||0)*i.cantidad,0);
  const CATS=['Todos',...new Set(productos.map(p=>p.categoria||'Otro'))];
  const filtrados=productos.filter(p=>{
    const okB=p.nombre.toLowerCase().includes(buscar.toLowerCase());
    const okC=catFiltro==='Todos'||(p.categoria||'Otro')===catFiltro;
    return okB&&okC;
  });

  const carritoPanel=<CarritoPanel
    carrito={carrito}
    onCambiarCantidad={cambiarCantidad}
    onSetCantidad={setCantidadDirecta}
    onEditarPeso={prod=>{const enC=carrito.find(i=>i.prod.id===prod.id);setModalPeso({prod,cantActual:enC?enC.cantidad:0});}}
    onLimpiar={limpiarCarrito}
    uid={uid} clientes={clientes}
    onVentaConfirmada={onVentaConfirmada}/>;

  return(
    <div>
      <Header titulo="Catálogo / Vender" subtitulo="Seleccioná productos para vender"/>
      <div className="split-layout">
        {/* IZQUIERDA – catálogo */}
        <div className="split-left">
          <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar producto..." className="search" style={{marginBottom:10}}/>
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:8,scrollbarWidth:'none'}}>
            {CATS.map(c=>(
              <button key={c} onClick={()=>setCatFiltro(c)} className={`chip${catFiltro===c?' activo':''}`} style={{flexShrink:0}}>
                {c==='Todos'?'🐔 Todos':c}
              </button>
            ))}
          </div>
          {filtrados.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>🐔</div>No hay productos.<br/>Agregá productos en <b>Precios</b>.</div>}
          <div className="catalogo-grid">
            {filtrados.map(p=>{
              const cs=catStyle(p.categoria);
              const enC=carrito.find(i=>i.prod.id===p.id);
              const esPeso=esPorPeso(p.unidad);
              return(
                <div key={p.id} className="prod-card" onClick={()=>handleTarjeta(p)}>
                  <div className="prod-card-foto" style={{background:cs.bg}}>
                    {p.foto?<img src={p.foto} alt={p.nombre}/>:<span>{cs.emoji}</span>}
                    {enC&&<div className="prod-badge">{enC.cantidad}{esPeso?p.unidad||'kg':''}</div>}
                  </div>
                  <div className="prod-card-info">
                    <div className="prod-card-nombre">{p.nombre}</div>
                    <div className="prod-card-unidad">por {p.unidad||'kg'}</div>
                    <div className="prod-card-precio">{formatPeso(p.precioVenta||0)}</div>
                    <button className="prod-card-btn" style={{background:enC?'var(--green)':'var(--txt)'}}>
                      {enC?(esPeso?`⚖️ ${enC.cantidad} ${p.unidad||'kg'}`:`🛒 ${enC.cantidad} unid.`):(esPeso?'⚖️ Ingresar peso':'+ Agregar')}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        {/* DERECHA – carrito solo en PC */}
        <div className="split-right">
          {carritoPanel}
        </div>
      </div>

      {/* Botón flotante carrito (solo móvil) */}
      {carrito.length>0&&(
        <button onClick={()=>setCarritoMovil(true)} className="carrito-fab">
          🛒 {carrito.length} prod. · {formatPeso(totalCarrito)}
        </button>
      )}

      {/* Carrito como bottom sheet en móvil */}
      {carritoMovil&&(
        <div className="overlay" onClick={()=>setCarritoMovil(false)}>
          <div className="modal" style={{height:'88vh',display:'flex',flexDirection:'column',padding:'1rem'}} onClick={e=>e.stopPropagation()}>
            <div className="modal-drag"/>
            {carritoPanel}
          </div>
        </div>
      )}

      {/* Modal de ingreso de peso */}
      {modalPeso&&(
        <ModalPeso
          prod={modalPeso.prod}
          cantActual={modalPeso.cantActual}
          onAgregar={peso=>confirmarPeso(modalPeso.prod.id,peso)}
          onCerrar={()=>setModalPeso(null)}
        />
      )}

      {comprobante&&<Comprobante data={comprobante} onCerrar={()=>setComprobante(null)}/>}
      <Toast msg={toast}/>
    </div>
  );
}

/* ══════════════════════════════════════
   PRECIOS  (con upload de foto)
══════════════════════════════════════ */
function PantallaPrecios({uid}){
  const [productos,setProductos]=useState([]);const [form,setForm]=useState(null);const [buscar,setBuscar]=useState('');
  const CATS=['🐔 Pollo','🥩 Carne','🥦 Verduras','🍋 Frutas','🥚 Huevos y lácteos','🧀 Fiambres','🛒 Almacén','Otro'];
  const col=db.collection(`polleria/${uid}/productos`);
  useEffect(()=>col.orderBy('nombre','asc').onSnapshot(snap=>setProductos(snap.docs.map(d=>({id:d.id,...d.data()})))),[]);
  const guardar=async d=>{const{id,...r}=d;if(id)await col.doc(id).update(r);else await col.add(r);setForm(null);};
  const eliminar=async id=>{if(!confirm('¿Eliminar producto?'))return;await col.doc(id).delete();};
  if(form!==null) return <FormProducto inicial={form} onGuardar={guardar} onCancelar={()=>setForm(null)} categorias={CATS}/>;
  const filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(buscar.toLowerCase())||(p.categoria||'').toLowerCase().includes(buscar.toLowerCase()));
  const porCat={};filtrados.forEach(p=>{const c=p.categoria||'Otro';if(!porCat[c])porCat[c]=[];porCat[c].push(p);});
  return(
    <div>
      <Header titulo="Lista de Precios" onAdd={()=>setForm({})} onLogout={()=>auth.signOut()}/>
      <div className="app-body">
        <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar..." className="search" style={{marginBottom:12}}/>
        {productos.length===0 && <div className="empty"><div style={{fontSize:48,marginBottom:12}}>🐔</div>No hay productos<br/><button onClick={()=>setForm({})} className="btn-pri" style={{marginTop:16}}>+ Agregar</button></div>}
        {Object.entries(porCat).map(([cat,prods])=>(
          <div key={cat} style={{marginBottom:16}}>
            <div className="sec-title">{cat} <span style={{fontWeight:400}}>({prods.length})</span></div>
            {prods.map(p=>{
              const m=p.precioCosto>0?Math.round(((Number(p.precioVenta)-Number(p.precioCosto))/Number(p.precioCosto))*100):null;
              const cs=catStyle(p.categoria);
              return(
                <div key={p.id} className="card">
                  <div className="card-body">
                    <div className="card-head">
                      {/* Miniatura */}
                      <div style={{width:48,height:48,borderRadius:'var(--radius)',background:cs.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,overflow:'hidden',flexShrink:0,marginRight:10}}>
                        {p.foto ? <img src={p.foto} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/> : cs.emoji}
                      </div>
                      <div style={{flex:1}}>
                        <div className="card-name">{p.nombre}</div>
                        {p.descripcion && <div className="card-sub">{p.descripcion}</div>}
                        <div className="card-sub">por {p.unidad||'kg'}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>
                        {p.precioCosto>0 && <div style={{fontSize:11,color:'var(--txt2)',textDecoration:'line-through'}}>{formatPeso(p.precioCosto)}</div>}
                        <div style={{fontWeight:700,fontSize:20,color:'var(--txt)'}}>{formatPeso(p.precioVenta||0)}</div>
                        {m!==null && <span className={m>=30?'pill pill-green':m>=10?'pill pill-orange':'pill pill-red'}>{m}%</span>}
                      </div>
                    </div>
                    <div className="card-actions">
                      <button onClick={()=>setForm(p)} className="btn-ic">✏️ Editar</button>
                      <button onClick={()=>eliminar(p.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function FormProducto({inicial,onGuardar,onCancelar,categorias}){
  const UNIDADES=['kg','g','unidad','docena','litro','atado','bandeja'];
  const [d,setD]=useState({nombre:'',categoria:'🐔 Pollo',descripcion:'',precioCosto:'',precioVenta:'',unidad:'kg',foto:'',...inicial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const setCategoria=cat=>{
    setD(p=>{
      // Huevos y lácteos → unidad; todo lo demás → kg (si no estaba ya personalizado)
      const nuevaUnidad=cat==='🥚 Huevos y lácteos'?'unidad':'kg';
      return{...p,categoria:cat,unidad:nuevaUnidad};
    });
  };
  const m=d.precioCosto>0?Math.round(((Number(d.precioVenta)-Number(d.precioCosto))/Number(d.precioCosto))*100):0;
  const cs=catStyle(d.categoria);

  const handleFoto=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    const base64=await comprimirImagen(file,300,0.75);
    set('foto',base64);
  };

  const guardar=()=>{
    if(!d.nombre.trim())return alert('El nombre es obligatorio');
    onGuardar({...d,precioCosto:Number(d.precioCosto)||0,precioVenta:Number(d.precioVenta)||0});
  };

  return(
    <div>
      <Header titulo={d.id?'Editar Producto':'Nuevo Producto'} onBack={onCancelar}/>
      <div className="app-body">
        {/* Foto ilustrativa */}
        <label className="lbl">Foto del producto (opcional)</label>
        <div className="foto-upload-area">
          {d.foto
            ? <img src={d.foto} alt="foto"/>
            : <>
                <span>{cs.emoji}</span>
                <p>Tocá para subir una foto<br/>(se comprime automáticamente)</p>
              </>
          }
          <input type="file" accept="image/*" onChange={handleFoto}/>
        </div>
        {d.foto && <button onClick={()=>set('foto','')} className="btn-ic" style={{marginTop:6,fontSize:12,color:'var(--red)'}}>🗑️ Quitar foto</button>}

        <Campo label="Nombre *" value={d.nombre} onChange={v=>set('nombre',v)} placeholder="Ej: Pollo entero"/>

        <label className="lbl">Categoría</label>
        <div className="chip-group">
          {categorias.map(c=><button key={c} onClick={()=>setCategoria(c)} className={`chip${d.categoria===c?' activo':''}`}>{c}</button>)}
        </div>

        <label className="lbl">Unidad de venta</label>
        <div className="chip-group">
          {UNIDADES.map(u=><button key={u} onClick={()=>set('unidad',u)} className={`chip${d.unidad===u?' activo':''}`}>{u}</button>)}
        </div>

        <Campo label="Descripción (opcional)" value={d.descripcion} onChange={v=>set('descripcion',v)} placeholder="Ej: fresco, de granja" rows={2}/>
        <Campo label="💸 Precio de costo ($)" value={d.precioCosto} onChange={v=>set('precioCosto',v)} tipo="number" placeholder="0"/>
        <Campo label="💰 Precio de venta ($)" value={d.precioVenta} onChange={v=>set('precioVenta',v)} tipo="number" placeholder="0"/>

        {Number(d.precioCosto)>0&&Number(d.precioVenta)>0&&(
          <div style={{background:m>=0?'var(--green-bg)':'var(--red-bg)',border:`1px solid ${m>=0?'var(--green)':'var(--red)'}`,borderRadius:'var(--radius)',padding:'10px 14px',marginTop:4,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:13,color:'var(--txt2)'}}>Ganancia:</span>
            <span style={{fontWeight:700,color:m>=0?'var(--green)':'var(--red)',fontSize:15}}>{m}% — {formatPeso(Number(d.precioVenta)-Number(d.precioCosto))}</span>
          </div>
        )}
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Agregar'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function CalculadoraCajon({uid}){
  const [cajones,setCajones]=useState(1);const [ppc,setPpc]=useState(9);const [kg,setKg]=useState(2.2);const [modo,setModo]=useState('completo');
  const [precioCajon,setPrecioCajon]=useState('');const [porcGanancia,setPorcGanancia]=useState(30);
  const [guardando,setGuardando]=useState(false);const [toastMsg,setToastMsg]=useState('');
  const tot=cajones*ppc;const totKg=tot*kg;
  const precioTotalPagado=Number(precioCajon)*cajones||0;
  const costoPorKg=totKg>0&&precioTotalPagado>0?precioTotalPagado/totKg:0;
  const precioVentaKg=costoPorKg>0?costoPorKg*(1+porcGanancia/100):0;
  const gananciaTotal=(precioVentaKg-costoPorKg)*totKg;

  // pesoU = peso estimado por unidad en kg (para calcular precio por pieza)
  // solo_display = no se agrega al inventario, es informativo
  const MODOS={
    completo:{label:'🐔 Entero',piezas:[
      {n:'Pollo entero',c:tot,u:'unidad',pesoU:kg,nota:''},
      {n:'Peso total',c:+totKg.toFixed(1),u:'kg',solo_display:true},
    ]},
    piezas:{label:'🍗 Trozado',piezas:[
      {n:'Pechugas',      c:tot,    u:'unidad',pesoU:0.55,nota:'(1 c/u)'},
      {n:'Pata-muslo',    c:tot*2,  u:'unidad',pesoU:0.40,nota:'(2 c/u)'},
      {n:'Alas',          c:tot*2,  u:'unidad',pesoU:0.20,nota:'(2 c/u)'},
      {n:'Muslos',        c:tot*2,  u:'unidad',pesoU:0.20,nota:'(2 c/u)'},
      {n:'Carcasas',      c:tot,    u:'unidad',pesoU:0.30,nota:''},
    ]},
    filet:{label:'🥩 Filet',piezas:[
      {n:'Filet pechuga', c:+(tot*0.55).toFixed(1),u:'kg',   pesoU:null,nota:'(≈550g c/u)'},
      {n:'Milanesas',     c:tot*4,  u:'unidad',pesoU:0.15,nota:'(≈4 c/u)'},
      {n:'Pata-muslo',    c:tot*2,  u:'unidad',pesoU:0.40,nota:''},
      {n:'Carcasas caldo',c:tot,    u:'unidad',pesoU:0.30,nota:''},
    ]},
  };
  const M=MODOS[modo];

  // Calcula precio de venta estimado por pieza
  const precioPieza=(p)=>{
    if(!precioVentaKg) return null;
    if(p.u==='kg') return precioVentaKg;
    return precioVentaKg*(p.pesoU||1);
  };
  const costoPieza=(p)=>{
    if(!costoPorKg) return null;
    if(p.u==='kg') return costoPorKg;
    return costoPorKg*(p.pesoU||1);
  };

  const mostrarToast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(''),2500);};

  const agregarAlStock=async()=>{
    if(!precioCajon||Number(precioCajon)<=0)return alert('Ingresá el precio pagado por cajón');
    setGuardando(true);
    try{
      const stockCol=db.collection(`polleria/${uid}/stock`);
      const prodCol=db.collection(`polleria/${uid}/productos`);
      const piezasVendibles=M.piezas.filter(p=>!p.solo_display);
      for(const p of piezasVendibles){
        const docId='pollo-'+p.n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s/]+/g,'-');
        // STOCK: guarda la cantidad en sus unidades originales (piezas o kg)
        const pVentaPieza=+(precioPieza(p)||0).toFixed(2);
        const pCostoPieza=+(costoPieza(p)||0).toFixed(2);
        const stockRef=stockCol.doc(docId);
        const snap=await stockRef.get();
        const cantActual=snap.exists?(Number(snap.data().cantidad)||0):0;
        await stockRef.set({
          nombre:p.n,categoria:'Pollo',tipo:'cajon',
          cantidad:+(cantActual+Number(p.c)).toFixed(2),
          unidad:p.u,precioCosto:pCostoPieza,precioVenta:pVentaPieza,
          porcGanancia:Number(porcGanancia),stockMinimo:0,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        });
        // CATÁLOGO: SIEMPRE por kg con precio por kg
        // En pollería todo se pesa en la balanza antes de vender
        await prodCol.doc(docId).set({
          nombre:p.n,
          categoria:'🐔 Pollo',
          unidad:'kg',                          // ← siempre kg
          precioCosto:+costoPorKg.toFixed(2),   // ← precio por kg
          precioVenta:+precioVentaKg.toFixed(2),// ← precio por kg
          updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
        },{merge:true});
      }
      mostrarToast(`✅ ${piezasVendibles.length} productos en inventario y catálogo`);
    }catch(e){alert('Error al guardar: '+e.message);}
    setGuardando(false);
  };

  return(
    <div>
      <div className="panel">
        <div className="ptitle">🧮 Calculadora de Cajón</div>
        <div className="calc-row-3">
          {[{lbl:'Cajones',v:cajones,set:v=>setCajones(Math.max(1,v))},{lbl:'Pollos/cajón',v:ppc,set:v=>setPpc(Math.max(1,v))},{lbl:'Kg prom.',v:kg,set:v=>setKg(Math.max(0.5,v)),step:0.1}].map(f=>(
            <div key={f.lbl} style={{flex:1}}>
              <label className="lbl" style={{marginTop:0}}>{f.lbl}</label>
              <input type="number" step={f.step||1} value={f.v} onChange={e=>f.set(Number(e.target.value))} className="inp" style={{textAlign:'center',fontWeight:700,fontSize:18,marginTop:4}}/>
            </div>
          ))}
        </div>
        <div className="suma-band">
          <span style={{fontSize:13,color:'var(--txt2)'}}>Total pollos: <b style={{color:'var(--txt)'}}>{tot}</b></span>
          <span style={{fontSize:13,color:'var(--txt2)'}}>Total kg: <b style={{color:'var(--txt)'}}>{totKg.toFixed(1)}</b></span>
        </div>
        <label className="lbl">Tipo de corte</label>
        <div className="chip-group" style={{marginBottom:12}}>
          {Object.entries(MODOS).map(([k,v])=><button key={k} onClick={()=>setModo(k)} className={`chip${modo===k?' activo':''}`}>{v.label}</button>)}
        </div>
        {/* Detalle de piezas con precio estimado por pieza */}
        <div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:12}}>
          {M.piezas.map((p,i)=>{
            const pv=precioPieza(p);
            return(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <span style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>{p.n}</span>
                  {p.nota&&<span style={{fontSize:11,color:'var(--txt2)',marginLeft:6}}>{p.nota}</span>}
                  {!p.solo_display&&pv&&(
                    <div style={{fontSize:11,color:'var(--blue)',marginTop:2}}>
                      💲 {formatPeso(pv)} / {p.u}
                    </div>
                  )}
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,fontSize:18,color:p.solo_display?'var(--txt2)':'var(--green)'}}>
                    {p.c} <span style={{fontSize:11,fontWeight:400,color:'var(--txt2)'}}>{p.u}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="panel">
        <div className="ptitle">💰 Precio y Ganancia</div>
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>Precio pagado por cajón ($)</label>
            <input type="number" value={precioCajon} onChange={e=>setPrecioCajon(e.target.value)} className="inp" placeholder="0" style={{fontWeight:700,fontSize:18}}/>
          </div>
          <div style={{flex:1}}>
            <label className="lbl" style={{marginTop:0}}>% Ganancia</label>
            <input type="number" value={porcGanancia} onChange={e=>setPorcGanancia(Number(e.target.value))} className="inp" style={{fontWeight:700,fontSize:18}} min={0}/>
          </div>
        </div>
        {costoPorKg>0&&(
          <div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:12,marginBottom:12}}>
            {[
              {lbl:'💸 Total pagado',val:formatPeso(precioTotalPagado),c:'var(--red)'},
              {lbl:'📦 Costo por kg',val:formatPeso(costoPorKg),c:'var(--txt)'},
              {lbl:'🏷️ Precio de venta / kg',val:formatPeso(precioVentaKg),c:'var(--blue)'},
              {lbl:`✨ Ganancia (${porcGanancia}%)`,val:formatPeso(gananciaTotal),c:'var(--green)'},
            ].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:r.c}}>{r.val}</span>
              </div>
            ))}
          </div>
        )}
        <button onClick={agregarAlStock} disabled={guardando||!precioCajon||Number(precioCajon)<=0} className="btn-full"
          style={{background:'var(--green)',opacity:(!precioCajon||Number(precioCajon)<=0)?0.4:1}}>
          {guardando?'⏳ Guardando...':'✅ Agregar al Inventario y Catálogo'}
        </button>
        {/* Botón para corregir productos existentes que quedaron en 'unidad' */}
        <button onClick={async()=>{
          if(!confirm('¿Actualizar todos los productos de Pollo del catálogo a "por kg"?\nEsto corrige los productos que quedaron en "por unidad".'))return;
          try{
            const snap=await db.collection(`polleria/${uid}/productos`).where('categoria','==','🐔 Pollo').get();
            const batch=db.batch();
            snap.docs.forEach(d=>batch.update(d.ref,{unidad:'kg'}));
            await batch.commit();
            mostrarToast(`✅ ${snap.size} productos actualizados a kg`);
          }catch(e){alert('Error: '+e.message);}
        }} className="btn-full" style={{background:'var(--orange)',marginTop:6,fontSize:13}}>
          🔧 Corregir productos existentes → kg
        </button>
      </div>
      <Toast msg={toastMsg}/>
    </div>
  );
}

function PantallaStock({uid}){
  const [items,setItems]=useState([]);const [form,setForm]=useState(null);const [verduForm,setVerduForm]=useState(null);
  const [buscar,setBuscar]=useState('');const [sec,setSec]=useState('stock');
  const col=db.collection(`polleria/${uid}/stock`);
  useEffect(()=>col.orderBy('nombre','asc').onSnapshot(snap=>setItems(snap.docs.map(d=>({id:d.id,...d.data()})))),[]);
  const guardar=async d=>{const{id,...r}=d;if(id)await col.doc(id).update(r);else await col.add(r);setForm(null);};
  const guardarVerdu=async d=>{const{id,...r}=d;if(id)await col.doc(id).update(r);else await col.add({...r,tipo:'verduleria',categoria:'Verdulería'});setVerduForm(null);};
  const eliminar=async id=>{if(!confirm('¿Eliminar?'))return;await col.doc(id).delete();};
  const ajustar=async(id,delta)=>{const i=items.find(x=>x.id===id);if(!i)return;await col.doc(id).update({cantidad:Math.max(0,(Number(i.cantidad)||0)+delta)});};
  if(form!==null) return <FormStock inicial={form} onGuardar={guardar} onCancelar={()=>setForm(null)}/>;
  if(verduForm!==null) return <FormVerduleria inicial={verduForm} onGuardar={guardarVerdu} onCancelar={()=>setVerduForm(null)}/>;
  const bajos=items.filter(i=>Number(i.cantidad)<=Number(i.stockMinimo||0));
  const filtrados=items.filter(i=>i.nombre.toLowerCase().includes(buscar.toLowerCase()));
  const CAT_ICONS={'Pollo':'🐔','Congelados':'❄️','Verdulería':'🥦','General':'📦'};
  const porCat={};filtrados.forEach(i=>{const cat=i.categoria||'General';if(!porCat[cat])porCat[cat]=[];porCat[cat].push(i);});
  const headerAdd=sec==='stock'?()=>setForm({}):sec==='verduleria'?()=>setVerduForm({}):null;
  return(
    <div>
      <Header titulo="Stock / Inventario" onAdd={headerAdd}/>
      <div className="app-body">
        <div className="tab-bar" style={{overflowX:'auto'}}>
          {[{k:'stock',lbl:'📦 Inventario'},{k:'cajon',lbl:'🐔 Cajones'},{k:'congelados',lbl:'❄️ Congelados'},{k:'verduleria',lbl:'🥦 Verdulería'}].map(s=>(
            <button key={s.k} onClick={()=>setSec(s.k)} className={`tab-btn${sec===s.k?' activo':''}`} style={{flexShrink:0,whiteSpace:'nowrap'}}>{s.lbl}</button>
          ))}
        </div>
        {sec==='stock'&&<>
          {bajos.length>0&&<div style={{background:'var(--orange-bg)',border:'1px solid var(--orange)',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:10}}><b style={{color:'var(--orange)',fontSize:13}}>⚠️ Stock bajo: </b><span style={{fontSize:13,color:'var(--txt2)'}}>{bajos.map(i=>i.nombre).join(', ')}</span></div>}
          <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar..." className="search" style={{marginBottom:12}}/>
          {filtrados.length===0&&items.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>📦</div>No hay stock<br/><button onClick={()=>setForm({})} className="btn-pri" style={{marginTop:16}}>+ Agregar</button></div>}
          {Object.entries(porCat).map(([cat,catItems])=>(
            <div key={cat}>
              <div className="sec-title">{CAT_ICONS[cat]||'📦'} {cat} ({catItems.length})</div>
              {catItems.map(item=>{
                const bajo=Number(item.cantidad)<=Number(item.stockMinimo||0);
                const ganPct=item.precioCosto>0&&item.precioVenta>0?Math.round(((item.precioVenta-item.precioCosto)/item.precioCosto)*100):null;
                return(
                  <div key={item.id} className="card" style={{borderColor:bajo?'var(--orange)':'var(--border)'}}>
                    <div className="card-body">
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <div className="card-name">{item.nombre}</div>
                          {item.precioCosto>0&&<div className="card-sub">Costo: {formatPeso(item.precioCosto)}/{item.unidad} · Venta: {formatPeso(item.precioVenta)}/{item.unidad}</div>}
                          {item.stockMinimo>0&&<div className="card-sub">Mínimo: {item.stockMinimo} {item.unidad}</div>}
                          {ganPct!==null&&<span className={ganPct>=30?'pill pill-green':ganPct>=10?'pill pill-orange':'pill pill-red'} style={{marginTop:4,display:'inline-block'}}>Ganancia: {ganPct}%</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <button onClick={()=>ajustar(item.id,-1)} style={{width:32,height:32,borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg)',cursor:'pointer',fontSize:18,color:'var(--txt)'}}>−</button>
                          <div style={{textAlign:'center',minWidth:56}}><div style={{fontWeight:700,fontSize:20,color:'var(--txt)'}}>{item.cantidad||0}</div><div style={{fontSize:10,color:'var(--txt2)'}}>{item.unidad}</div></div>
                          <button onClick={()=>ajustar(item.id,1)} style={{width:32,height:32,borderRadius:'var(--radius)',border:'none',background:'var(--txt)',color:'var(--bg)',cursor:'pointer',fontSize:18}}>+</button>
                        </div>
                      </div>
                      <div className="card-actions">
                        <button onClick={()=>item.tipo==='verduleria'?setVerduForm(item):setForm(item)} className="btn-ic">✏️ Editar</button>
                        <button onClick={()=>eliminar(item.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </>}
        {sec==='cajon'&&<CalculadoraCajon uid={uid}/>}
        {sec==='congelados'&&<CalculadoraCongelados uid={uid}/>}
        {sec==='verduleria'&&<SeccionVerduleria items={items.filter(i=>i.tipo==='verduleria')} onAgregar={()=>setVerduForm({})} onEditar={item=>setVerduForm(item)} onEliminar={eliminar} onAjustar={ajustar}/>}
      </div>
    </div>
  );
}

function FormStock({inicial,onGuardar,onCancelar}){
  const UNIDADES=['kg','g','unidades','litros','atados','bandejas','docenas'];
  const [d,setD]=useState({nombre:'',cantidad:0,unidad:'kg',stockMinimo:0,...inicial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const guardar=()=>{if(!d.nombre.trim())return alert('El nombre es obligatorio');onGuardar({...d,cantidad:Number(d.cantidad)||0,stockMinimo:Number(d.stockMinimo)||0});};

    <div>
      <Header titulo={d.id?'Editar Item':'Nuevo Item'} onBack={onCancelar}/>

        <label className="lbl">Unidad</label>

          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

const ESTADOS={pendiente:{label:'Pendiente',pillC:'pill pill-orange'},preparando:{label:'Preparando',pillC:'pill pill-blue'},listo:{label:'Listo ✓',pillC:'pill pill-green'},entregado:{label:'Entregado',pillC:'pill pill-gray'},cancelado:{label:'Cancelado',pillC:'pill pill-red'}};

function TarjetaPedido({pedido,onEditar,onEstado,onEliminar}){
  const [abierto,setAbierto]=useState(false);
  const est=ESTADOS[pedido.estado]||ESTADOS.pendiente;
  return(
    <div className="card">
      <div className="card-body" onClick={()=>setAbierto(!abierto)} style={{cursor:'pointer'}}>
        <div className="card-head">
          <div style={{flex:1}}>
            <div className="card-name">{pedido.clienteNombre||'Cliente s/n'}</div>
            <div className="card-sub">{(pedido.items||[]).map(i=>`${i.cantidad} ${i.unidad} de ${i.nombre}`).join(', ')||'—'}</div>
            <div className="card-sub" style={{marginTop:4}}>
              📅 {formatFecha(pedido.fecha)}{pedido.horaEntrega?` · ⏰ ${pedido.horaEntrega}`:''}{pedido.tipo==='delivery'?' · 🚴':''}{pedido.pagado?' · ✅':' · 💳'}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
            <span className={est.pillC}>{est.label}</span>
            <div style={{fontWeight:700,fontSize:16,color:'var(--txt)',marginTop:4}}>{formatPeso(pedido.total)}</div>
          </div>
        </div>
      </div>
      {abierto&&<div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)'}}>
        {pedido.notas&&<p style={{fontSize:13,color:'var(--txt2)',margin:'10px 0 4px',fontStyle:'italic'}}>"{pedido.notas}"</p>}
        {pedido.tipo==='delivery'&&pedido.direccion&&<p style={{fontSize:13,marginTop:6,color:'var(--txt)'}}>📍 {pedido.direccion}</p>}
        <div className="card-actions">
          <button onClick={onEditar} className="btn-ic">✏️</button>
          {pedido.estado==='pendiente'&&<button onClick={()=>onEstado(pedido.id,'preparando')} className="btn-pri" style={{fontSize:13,padding:'7px 12px',background:'var(--blue)'}}>👨‍🍳 Preparando</button>}
          {pedido.estado==='preparando'&&<button onClick={()=>onEstado(pedido.id,'listo')} className="btn-pri" style={{fontSize:13,padding:'7px 12px'}}>✓ Listo</button>}
          {pedido.estado==='listo'&&<button onClick={()=>onEstado(pedido.id,'entregado')} className="btn-ic" style={{fontSize:13}}>📦 Entregado</button>}
          {(pedido.estado==='pendiente'||pedido.estado==='preparando')&&<button onClick={()=>onEstado(pedido.id,'cancelado')} className="btn-ic" style={{fontSize:13,color:'var(--red)'}}>✕ Cancelar</button>}
          <button onClick={()=>onEliminar(pedido.id)} className="btn-ic" style={{marginLeft:'auto',color:'var(--red)'}}>🗑️</button>
        </div>
      </div>}
    </div>
  );
}

function PantallaPedidos({uid}){
  const [pedidos,setPedidos]=useState([]);const [clientes,setClientes]=useState([]);const [productos,setProductos]=useState([]);const [form,setForm]=useState(null);const [filtro,setFiltro]=useState('hoy');
  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/pedidos`).orderBy('createdAt','desc').onSnapshot(s=>setPedidos(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=db.collection(`polleria/${uid}/clientes`).orderBy('nombre','asc').onSnapshot(s=>setClientes(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=db.collection(`polleria/${uid}/productos`).orderBy('nombre','asc').onSnapshot(s=>setProductos(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();u3();};
  },[]);
  const guardar=async d=>{const{id,...r}=d;const ts=firebase.firestore.FieldValue.serverTimestamp();if(id)await db.collection(`polleria/${uid}/pedidos`).doc(id).update({...r,updatedAt:ts});else await db.collection(`polleria/${uid}/pedidos`).add({...r,createdAt:ts,fecha:hoy(),estado:'pendiente'});setForm(null);};
  const cambiarEstado=async(id,estado)=>await db.collection(`polleria/${uid}/pedidos`).doc(id).update({estado,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  const eliminar=async id=>{if(!confirm('¿Eliminar pedido?'))return;await db.collection(`polleria/${uid}/pedidos`).doc(id).delete();};
  if(form!==null) return <FormPedido inicial={form} clientes={clientes} productos={productos} onGuardar={guardar} onCancelar={()=>setForm(null)}/>;
  const hoyF=hoy();
  const mostrar=filtro==='hoy'?pedidos.filter(p=>p.fecha===hoyF):filtro==='pendientes'?pedidos.filter(p=>p.estado==='pendiente'||p.estado==='preparando'):pedidos;
  const totalHoy=pedidos.filter(p=>p.fecha===hoyF&&p.pagado&&p.estado!=='cancelado').reduce((s,p)=>s+(p.total||0),0);
  return(
    <div>
      <Header titulo="Pedidos" onAdd={()=>setForm({})} onLogout={()=>auth.signOut()} subtitulo="Gestión Pollería"/>
      <div className="app-body">
        <div className="suma-band" style={{marginBottom:12}}>
          <div><div style={{fontSize:11,color:'var(--txt2)'}}>Pedidos hoy</div><div style={{fontWeight:700,fontSize:20,color:'var(--txt)'}}>{pedidos.filter(p=>p.fecha===hoyF).length}</div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:11,color:'var(--txt2)'}}>Cobrado hoy</div><div style={{fontWeight:700,fontSize:20,color:'var(--green)'}}>{formatPeso(totalHoy)}</div></div>
        </div>
        <div className="tab-bar">
          {[{k:'hoy',lbl:'Hoy'},{k:'pendientes',lbl:'En proceso'},{k:'todos',lbl:'Todos'}].map(f=>(
            <button key={f.k} onClick={()=>setFiltro(f.k)} className={`tab-btn${filtro===f.k?' activo':''}`}>{f.lbl}</button>
          ))}
        </div>
        {mostrar.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>🛒</div>No hay pedidos<br/><button onClick={()=>setForm({})} className="btn-pri" style={{marginTop:16}}>+ Nuevo pedido</button></div>}
        {mostrar.map(p=><TarjetaPedido key={p.id} pedido={p} onEditar={()=>setForm(p)} onEstado={cambiarEstado} onEliminar={eliminar}/>)}
      </div>
    </div>
  );
}

function FormPedido({inicial,clientes,productos,onGuardar,onCancelar}){
  const [d,setD]=useState({clienteNombre:'',clienteId:'',tipo:'mostrador',direccion:'',horaEntrega:'',notas:'',pagado:false,formaPago:'efectivo',items:[],total:0,...inicial});
  const [prodId,setProdId]=useState('');const [cant,setCant]=useState('');
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const agregarItem=()=>{
    if(!prodId||!cant) return alert('Elegí un producto y cantidad');
    const prod=productos.find(p=>p.id===prodId);if(!prod)return;
    const item={_id:Date.now(),nombre:prod.nombre,unidad:prod.unidad||'kg',cantidad:Number(cant),precio:prod.precioVenta||0,subtotal:(prod.precioVenta||0)*Number(cant)};
    const items=[...d.items,item];
    setD(p=>({...p,items,total:items.reduce((s,i)=>s+i.subtotal,0)}));
    setProdId('');setCant('');
  };
  const quitarItem=id=>{const items=d.items.filter(i=>i._id!==id);setD(p=>({...p,items,total:items.reduce((s,i)=>s+i.subtotal,0)}));};
  const selCliente=id=>{const c=clientes.find(c=>c.id===id);if(c)setD(p=>({...p,clienteId:id,clienteNombre:c.nombre,direccion:c.direccion||p.direccion}));else setD(p=>({...p,clienteId:'',clienteNombre:''}));};
  const guardar=()=>{if(!d.clienteNombre.trim())return alert('Ingresá el nombre del cliente');onGuardar(d);};
  return(
    <div>
      <Header titulo={d.id?'Editar Pedido':'Nuevo Pedido'} onBack={onCancelar}/>
      <div className="app-body">
        <label className="lbl">Cliente</label>
        <select value={d.clienteId} onChange={e=>selCliente(e.target.value)} className="inp" style={{marginBottom:6}}>
          <option value="">— Elegí un cliente o escribí abajo —</option>
          {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
        </select>
        <Campo label="O escribí el nombre" value={d.clienteNombre} onChange={v=>set('clienteNombre',v)} placeholder="Nombre del cliente *"/>
        <label className="lbl">Tipo</label>
        <div className="chip-group">
          {[{k:'mostrador',lbl:'🏪 Mostrador'},{k:'delivery',lbl:'🚴 Delivery'}].map(t=><button key={t.k} onClick={()=>set('tipo',t.k)} className={`chip${d.tipo===t.k?' activo':''}`}>{t.lbl}</button>)}
        </div>
        {d.tipo==='delivery'&&<Campo label="Dirección" value={d.direccion} onChange={v=>set('direccion',v)} placeholder="Calle y número"/>}
        <Campo label="Hora de entrega" value={d.horaEntrega} onChange={v=>set('horaEntrega',v)} tipo="time"/>
        <div className="panel" style={{marginTop:12}}>
          <div className="ptitle">Agregar producto</div>
          <select value={prodId} onChange={e=>setProdId(e.target.value)} className="inp">
            <option value="">— Elegí —</option>
            {productos.map(p=><option key={p.id} value={p.id}>{p.nombre} — {formatPeso(p.precioVenta||0)}/{p.unidad||'kg'}</option>)}
          </select>
          <Campo label="Cantidad" value={cant} onChange={setCant} tipo="number" placeholder="0"/>
          <button onClick={agregarItem} className="btn-full" style={{marginTop:8}}>+ Agregar</button>
        </div>
        {d.items.length>0&&<>
          <div className="sec-title">Productos del pedido</div>
          {d.items.map(i=>(
            <div key={i._id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--bg)',borderRadius:'var(--radius)',marginBottom:6,border:'1px solid var(--border)'}}>
              <div><div style={{fontWeight:600,fontSize:14,color:'var(--txt)'}}>{i.nombre}</div><div style={{fontSize:12,color:'var(--txt2)'}}>{i.cantidad} {i.unidad} · {formatPeso(i.subtotal)}</div></div>
              <button onClick={()=>quitarItem(i._id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'var(--red)'}}>✕</button>
            </div>
          ))}
          <div className="suma-band"><span style={{fontWeight:700}}>Total</span><span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(d.total)}</span></div>
        </>}
        <label className="lbl">Forma de pago</label>
        <div className="chip-group">
          {[{k:'efectivo',lbl:'💵 Efectivo'},{k:'transferencia',lbl:'📲 Transferencia'},{k:'fiado',lbl:'📒 Fiado'},{k:'tarjeta',lbl:'💳 Tarjeta'}].map(fp=><button key={fp.k} onClick={()=>set('formaPago',fp.k)} className={`chip${d.formaPago===fp.k?' activo':''}`}>{fp.lbl}</button>)}
        </div>
        <label className="lbl" style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={d.pagado} onChange={e=>set('pagado',e.target.checked)} style={{width:18,height:18}}/> ✅ Ya pagó
        </label>
        <Campo label="Notas (opcional)" value={d.notas} onChange={v=>set('notas',v)} placeholder="Ej: sin menudos, al horno..." rows={2}/>
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Crear pedido'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function PantallaCaja({uid}){
  const [sec,setSec]=useState('caja');const [pedidos,setPedidos]=useState([]);const [movimientos,setMov]=useState([]);const [formMov,setFormMov]=useState(null);const [fechaCaja,setFechaCaja]=useState(hoy());
  const colMov=db.collection(`polleria/${uid}/movimientos`);
  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/pedidos`).where('fecha','==',fechaCaja).onSnapshot(s=>setPedidos(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=colMov.where('fecha','==',fechaCaja).orderBy('createdAt','asc').onSnapshot(s=>setMov(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();};
  },[fechaCaja]);
  const guardarMov=async d=>{const{id,...r}=d;const ts=firebase.firestore.FieldValue.serverTimestamp();if(id)await colMov.doc(id).update(r);else await colMov.add({...r,fecha:fechaCaja,createdAt:ts});setFormMov(null);};
  const eliminarMov=async id=>{if(!confirm('¿Eliminar?'))return;await colMov.doc(id).delete();};
  if(formMov!==null) return <FormMovimiento inicial={formMov} onGuardar={guardarMov} onCancelar={()=>setFormMov(null)}/>;
  const pagados=pedidos.filter(p=>p.pagado&&p.estado!=='cancelado');
  const vEfec=pagados.filter(p=>p.formaPago==='efectivo').reduce((s,p)=>s+(p.total||0),0);
  const vTransf=pagados.filter(p=>p.formaPago==='transferencia').reduce((s,p)=>s+(p.total||0),0);
  const vTarj=pagados.filter(p=>p.formaPago==='tarjeta').reduce((s,p)=>s+(p.total||0),0);
  const vFiado=pedidos.filter(p=>p.formaPago==='fiado'&&p.estado!=='cancelado').reduce((s,p)=>s+(p.total||0),0);
  const totalVentas=vEfec+vTransf+vTarj;
  const ingrExt=movimientos.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+(Number(m.monto)||0),0);
  const egresoExt=movimientos.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+(Number(m.monto)||0),0);
  const cajaFinal=vEfec+ingrExt-egresoExt;
  return(
    <div>
      <Header titulo="Caja del Día"/>
      <div className="app-body">
        <div className="tab-bar">
          {[{k:'caja',lbl:'💵 Caja'},{k:'transferencias',lbl:'📲 Transf.'},{k:'arqueo',lbl:'🔒 Arqueo'}].map(s=>(
            <button key={s.k} onClick={()=>setSec(s.k)} className={`tab-btn${sec===s.k?' activo':''}`}>{s.lbl}</button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <label className="lbl" style={{margin:0,flexShrink:0}}>Fecha:</label>
          <input type="date" value={fechaCaja} onChange={e=>setFechaCaja(e.target.value)} className="inp" style={{flex:1}}/>
        </div>
        {sec==='caja'&&<>
          <div className="panel">
            <div className="ptitle">Ventas del día</div>
            {[{lbl:'💵 Efectivo',val:vEfec},{lbl:'📲 Transferencia',val:vTransf},{lbl:'💳 Tarjeta',val:vTarj},{lbl:'📒 Fiado (pendiente)',val:vFiado}].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:'var(--txt)'}}>{formatPeso(r.val)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4}}>
              <span style={{fontWeight:700,color:'var(--txt)'}}>Total cobrado</span>
              <span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(totalVentas)}</span>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="sec-title" style={{margin:0}}>Otros movimientos</div>
            <button onClick={()=>setFormMov({})} className="btn-pri" style={{fontSize:12,padding:'6px 12px'}}>+ Agregar</button>
          </div>
          {movimientos.map(m=>(
            <div key={m.id} className="card">
              <div className="card-body" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontWeight:600,fontSize:14,color:'var(--txt)'}}>{m.descripcion||'—'}</div><div className="card-sub">{m.tipo==='ingreso'?'Ingreso extra':'Egreso / Gasto'}</div></div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:700,color:m.tipo==='egreso'?'var(--red)':'var(--green)',fontSize:16}}>{m.tipo==='egreso'?'-':'+'}{formatPeso(m.monto)}</span>
                  <button onClick={()=>eliminarMov(m.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:16}}>🗑️</button>
                </div>
              </div>
            </div>
          ))}
          <div className="suma-band" style={{marginTop:8}}>
            <span style={{fontWeight:700}}>💵 Dinero en caja</span>
            <span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(cajaFinal)}</span>
          </div>
        </>}
        {sec==='transferencias'&&<>
          <div className="suma-band"><span style={{color:'var(--txt2)'}}>Total transferencias</span><span style={{fontWeight:700,fontSize:20,color:'var(--blue)'}}>{formatPeso(vTransf)}</span></div>
          {pedidos.filter(p=>p.formaPago==='transferencia'&&p.estado!=='cancelado').map(p=>(
            <div key={p.id} className="card" style={{borderColor:p.pagado?'var(--green)':'var(--orange)'}}>
              <div className="card-body">
                <div className="card-head">
                  <div style={{flex:1}}><div className="card-name">{p.clienteNombre}</div><div className="card-sub">{(p.items||[]).map(i=>`${i.cantidad} ${i.unidad} de ${i.nombre}`).join(', ')}</div></div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,fontSize:18,color:'var(--txt)'}}>{formatPeso(p.total)}</div>
                    <span className={p.pagado?'pill pill-green':'pill pill-orange'}>{p.pagado?'✅ Confirmado':'⏳ Pendiente'}</span>
                  </div>
                </div>
                {!p.pagado&&<button onClick={async()=>await db.collection(`polleria/${uid}/pedidos`).doc(p.id).update({pagado:true})} className="btn-full" style={{marginTop:10,fontSize:13,padding:8}}>✅ Confirmar transferencia</button>}
              </div>
            </div>
          ))}
          {pedidos.filter(p=>p.formaPago==='transferencia').length===0&&<p style={{textAlign:'center',color:'var(--txt2)',padding:32}}>No hay transferencias hoy</p>}
        </>}
        {sec==='arqueo'&&<>
          <div className="panel">
            <div className="ptitle" style={{textAlign:'center'}}>Arqueo — {formatFecha(fechaCaja)}</div>
            {[{lbl:'Ventas efectivo',val:vEfec,c:'var(--green)'},{lbl:'Ventas transferencia',val:vTransf,c:'var(--blue)'},{lbl:'Ventas tarjeta',val:vTarj,c:'var(--blue)'},{lbl:'Ventas fiado',val:vFiado,c:'var(--orange)'},{lbl:'Otros ingresos',val:ingrExt,c:'var(--green)'},{lbl:'Egresos / gastos',val:egresoExt,c:'var(--red)'}].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:r.c}}>{formatPeso(r.val)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4}}><span style={{fontWeight:700}}>💵 Efectivo en caja</span><span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(cajaFinal)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}><span style={{fontWeight:700}}>📊 Total facturado</span><span style={{fontWeight:700,fontSize:22,color:'var(--txt)'}}>{formatPeso(totalVentas+vFiado)}</span></div>
          </div>
          <div className="suma-band"><span style={{fontSize:13,color:'var(--txt2)'}}>{pedidos.filter(p=>p.estado!=='cancelado').length} pedidos · {pedidos.filter(p=>p.estado==='cancelado').length} cancelados</span></div>
        </>}
      </div>
    </div>
  );
}

function FormMovimiento({inicial,onGuardar,onCancelar}){
  const [d,setD]=useState({tipo:'egreso',descripcion:'',monto:'',...inicial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const guardar=()=>{if(!d.monto)return alert('Ingresá el monto');onGuardar({...d,monto:Number(d.monto)||0});};
  return(
    <div>
      <Header titulo="Movimiento de Caja" onBack={onCancelar}/>
      <div className="app-body">
        <label className="lbl">Tipo</label>
        <div className="chip-group">
          {[{k:'egreso',lbl:'💸 Egreso / Gasto'},{k:'ingreso',lbl:'💵 Ingreso extra'}].map(t=><button key={t.k} onClick={()=>set('tipo',t.k)} className={`chip${d.tipo===t.k?' activo':''}`}>{t.lbl}</button>)}
        </div>
        <Campo label="Descripción" value={d.descripcion} onChange={v=>set('descripcion',v)} placeholder="Ej: compra de pollos..."/>
        <Campo label="Monto ($)" value={d.monto} onChange={v=>set('monto',v)} tipo="number" placeholder="0"/>
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>+ Agregar</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   PANTALLA CONFIGURACIÓN
══════════════════════════════════════ */
function ConfigTema(){
  const [temaActual,setTemaActual]=useState(getTema);
  const [modoVista,setModoVista]=useState(()=>TEMAS[getTema()]?.modo||'claro');
  const [guardado,setGuardado]=useState(false);
  const aplicar=id=>{setTemaActual(id);aplicarTema(id);setGuardado(true);setTimeout(()=>setGuardado(false),2000);};
  const filtrados=Object.entries(TEMAS).filter(([,t])=>t.modo===modoVista);
  return(
    <>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        {[['oscuro','🌙 Oscuro'],['claro','☀️ Claro']].map(([m,l])=>(
          <button key={m} onClick={()=>setModoVista(m)} style={{flex:1,padding:'8px',fontSize:13,fontWeight:600,borderRadius:'var(--radius)',cursor:'pointer',border:`1px solid ${modoVista===m?'transparent':'var(--border)'}`,background:modoVista===m?'var(--green)':'var(--bg2)',color:modoVista===m?'#fff':'var(--txt2)'}}>{l}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {filtrados.map(([id,tema])=>(
          <button key={id} onClick={()=>aplicar(id)} style={{padding:'12px 8px',borderRadius:'var(--radius-lg)',cursor:'pointer',textAlign:'center',border:`2px solid ${temaActual===id?'var(--green)':'var(--border)'}`,background:temaActual===id?'var(--green-bg)':'var(--bg2)'}}>
            <div style={{fontSize:22,marginBottom:4}}>{tema.emoji}</div>
            <div style={{fontSize:12,fontWeight:600,color:'var(--txt)',marginBottom:6}}>{tema.nombre}</div>
            <div style={{display:'flex',gap:4,justifyContent:'center'}}>
              {[tema.vars['--bg'],tema.vars['--green'],tema.vars['--blue'],tema.vars['--orange']].map((c,i)=>(
                <div key={i} style={{width:12,height:12,borderRadius:'50%',background:c,border:'1px solid rgba(128,128,128,0.25)'}}/>
              ))}
            </div>
            {temaActual===id&&<div style={{fontSize:10,color:'var(--green)',marginTop:4,fontWeight:700}}>✓ Activo</div>}
          </button>
        ))}
      </div>
      {guardado&&<div style={{fontSize:13,color:'var(--green)',textAlign:'center',marginTop:10,fontWeight:600}}>✓ Tema aplicado</div>}
    </>
  );
}

function PantallaConfig({onModoChange}){
  const [modo,setModoLocal]=useState(getModo);
  const cambiarModo=m=>{setModoLocal(m);guardarModo(m);onModoChange(m);};
  return(
    <div>
      <Header titulo="Configuración"/>
      <div className="app-body">
        {/* ── Modo pantalla ── */}
        <div className="panel">
          <div className="ptitle">🖥️ Modo de pantalla</div>
          <p style={{fontSize:12,color:'var(--txt2)',marginBottom:14,lineHeight:1.5}}>
            Elegí cómo querés ver la app. El modo PC muestra el menú en la barra lateral izquierda.
          </p>
          <div style={{display:'flex',gap:10}}>
            {[{id:'movil',icon:'📱',label:'Celular',sub:'Menú abajo'},{id:'pc',icon:'🖥️',label:'PC / Tablet',sub:'Menú lateral'}].map(m=>(
              <button key={m.id} onClick={()=>cambiarModo(m.id)} style={{flex:1,padding:'16px 8px',borderRadius:'var(--radius-lg)',border:`2px solid ${modo===m.id?'var(--green)':'var(--border)'}`,background:modo===m.id?'var(--green-bg)':'var(--bg2)',cursor:'pointer',textAlign:'center'}}>
                <div style={{fontSize:32,marginBottom:6}}>{m.icon}</div>
                <div style={{fontSize:14,fontWeight:700,color:modo===m.id?'var(--green)':'var(--txt)'}}>{m.label}</div>
                <div style={{fontSize:11,color:'var(--txt2)',marginTop:3}}>{m.sub}</div>
                {modo===m.id&&<div style={{fontSize:11,color:'var(--green)',marginTop:6,fontWeight:700}}>✓ Activo</div>}
              </button>
            ))}
          </div>
        </div>
        {/* ── Tema de colores ── */}
        <div className="panel">
          <div className="ptitle">🎨 Tema de colores</div>
          <ConfigTema/>
        </div>
        {/* ── Sesión ── */}
        <div className="panel">
          <div className="ptitle">👤 Sesión</div>
          <button onClick={()=>auth.signOut()} className="btn-full" style={{background:'var(--red)',color:'#fff'}}>
            🚪 Cerrar sesión
          </button>
        </div>
        <div style={{textAlign:'center',padding:'16px 0 8px',fontSize:11,color:'var(--txt3)'}}>
          Emma Soluciones Digitales
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(undefined);
  const [tab,setTab]=useState('catalogo');
  const [modo,setModoState]=useState(getModo);
  useEffect(()=>{
    auth.onAuthStateChanged(u=>setUser(u));
    aplicarTema(getTema());
  },[]);
  if(user===undefined) return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'var(--bg3)'}}>
      <div style={{fontSize:56}}>🐔</div>
      <p style={{color:'var(--txt2)',fontSize:15}}>Cargando...</p>
    </div>
  );
  if(!user) return <Login/>;
  const pantallas={
    catalogo:<PantallaCatalogo uid={user.uid}/>,
    pedidos: <PantallaPedidos  uid={user.uid}/>,
    precios: <PantallaPrecios  uid={user.uid}/>,
    stock:   <PantallaStock    uid={user.uid}/>,
    caja:    <PantallaCaja     uid={user.uid}/>,
    config:  <PantallaConfig   onModoChange={m=>{setModoState(m);}}/>,
  };
  const contenido=pantallas[tab]||pantallas.catalogo;
  /* ── MODO PC: sidebar izquierdo ── */
  if(modo==='pc') return(
    <div style={{display:'flex',maxWidth:1280,margin:'0 auto',minHeight:'100vh',background:'var(--bg3)'}}>
      <NavSidebar activo={tab} onChange={setTab}/>
      <div style={{flex:1,minWidth:0,overflowX:'hidden'}}>
        {contenido}
      </div>
    </div>
  );
  /* ── MODO CELULAR: nav abajo ── */
  return(
    <div style={{paddingBottom:72}}>
      {contenido}
      <NavBar activo={tab} onChange={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
