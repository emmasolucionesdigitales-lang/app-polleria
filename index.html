<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Gestión Pollería</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#fafaf9;
  --txt:#1c1917;--txt2:#78716c;--txt3:#a8a29e;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.25);
  --radius:8px;--radius-lg:12px;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --orange:#854F0B;--orange-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;
}
.dark{
  --bg:#1c1917;--bg2:#292524;--bg3:#0c0a09;
  --txt:#fafaf9;--txt2:#a8a29e;--txt3:#78716c;
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
  --green:#6aad2e;--green-bg:#1a2e0a;
  --orange:#d97706;--orange-bg:#2a1a00;
  --red:#e05555;--red-bg:#2a0a0a;
  --blue:#4b9fe0;--blue-bg:#0a1a2a;
}
html,body{height:100%;background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);}
#root{max-width:700px;margin:0 auto;min-height:100vh;background:var(--bg3);}
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.header-left{display:flex;align-items:center;gap:8px;}
.header-title{font-size:16px;font-weight:700;color:var(--txt);}
.header-sub{font-size:11px;color:var(--txt2);}
.header-right{display:flex;align-items:center;gap:6px;}
.btn-dark{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;font-size:16px;cursor:pointer;}
.btn-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt);padding:0 4px;line-height:1;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:700px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;color:var(--txt2);}
.nav-btn.activo .nav-label{color:var(--txt);font-weight:700;}
.btn-pri{background:var(--txt);color:var(--bg);border:none;border-radius:var(--radius);padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-sec{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-size:14px;cursor:pointer;color:var(--txt2);}
.btn-full{width:100%;padding:13px;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;border:none;background:var(--txt);color:var(--bg);}
.field{margin-bottom:.85rem;}
.field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:600;}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--bg);color:var(--txt);font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--border2);}
.app-body{padding:.85rem 1rem 80px;}
.search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--bg);color:var(--txt);font-family:inherit;display:block;}
.search:focus{outline:none;border-color:var(--border2);}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);margin:.9rem 0 .5rem;}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:10px;}
.ptitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);margin-bottom:8px;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:8px;}
.card-body{padding:12px 14px;}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;}
.card-name{font-size:15px;font-weight:700;color:var(--txt);}
.card-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.btn-ic{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--txt2);}
.pill{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;white-space:nowrap;}
.pill-green{background:var(--green-bg);color:var(--green);}
.pill-orange{background:var(--orange-bg);color:var(--orange);}
.pill-red{background:var(--red-bg);color:var(--red);}
.pill-blue{background:var(--blue-bg);color:var(--blue);}
.pill-gray{background:var(--bg2);color:var(--txt2);}
.tab-bar{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:3px;margin-bottom:12px;}
.tab-btn{flex:1;padding:7px 4px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);}
.tab-btn.activo{background:var(--bg);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.chip{padding:6px 12px;border-radius:99px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;background:var(--bg);color:var(--txt2);}
.chip.activo{background:var(--txt);color:var(--bg);border-color:var(--txt);}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--txt2);font-size:14px;line-height:1.7;}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);padding:9px 22px;border-radius:99px;font-size:14px;z-index:200;white-space:nowrap;}
.suma-band{background:var(--bg2);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const firebaseConfig = {
  apiKey:"AIzaSyDl2QhPwVToc4t6UQEGlCydRLzdE4oAx8A",
  authDomain:"app-polleria-f349b.firebaseapp.com",
  projectId:"app-polleria-f349b",
  storageBucket:"app-polleria-f349b.firebasestorage.app",
  messagingSenderId:"831311117717",
  appId:"1:831311117717:web:f1101e7fd49ddcbdb64a9c"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const hoy = () => new Date().toISOString().split('T')[0];
const formatFecha = f => { if(!f) return '—'; const [y,m,d]=f.split('-'); return `${d}/${m}/${y}`; };
const formatPeso  = n => '$'+Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:0});
const ahora      = () => new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
const fechaCorta = () => new Date().toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});

const S = {
  inp: {display:'block',width:'100%',marginTop:4,padding:'9px 11px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--txt)',fontSize:15,outline:'none',marginBottom:2,fontFamily:'inherit'},
  lbl: {fontSize:12,color:'var(--txt2)',fontWeight:600,display:'block',marginBottom:2,marginTop:12},
};

function Campo({label,value,onChange,placeholder,tipo='text',rows}){
  return(<><label style={S.lbl}>{label}</label>{rows
    ?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{...S.inp,resize:'vertical'}}/>
    :<input type={tipo} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={S.inp}/>
  }</>);
}

/* ─── HEADER ─── */
function Header({titulo,onBack,onAdd,onLogout,subtitulo}){
  const [dark,setDark]=useState(()=>document.documentElement.classList.contains('dark'));
  const [hora,setHora]=useState(ahora());
  useEffect(()=>{const t=setInterval(()=>setHora(ahora()),30000);return()=>clearInterval(t);},[]);
  const toggleDark=()=>{document.documentElement.classList.toggle('dark');document.body.classList.toggle('dark');setDark(d=>!d);};
  return(
    <header className="header">
      <div className="header-left">
        {onBack&&<button onClick={onBack} className="btn-back">←</button>}
        <div>
          <div className="header-title">🐔 {titulo}</div>
          <div className="header-sub">{subtitulo||fechaCorta()}</div>
        </div>
      </div>
      <div className="header-right">
        <span style={{fontSize:14,fontWeight:700,color:'var(--txt)',fontVariantNumeric:'tabular-nums'}}>{hora}</span>
        {onAdd&&<button onClick={onAdd} className="btn-pri" style={{fontSize:20,padding:'3px 12px',lineHeight:1}}>+</button>}
        <button onClick={toggleDark} className="btn-dark">{dark?'☀️':'🌙'}</button>
        {onLogout&&<button onClick={onLogout} className="btn-sec" style={{fontSize:12,padding:'6px 10px'}}>Salir</button>}
      </div>
    </header>
  );
}

/* ─── NAVBAR ─── */
const TABS=[{id:'pedidos',icon:'📋',label:'Pedidos'},{id:'precios',icon:'💰',label:'Precios'},{id:'stock',icon:'📦',label:'Stock'},{id:'clientes',icon:'👥',label:'Clientes'},{id:'caja',icon:'🧾',label:'Caja'}];
function NavBar({activo,onChange}){
  return(
    <nav className="nav">
      {TABS.map(t=>(
        <button key={t.id} onClick={()=>onChange(t.id)} className={`nav-btn${activo===t.id?' activo':''}`}>
          <span className="nav-icon">{t.icon}</span>
          <span className="nav-label">{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ─── LOGIN ─── */
function Login(){
  const [email,setEmail]=useState('');const [pass,setPass]=useState('');const [error,setError]=useState('');const [carg,setCarg]=useState(false);
  const ingresar=async()=>{if(!email||!pass)return setError('Completá los dos campos');setCarg(true);setError('');try{await auth.signInWithEmailAndPassword(email,pass);}catch{setError('Email o contraseña incorrectos');setCarg(false);}};
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',background:'var(--bg3)'}}>
      <div style={{fontSize:56,marginBottom:8}}>🐔</div>
      <div style={{fontSize:22,fontWeight:700,color:'var(--txt)',marginBottom:4}}>Gestión Pollería</div>
      <p style={{color:'var(--txt2)',marginBottom:32,fontSize:14}}>Tu negocio bajo control</p>
      <div style={{width:'100%',maxWidth:340,background:'var(--bg)',borderRadius:'var(--radius-lg)',padding:24,border:'1px solid var(--border)'}}>
        {error&&<div style={{background:'var(--red-bg)',color:'var(--red)',padding:'10px 14px',borderRadius:'var(--radius)',marginBottom:14,fontSize:13,fontWeight:600}}>⚠️ {error}</div>}
        <Campo label="Email" value={email} onChange={setEmail} placeholder="tu@email.com" tipo="email"/>
        <Campo label="Contraseña" value={pass} onChange={setPass} placeholder="••••••••" tipo="password"/>
        <button onClick={ingresar} disabled={carg} className="btn-full" style={{marginTop:18,opacity:carg?0.7:1}}>{carg?'Ingresando...':'🐔 Ingresar'}</button>
      </div>
    </div>
  );
}

/* ─── PRECIOS ─── */
function PantallaPrecios({uid}){
  const [productos,setProductos]=useState([]);const [form,setForm]=useState(null);const [buscar,setBuscar]=useState('');
  const CATS=['🐔 Pollo','🥩 Carne','🥦 Verduras','🍋 Frutas','🥚 Huevos y lácteos','🧀 Fiambres','🛒 Almacén','Otro'];
  const col=db.collection(`polleria/${uid}/productos`);
  useEffect(()=>col.orderBy('nombre','asc').onSnapshot(snap=>setProductos(snap.docs.map(d=>({id:d.id,...d.data()})))),[]);
  const guardar=async d=>{const{id,...r}=d;if(id)await col.doc(id).update(r);else await col.add(r);setForm(null);};
  const eliminar=async id=>{if(!confirm('¿Eliminar producto?'))return;await col.doc(id).delete();};
  if(form!==null)return<FormProducto inicial={form} onGuardar={guardar} onCancelar={()=>setForm(null)} categorias={CATS}/>;
  const filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(buscar.toLowerCase())||(p.categoria||'').toLowerCase().includes(buscar.toLowerCase()));
  const porCat={};filtrados.forEach(p=>{const c=p.categoria||'Otro';if(!porCat[c])porCat[c]=[];porCat[c].push(p);});
  return(
    <div>
      <Header titulo="Lista de Precios" onAdd={()=>setForm({})} onLogout={()=>auth.signOut()}/>
      <div className="app-body">
        <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar producto..." className="search" style={{marginBottom:12}}/>
        {productos.length===0&&<div className="empty"><div style={{fontSize:48,marginBottom:12}}>🐔</div>No hay productos todavía<br/><button onClick={()=>setForm({})} className="btn-pri" style={{marginTop:16}}>+ Agregar producto</button></div>}
        {Object.entries(porCat).map(([cat,prods])=>(
          <div key={cat} style={{marginBottom:16}}>
            <div className="sec-title">{cat} <span style={{fontWeight:400}}>({prods.length})</span></div>
            {prods.map(p=>{
              const m=p.precioCosto>0?Math.round(((Number(p.precioVenta)-Number(p.precioCosto))/Number(p.precioCosto))*100):null;
              const pillC=m===null?'pill pill-gray':m>=30?'pill pill-green':m>=10?'pill pill-orange':'pill pill-red';
              return(
                <div key={p.id} className="card">
                  <div className="card-body">
                    <div className="card-head">
                      <div style={{flex:1}}>
                        <div className="card-name">{p.nombre}</div>
                        {p.descripcion&&<div className="card-sub">{p.descripcion}</div>}
                        <div className="card-sub">por {p.unidad||'kg'}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0,marginLeft:10}}>
                        {p.precioCosto>0&&<div style={{fontSize:11,color:'var(--txt2)',textDecoration:'line-through'}}>{formatPeso(p.precioCosto)}</div>}
                        <div style={{fontWeight:700,fontSize:20,color:'var(--txt)'}}>{formatPeso(p.precioVenta||0)}</div>
                        {m!==null&&<span className={pillC}>{m}%</span>}
                      </div>
                    </div>
                    <div className="card-actions">
                      <button onClick={()=>setForm(p)} className="btn-ic">✏️ Editar</button>
                      <button onClick={()=>eliminar(p.id)} className="btn-ic" style={{color:'var(--red)'}}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function FormProducto({inicial,onGuardar,onCancelar,categorias}){
  const UNIDADES=['kg','g','unidad','docena','litro','atado','bandeja'];
  const [d,setD]=useState({nombre:'',categoria:'🐔 Pollo',descripcion:'',precioCosto:'',precioVenta:'',unidad:'kg',...inicial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const m=d.precioCosto>0?Math.round(((Number(d.precioVenta)-Number(d.precioCosto))/Number(d.precioCosto))*100):0;
  const guardar=()=>{if(!d.nombre.trim())return alert('El nombre es obligatorio');onGuardar({...d,precioCosto:Number(d.precioCosto)||0,precioVenta:Number(d.precioVenta)||0});};
  return(
    <div>
      <Header titulo={d.id?'Editar Producto':'Nuevo Producto'} onBack={onCancelar}/>
      <div className="app-body">
        <Campo label="Nombre *" value={d.nombre} onChange={v=>set('nombre',v)} placeholder="Ej: Pollo entero"/>
        <label style={S.lbl}>Categoría</label>
        <div className="chip-group">{categorias.map(c=><button key={c} onClick={()=>set('categoria',c)} className={`chip${d.categoria===c?' activo':''}`}>{c}</button>)}</div>
        <label style={S.lbl}>Unidad de venta</label>
        <div className="chip-group">{UNIDADES.map(u=><button key={u} onClick={()=>set('unidad',u)} className={`chip${d.unidad===u?' activo':''}`}>{u}</button>)}</div>
        <Campo label="Descripción (opcional)" value={d.descripcion} onChange={v=>set('descripcion',v)} placeholder="Ej: fresco, de granja" rows={2}/>
        <Campo label="💸 Precio de costo ($)" value={d.precioCosto} onChange={v=>set('precioCosto',v)} tipo="number" placeholder="0"/>
        <Campo label="💰 Precio de venta ($)" value={d.precioVenta} onChange={v=>set('precioVenta',v)} tipo="number" placeholder="0"/>
        {Number(d.precioCosto)>0&&Number(d.precioVenta)>0&&(
          <div style={{background:m>=0?'var(--green-bg)':'var(--red-bg)',border:`1px solid ${m>=0?'var(--green)':'var(--red)'}`,borderRadius:'var(--radius)',padding:'10px 14px',marginTop:4,display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:13,color:'var(--txt2)'}}>Ganancia:</span>
            <span style={{fontWeight:700,color:m>=0?'var(--green)':'var(--red)',fontSize:15}}>{m}% — {formatPeso(Number(d.precioVenta)-Number(d.precioCosto))}</span>
          </div>
        )}
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Agregar'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

/* ─── STOCK ─── */
function CalculadoraCajon(){
  const [cajones,setCajones]=useState(1);const [ppc,setPpc]=useState(9);const [kg,setKg]=useState(2.2);const [modo,setModo]=useState('completo');
  const tot=cajones*ppc;const totKg=tot*kg;
  const MODOS={
    completo:{label:'🐔 Entero',piezas:[{n:'Pollos enteros',c:tot,u:'unid'},{n:'Peso total',c:+totKg.toFixed(1),u:'kg'}]},
    piezas:  {label:'🍗 Trozado', piezas:[{n:'Pechugas',c:tot,u:'unid',nota:'(1 c/u)'},{n:'Pata-muslo',c:tot*2,u:'unid',nota:'(2 c/u)'},{n:'Alas',c:tot*2,u:'unid',nota:'(2 c/u)'},{n:'Carcasas',c:tot,u:'unid',nota:''}]},
    filet:   {label:'🥩 Filet',   piezas:[{n:'Filet pechuga',c:+(tot*0.55).toFixed(1),u:'kg',nota:'(≈550g c/u)'},{n:'Milanesas pechuga',c:tot*4,u:'unid',nota:'(≈4 c/u)'},{n:'Pata-muslo',c:tot*2,u:'unid',nota:''},{n:'Carcasas caldo',c:tot,u:'unid',nota:''}]},
  };
  const M=MODOS[modo];
  return(
    <div className="panel">
      <div className="ptitle">🧮 Calculadora de Cajón</div>
      <div style={{display:'flex',gap:10,marginBottom:12}}>
        {[{lbl:'Cajones',v:cajones,set:v=>setCajones(Math.max(1,v))},{lbl:'Pollos/cajón',v:ppc,set:v=>setPpc(Math.max(1,v))},{lbl:'Kg prom.',v:kg,set:v=>setKg(Math.max(0.5,v)),step:0.1}].map(f=>(
          <div key={f.lbl} style={{flex:1}}>
            <label style={{...S.lbl,marginTop:0}}>{f.lbl}</label>
            <input type="number" step={f.step||1} value={f.v} onChange={e=>f.set(Number(e.target.value))} style={{...S.inp,textAlign:'center',fontWeight:700,fontSize:18}}/>
          </div>
        ))}
      </div>
      <div className="suma-band">
        <span style={{fontSize:13,color:'var(--txt2)'}}>Total pollos: <b style={{color:'var(--txt)'}}>{tot}</b></span>
        <span style={{fontSize:13,color:'var(--txt2)'}}>Total kg: <b style={{color:'var(--txt)'}}>{totKg.toFixed(1)}</b></span>
      </div>
      <label style={{...S.lbl,marginTop:0}}>Tipo de corte</label>
      <div className="chip-group" style={{marginBottom:12}}>{Object.entries(MODOS).map(([k,v])=><button key={k} onClick={()=>setModo(k)} className={`chip${modo===k?' activo':''}`}>{v.label}</button>)}</div>
      <div style={{background:'var(--bg2)',borderRadius:'var(--radius)',padding:12}}>
        {M.piezas.map((p,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
            <div><span style={{fontSize:14,fontWeight:600,color:'var(--txt)'}}>{p.n}</span>{p.nota&&<span style={{fontSize:11,color:'var(--txt2)',marginLeft:6}}>{p.nota}</span>}</div>

          {d.items.map(i=>(
            <div key={i._id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:'var(--bg)',borderRadius:'var(--radius)',marginBottom:6,border:'1px solid var(--border)'}}>
              <div><div style={{fontWeight:600,fontSize:14,color:'var(--txt)'}}>{i.nombre}</div><div style={{fontSize:12,color:'var(--txt2)'}}>{i.cantidad} {i.unidad} · {formatPeso(i.subtotal)}</div></div>
              <button onClick={()=>quitarItem(i._id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'var(--red)'}}>✕</button>
            </div>
          ))}
          <div className="suma-band"><span style={{fontWeight:700,color:'var(--txt)'}}>Total</span><span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(d.total)}</span></div>
        </div>}
        <label style={S.lbl}>Forma de pago</label>
        <div className="chip-group">
          {[{k:'efectivo',lbl:'💵 Efectivo'},{k:'transferencia',lbl:'📲 Transferencia'},{k:'fiado',lbl:'📒 Fiado'},{k:'tarjeta',lbl:'💳 Tarjeta'}].map(fp=><button key={fp.k} onClick={()=>set('formaPago',fp.k)} className={`chip${d.formaPago===fp.k?' activo':''}`}>{fp.lbl}</button>)}
        </div>
        <label style={{...S.lbl,marginTop:12,display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
          <input type="checkbox" checked={d.pagado} onChange={e=>set('pagado',e.target.checked)} style={{width:18,height:18}}/> ✅ Ya pagó
        </label>
        <Campo label="Notas (opcional)" value={d.notas} onChange={v=>set('notas',v)} placeholder="Ej: sin menudos, al horno..." rows={2}/>
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>{d.id?'✓ Guardar':'+ Crear pedido'}</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

/* ─── CAJA ─── */
function PantallaCaja({uid}){
  const [sec,setSec]=useState('caja');const [pedidos,setPedidos]=useState([]);const [movimientos,setMov]=useState([]);const [formMov,setFormMov]=useState(null);const [fechaCaja,setFechaCaja]=useState(hoy());
  const colMov=db.collection(`polleria/${uid}/movimientos`);
  useEffect(()=>{
    const u1=db.collection(`polleria/${uid}/pedidos`).where('fecha','==',fechaCaja).onSnapshot(snap=>setPedidos(snap.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=colMov.where('fecha','==',fechaCaja).orderBy('createdAt','asc').onSnapshot(snap=>setMov(snap.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();};
  },[fechaCaja]);
  const guardarMov=async d=>{const{id,...r}=d;const ts=firebase.firestore.FieldValue.serverTimestamp();if(id)await colMov.doc(id).update(r);else await colMov.add({...r,fecha:fechaCaja,createdAt:ts});setFormMov(null);};
  const eliminarMov=async id=>{if(!confirm('¿Eliminar?'))return;await colMov.doc(id).delete();};
  if(formMov!==null)return<FormMovimiento inicial={formMov} onGuardar={guardarMov} onCancelar={()=>setFormMov(null)}/>;
  const pagados=pedidos.filter(p=>p.pagado&&p.estado!=='cancelado');
  const vEfec=pagados.filter(p=>p.formaPago==='efectivo').reduce((s,p)=>s+(p.total||0),0);
  const vTransf=pagados.filter(p=>p.formaPago==='transferencia').reduce((s,p)=>s+(p.total||0),0);
  const vTarj=pagados.filter(p=>p.formaPago==='tarjeta').reduce((s,p)=>s+(p.total||0),0);
  const vFiado=pedidos.filter(p=>p.formaPago==='fiado'&&p.estado!=='cancelado').reduce((s,p)=>s+(p.total||0),0);
  const totalVentas=vEfec+vTransf+vTarj;
  const ingrExt=movimientos.filter(m=>m.tipo==='ingreso').reduce((s,m)=>s+(Number(m.monto)||0),0);
  const egresoExt=movimientos.filter(m=>m.tipo==='egreso').reduce((s,m)=>s+(Number(m.monto)||0),0);
  const cajaFinal=vEfec+ingrExt-egresoExt;
  return(
    <div>
      <Header titulo="Caja del Día"/>
      <div className="app-body">
        <div className="tab-bar">
          {[{k:'caja',lbl:'💵 Caja'},{k:'transferencias',lbl:'📲 Transf.'},{k:'arqueo',lbl:'🔒 Arqueo'}].map(s=>(
            <button key={s.k} onClick={()=>setSec(s.k)} className={`tab-btn${sec===s.k?' activo':''}`}>{s.lbl}</button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <label style={{fontSize:12,color:'var(--txt2)',fontWeight:600,whiteSpace:'nowrap'}}>Fecha:</label>
          <input type="date" value={fechaCaja} onChange={e=>setFechaCaja(e.target.value)} style={{...S.inp,flex:1,margin:0}}/>
        </div>

        {sec==='caja'&&<>
          <div className="panel">
            <div className="ptitle">Ventas del día</div>
            {[{lbl:'💵 Efectivo',val:vEfec},{lbl:'📲 Transferencia',val:vTransf},{lbl:'💳 Tarjeta',val:vTarj},{lbl:'📒 Fiado',val:vFiado}].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:'var(--txt)'}}>{formatPeso(r.val)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4}}>
              <span style={{fontWeight:700,color:'var(--txt)'}}>Total cobrado</span>
              <span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(totalVentas)}</span>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="sec-title" style={{margin:0}}>Otros ingresos / egresos</div>
            <button onClick={()=>setFormMov({})} className="btn-pri" style={{fontSize:12,padding:'6px 12px'}}>+ Agregar</button>
          </div>
          {movimientos.map(m=>(
            <div key={m.id} className="card">
              <div className="card-body" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div><div style={{fontWeight:600,fontSize:14,color:'var(--txt)'}}>{m.descripcion||'—'}</div><div className="card-sub">{m.tipo==='ingreso'?'Ingreso extra':'Egreso / Gasto'}</div></div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontWeight:700,color:m.tipo==='egreso'?'var(--red)':'var(--green)',fontSize:16}}>{m.tipo==='egreso'?'-':'+'}{formatPeso(m.monto)}</span>
                  <button onClick={()=>eliminarMov(m.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:16}}>🗑️</button>
                </div>
              </div>
            </div>
          ))}
          <div className="suma-band" style={{marginTop:8}}>
            <span style={{fontWeight:700,color:'var(--txt)'}}>💵 Dinero en caja</span>
            <span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(cajaFinal)}</span>
          </div>
        </>}

        {sec==='transferencias'&&<>
          <div className="suma-band"><span style={{color:'var(--txt2)'}}>Total transferencias</span><span style={{fontWeight:700,fontSize:20,color:'var(--blue)'}}>{formatPeso(vTransf)}</span></div>
          {pedidos.filter(p=>p.formaPago==='transferencia'&&p.estado!=='cancelado').map(p=>(
            <div key={p.id} className="card" style={{borderColor:p.pagado?'var(--green)':'var(--orange)'}}>
              <div className="card-body">
                <div className="card-head">
                  <div style={{flex:1}}><div className="card-name">{p.clienteNombre}</div><div className="card-sub">{(p.items||[]).map(i=>`${i.cantidad} ${i.unidad} de ${i.nombre}`).join(', ')}</div></div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:700,fontSize:18,color:'var(--txt)'}}>{formatPeso(p.total)}</div>
                    <span className={p.pagado?'pill pill-green':'pill pill-orange'}>{p.pagado?'✅ Confirmado':'⏳ Pendiente'}</span>
                  </div>
                </div>
                {!p.pagado&&<button onClick={async()=>await db.collection(`polleria/${uid}/pedidos`).doc(p.id).update({pagado:true})} className="btn-full" style={{marginTop:10,fontSize:13,padding:8}}>✅ Confirmar transferencia</button>}
              </div>
            </div>
          ))}
          {pedidos.filter(p=>p.formaPago==='transferencia').length===0&&<p style={{textAlign:'center',color:'var(--txt2)',padding:32}}>No hay transferencias hoy</p>}
        </>}

        {sec==='arqueo'&&<>
          <div className="panel">
            <div className="ptitle" style={{textAlign:'center'}}>Arqueo — {formatFecha(fechaCaja)}</div>
            {[{lbl:'Ventas efectivo',val:vEfec,c:'var(--green)'},{lbl:'Ventas transferencia',val:vTransf,c:'var(--blue)'},{lbl:'Ventas tarjeta',val:vTarj,c:'var(--blue)'},{lbl:'Ventas fiado',val:vFiado,c:'var(--orange)'},{lbl:'Otros ingresos',val:ingrExt,c:'var(--green)'},{lbl:'Egresos / gastos',val:egresoExt,c:'var(--red)'}].map(r=>(
              <div key={r.lbl} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:13,color:'var(--txt2)'}}>{r.lbl}</span>
                <span style={{fontWeight:700,color:r.c}}>{formatPeso(r.val)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:10,marginTop:4}}>
              <span style={{fontWeight:700}}>💵 Efectivo en caja</span>
              <span style={{fontWeight:700,fontSize:22,color:'var(--green)'}}>{formatPeso(cajaFinal)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
              <span style={{fontWeight:700}}>📊 Total facturado</span>
              <span style={{fontWeight:700,fontSize:22,color:'var(--txt)'}}>{formatPeso(totalVentas+vFiado)}</span>
            </div>
          </div>
          <div className="suma-band">
            <span style={{fontSize:13,color:'var(--txt2)'}}>{pedidos.filter(p=>p.estado!=='cancelado').length} pedidos · {pedidos.filter(p=>p.estado==='cancelado').length} cancelados</span>
          </div>
        </>}
      </div>
    </div>
  );
}

function FormMovimiento({inicial,onGuardar,onCancelar}){
  const [d,setD]=useState({tipo:'egreso',descripcion:'',monto:'',...inicial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const guardar=()=>{if(!d.monto)return alert('Ingresá el monto');onGuardar({...d,monto:Number(d.monto)||0});};
  return(
    <div>
      <Header titulo="Movimiento de Caja" onBack={onCancelar}/>
      <div className="app-body">
        <label style={S.lbl}>Tipo</label>
        <div className="chip-group">
          {[{k:'egreso',lbl:'💸 Egreso / Gasto'},{k:'ingreso',lbl:'💵 Ingreso extra'}].map(t=><button key={t.k} onClick={()=>set('tipo',t.k)} className={`chip${d.tipo===t.k?' activo':''}`}>{t.lbl}</button>)}
        </div>
        <Campo label="Descripción" value={d.descripcion} onChange={v=>set('descripcion',v)} placeholder="Ej: compra de pollos, pago de luz..."/>
        <Campo label="Monto ($)" value={d.monto} onChange={v=>set('monto',v)} tipo="number" placeholder="0"/>
        <div style={{display:'flex',gap:8,marginTop:18}}>
          <button onClick={guardar} className="btn-pri" style={{flex:1,padding:14,fontSize:15}}>+ Agregar</button>
          <button onClick={onCancelar} className="btn-sec" style={{padding:14}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App(){
  const [user,setUser]=useState(undefined);const [tab,setTab]=useState('pedidos');
  useEffect(()=>auth.onAuthStateChanged(u=>setUser(u)),[]);
  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'var(--bg3)'}}><div style={{fontSize:56}}>🐔</div><p style={{color:'var(--txt2)',fontSize:15}}>Cargando...</p></div>;
  if(!user)return<Login/>;
  const pantallas={pedidos:<PantallaPedidos uid={user.uid}/>,precios:<PantallaPrecios uid={user.uid}/>,stock:<PantallaStock uid={user.uid}/>,clientes:<PantallaClientes uid={user.uid}/>,caja:<PantallaCaja uid={user.uid}/>};
  return(<div style={{paddingBottom:72}}>{pantallas[tab]||pantallas.pedidos}<NavBar activo={tab} onChange={setTab}/></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
